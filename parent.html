<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODA Hub - Parent Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/oda-theme.css">
<style>
/* Parent-specific grid bg (gold tint) */
.grid-bg{background-image:linear-gradient(rgba(255,209,102,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,209,102,.03) 1px,transparent 1px)}
.app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:16px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.topbar h1{font-size:22px;font-weight:800;letter-spacing:-1px}
.topbar h1 span{color:var(--gold)}
/* Parent-specific: gold active tab */
.tab.active{background:var(--gold);color:var(--bg)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:500px){.stats{grid-template-columns:1fr 1fr}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat .num{font-size:26px;font-weight:800;color:var(--gold);font-family:'Space Mono',monospace}
.stat .label{font-size:12px;color:var(--text2);margin-top:2px;font-weight:600;letter-spacing:.5px}
.a-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.a-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.a-title{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px}
.a-meta{font-size:13px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.a-status{font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
.st-pending{background:rgba(17,138,178,.12);color:var(--accent2)}
.st-submitted{background:rgba(255,209,102,.12);color:var(--gold)}
.st-graded{background:rgba(6,214,160,.12);color:var(--accent)}
.st-completed{background:rgba(6,214,160,.12);color:var(--accent)}
.st-returned{background:rgba(239,71,111,.12);color:var(--accent3)}
.a-score{font-family:'Space Mono',monospace;font-size:14px;color:var(--gold);font-weight:700}
.a-feedback{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:8px;font-size:15px;line-height:1.5}
.a-feedback-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.group-header{font-size:15px;font-weight:700;color:var(--text2);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.work-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.work-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.work-type{font-size:13px;font-weight:700;padding:3px 10px;border-radius:6px}
.wt-pitch{background:rgba(17,138,178,.12);color:var(--accent2)}
.wt-elevator{background:rgba(255,209,102,.12);color:var(--gold)}
.wt-spelling{background:rgba(239,71,111,.12);color:var(--accent3)}
.work-date{font-size:12px;color:var(--text2)}
.work-body{font-size:15px;line-height:1.6;color:var(--text)}
.work-body .wl{margin-bottom:6px}
.work-body .wl-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.work-body .wl-value{font-weight:600}
.work-body .pitch-text{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:15px;line-height:1.7;margin-top:8px;max-height:200px;overflow-y:auto;color:var(--text);font-style:italic}
.spelling-scores{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.spell-score{padding:4px 10px;border-radius:6px;font-size:13px;font-weight:700;font-family:'Space Mono',monospace}
.spell-good{background:rgba(6,214,160,.1);color:var(--accent)}
.spell-ok{background:rgba(255,209,102,.1);color:var(--gold)}
.spell-low{background:rgba(239,71,111,.1);color:var(--accent3)}
.ai-result{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px;font-size:15px;line-height:1.6;max-height:300px;overflow-y:auto;white-space:pre-wrap}
.empty-state{text-align:center;padding:32px 16px;color:var(--text2)}
.empty-state .emoji{font-size:40px;margin-bottom:8px;display:block}
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px;height:80px;margin-bottom:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-group{margin-bottom:6px;height:20px;width:140px;border-radius:6px}
.show-more-wrap{text-align:center;margin:14px 0 4px}
.show-more-wrap .btn{min-width:180px}
.page-info{text-align:center;font-size:13px;color:var(--text2);margin:8px 0 6px;font-weight:600}
.last-updated{text-align:center;font-size:12px;color:var(--text2);padding:8px 0;opacity:.7;font-weight:500}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="app">

<div class="topbar">
<h1>&#x1F46A; <span>Parent Portal</span></h1>
<div style="display:flex;align-items:center;gap:10px">
<span style="font-size:13px;color:var(--text2);font-weight:500" id="parentChildLabel">Loading...</span>
<button class="btn btn-outline btn-sm" onclick="parentLogout()">&#x2190; Exit</button>
</div>
</div>

<div class="tabs" role="tablist" aria-label="Parent portal sections">
<div class="tab active" role="tab" tabindex="0" aria-selected="true" aria-controls="sec-overview" id="tab-overview" onclick="switchTab('overview')" onkeydown="tabKeyNav(event,'overview')">&#x1F4CA; Overview</div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="sec-assignments" id="tab-assignments" onclick="switchTab('assignments')" onkeydown="tabKeyNav(event,'assignments')">&#x1F4CB; Assignments</div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="sec-work" id="tab-work" onclick="switchTab('work')" onkeydown="tabKeyNav(event,'work')">&#x1F4DD; Work</div>
</div>

<div id="offlineBanner" role="alert" aria-live="polite" style="display:none;background:rgba(255,209,102,.15);border:1px solid rgba(255,209,102,.3);border-radius:10px;padding:10px 14px;text-align:center;margin-bottom:12px">
<span style="font-size:14px;font-weight:600;color:var(--gold)">&#x26A0;&#xFE0F; Connection issue — some data may be outdated</span>
</div>

<!-- OVERVIEW -->
<div class="section show" id="sec-overview" role="tabpanel" aria-labelledby="tab-overview">
<div class="card">
<div style="font-size:18px;font-weight:800;margin-bottom:2px">&#x1F44B; Welcome!</div>
<div style="font-size:13px;color:var(--text2)">Here's how <strong id="overviewName">your child</strong> is doing.</div>
</div>
<div class="stats">
<div class="stat"><div class="num" id="pStatTotal">0</div><div class="label">Total</div></div>
<div class="stat"><div class="num" id="pStatCompleted">0</div><div class="label">Completed</div></div>
<div class="stat"><div class="num" id="pStatAvg">--</div><div class="label">Avg Score</div></div>
<div class="stat"><div class="num" id="pStatPending">0</div><div class="label">Pending</div></div>
</div>
<div class="card">
<div class="card-title"><span>&#x1F916; AI Insights</span></div>
<button class="btn btn-gold btn-wide" onclick="aiProgressReport()" id="aiReportBtn">Generate AI Progress Report</button>
<div class="ai-result" id="aiReportResult" style="display:none"></div>
</div>
</div>

<!-- ASSIGNMENTS -->
<div class="section" id="sec-assignments" role="tabpanel" aria-labelledby="tab-assignments">
<div style="font-size:16px;font-weight:800;margin-bottom:14px">&#x1F4CB; Assignments</div>
<div id="parentAssignmentsList"><div class="skeleton skeleton-group"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
</div>

<!-- WORK -->
<div class="section" id="sec-work" role="tabpanel" aria-labelledby="tab-work">
<div style="font-size:16px;font-weight:800;margin-bottom:14px">&#x1F4DD; Student Work</div>
<div id="parentWorkList"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
</div>

<div class="last-updated" id="lastUpdated"></div>
</div>

<!-- SHARED CORE -->
<script src="js/oda-core.js"></script>

<!-- FIREBASE -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import{getFirestore,doc,getDoc,getDocs,collection,query,where,onSnapshot}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const cfg=ODA_CONFIG.firebase;
const app=initializeApp(cfg);const db=getFirestore(app);

window.fbDb=db;window.fbDoc=doc;window.fbGetDoc=getDoc;window.fbGetDocs=getDocs;
window.fbCollection=collection;window.fbQuery=query;window.fbWhere=where;

var studentId=localStorage.getItem('parentStudentId');
var studentName=localStorage.getItem('parentStudentName');
if(!studentId){window.location.href='index.html'}
else{
document.getElementById('parentChildLabel').textContent=studentName||'Student';
document.getElementById('overviewName').textContent=studentName||'your child';
window.parentStudentId=studentId;
window.parentStudentName=studentName;
// Real-time assignments listener
window.assignPageSize=10;
window.assignShown=10;
var q=query(collection(db,'assignments'),where('studentId','==',studentId));
onSnapshot(q,function(snap){
window.parentAssignments=[];
snap.forEach(function(d){window.parentAssignments.push({id:d.id,...d.data()})});
window.assignShown=window.assignPageSize;
renderOverview();
renderAssignments();
updateLastUpdated();
document.getElementById('offlineBanner').style.display='none';
},function(err){
console.error('Firestore assignments error:',err);
document.getElementById('offlineBanner').style.display='block';
});
// Load student work
loadStudentWork();
}
</script>

<script>
var parentTabOrder=['overview','assignments','work'];
function switchTab(id){
var tabs=document.querySelectorAll('.tab');
var secs=document.querySelectorAll('.section');
for(var i=0;i<tabs.length;i++){tabs[i].classList.remove('active');tabs[i].setAttribute('aria-selected','false');tabs[i].setAttribute('tabindex','-1');secs[i].classList.remove('show')}
document.getElementById('sec-'+id).classList.add('show');
var m={overview:0,assignments:1,work:2};
if(m[id]!==undefined){tabs[m[id]].classList.add('active');tabs[m[id]].setAttribute('aria-selected','true');tabs[m[id]].setAttribute('tabindex','0')}
odaAnnounce(id+' tab selected');
}
function tabKeyNav(e,current){
var idx=parentTabOrder.indexOf(current);if(idx<0)return;
if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
e.preventDefault();
var next=e.key==='ArrowRight'?(idx+1)%parentTabOrder.length:(idx-1+parentTabOrder.length)%parentTabOrder.length;
switchTab(parentTabOrder[next]);
document.getElementById('tab-'+parentTabOrder[next]).focus();
}else if(e.key==='Enter'||e.key===' '){e.preventDefault();switchTab(current)}
}
window.tabKeyNav=tabKeyNav;

function renderOverview(){
var assigns=window.parentAssignments||[];
var total=assigns.length;
var completed=assigns.filter(function(a){return a.status==='completed'||a.status==='graded'}).length;
var pending=assigns.filter(function(a){return a.status==='pending'||a.status==='returned'}).length;
var scores=assigns.filter(function(a){return a.score!==null&&a.score!==undefined}).map(function(a){return a.score});
var avg=scores.length?Math.round(scores.reduce(function(s,v){return s+v},0)/scores.length):'--';
document.getElementById('pStatTotal').textContent=total;
document.getElementById('pStatCompleted').textContent=completed;
document.getElementById('pStatAvg').textContent=avg+(typeof avg==='number'?'%':'');
document.getElementById('pStatPending').textContent=pending;
}

function renderAssignments(){
var assigns=window.parentAssignments||[];
var el=document.getElementById('parentAssignmentsList');
if(!assigns.length){el.innerHTML='<div class="empty-state"><span class="emoji">&#x1F4ED;</span><p>No assignments yet.</p></div>';return}
// Build ordered list: pending, submitted, graded, completed
var pending=assigns.filter(function(a){return a.status==='pending'||a.status==='returned'});
var submitted=assigns.filter(function(a){return a.status==='submitted'});
var graded=assigns.filter(function(a){return a.status==='graded'});
var completed=assigns.filter(function(a){return a.status==='completed'});
completed.sort(function(a,b){return(b.completedAt||'').localeCompare(a.completedAt||'')});
var groups=[
{label:'&#x23F3; Pending',items:pending},
{label:'&#x1F4E4; Submitted',items:submitted},
{label:'&#x1F4DD; Graded',items:graded},
{label:'&#x2705; Completed',items:completed}
];
// Flatten with group markers
var flat=[];
groups.forEach(function(g){
if(g.items.length){
flat.push({type:'header',label:g.label,count:g.items.length});
g.items.forEach(function(a){flat.push({type:'card',data:a})});
}
});
// Paginate: count only cards toward the limit
var limit=window.assignShown||10;
var totalCards=flat.filter(function(f){return f.type==='card'}).length;
var cardCount=0;
var h='';
var pendingHeader='';
for(var i=0;i<flat.length;i++){
if(flat[i].type==='header'){
pendingHeader='<div class="group-header">'+flat[i].label+' ('+flat[i].count+')</div>';
}else{
if(cardCount>=limit)continue;
if(pendingHeader){h+=pendingHeader;pendingHeader=''}
cardCount++;
h+=renderAssignCard(flat[i].data);
}
}
var showing=Math.min(limit,totalCards);
h+='<div class="page-info">Showing '+showing+' of '+totalCards+' assignment'+(totalCards!==1?'s':'')+'</div>';
if(showing<totalCards){
h+='<div class="show-more-wrap"><button class="btn btn-outline btn-sm" onclick="showMoreAssignments()">Show More</button></div>';
}
el.innerHTML=h;
}
function showMoreAssignments(){
window.assignShown=(window.assignShown||10)+window.assignPageSize;
renderAssignments();
}
window.showMoreAssignments=showMoreAssignments;

function renderAssignCard(a){
var statusMap={pending:'st-pending',submitted:'st-submitted',graded:'st-graded',completed:'st-completed',returned:'st-returned'};
var labelMap={pending:'Pending',submitted:'Submitted',graded:'Graded',completed:'Completed',returned:'Returned'};
var emojiMap={'spelling-k2':'&#x1F4D6;','spelling-34':'&#x1F4D6;','spelling-58':'&#x1F4D6;','vocab-k2':'&#x1F4AC;','vocab-34':'&#x1F4AC;','vocab-58':'&#x1F4AC;','pitch-challenge':'&#x1F4A1;','elevator-pitch':'&#x1F3A4;','lemonade-day':'&#x1F34B;',tool:'&#x1F6E0;&#xFE0F;',worksheet:'&#x1F4C4;',link:'&#x1F517;',custom:'&#x270F;&#xFE0F;'};
var emoji=emojiMap[a.toolType]||emojiMap[a.type]||'&#x1F4CB;';
var h='<div class="a-card">';
h+='<div class="a-header"><div class="a-title">'+emoji+' '+esc(a.title||a.type)+'</div>';
h+='<span class="a-status '+(statusMap[a.status]||'st-pending')+'">'+(labelMap[a.status]||a.status)+'</span></div>';
h+='<div class="a-meta">';
if(a.dueDate)h+='<span>Due: '+a.dueDate+'</span>';
if(a.assignedAt)h+='<span>Assigned: '+new Date(a.assignedAt).toLocaleDateString()+'</span>';
if(a.score!==null&&a.score!==undefined)h+='<span class="a-score">Score: '+a.score+'%</span>';
h+='</div>';
if(a.feedback){h+='<div class="a-feedback"><div class="a-feedback-label">Teacher Feedback</div>'+esc(a.feedback)+'</div>'}
h+='</div>';
return h;
}

window.spellingShown=10;
window.spellingPageSize=10;
window.allSpellingResults=[];

async function loadStudentWork(){
var el=document.getElementById('parentWorkList');
var sid=window.parentStudentId;
if(!sid)return;
var h='';
try{
// Elevator Pitch
var epDoc=await window.fbGetDoc(window.fbDoc(window.fbDb,'elevatorPitches',sid));
if(epDoc.exists()){
var ep=epDoc.data();
h+='<div class="work-card"><div class="work-header"><span class="work-type wt-elevator">&#x1F3A4; Elevator Pitch</span><span class="work-date">'+(ep.savedAt?new Date(ep.savedAt).toLocaleDateString():'')+'</span></div>';
h+='<div class="work-body">';
if(ep.answers){
if(ep.answers.name)h+='<div class="wl"><span class="wl-label">Name:</span> <span class="wl-value">'+esc(ep.answers.name)+'</span></div>';
if(ep.answers.dream)h+='<div class="wl"><span class="wl-label">Dream Job:</span> <span class="wl-value">'+esc(ep.answers.dream)+'</span></div>';
if(ep.answers.why)h+='<div class="wl"><span class="wl-label">Why:</span> <span class="wl-value">'+esc(ep.answers.why)+'</span></div>';
if(ep.answers.hobby)h+='<div class="wl"><span class="wl-label">Hobbies:</span> <span class="wl-value">'+esc(ep.answers.hobby)+'</span></div>';
if(ep.answers.fact)h+='<div class="wl"><span class="wl-label">Fun Fact:</span> <span class="wl-value">'+esc(ep.answers.fact)+'</span></div>';
}
if(ep.pitch)h+='<div class="pitch-text">'+esc(ep.pitch)+'</div>';
h+='</div></div>';
}
// Pitch Challenge
var pcDoc=await window.fbGetDoc(window.fbDoc(window.fbDb,'pitchChallenges',sid));
if(pcDoc.exists()){
var pc=pcDoc.data();
h+='<div class="work-card"><div class="work-header"><span class="work-type wt-pitch">&#x1F4A1; Pitch Challenge</span><span class="work-date">'+(pc.savedAt?new Date(pc.savedAt).toLocaleDateString():'')+'</span></div>';
h+='<div class="work-body">';
if(pc.studentName)h+='<div class="wl"><span class="wl-label">Student:</span> <span class="wl-value">'+esc(pc.studentName)+'</span></div>';
if(pc.businessName)h+='<div class="wl"><span class="wl-label">Business:</span> <span class="wl-value">'+esc(pc.businessName)+(pc.businessDesc?' — '+esc(pc.businessDesc):'')+'</span></div>';
if(pc.problem)h+='<div class="wl"><span class="wl-label">Problem:</span> <span class="wl-value">'+esc(pc.problem)+'</span></div>';
if(pc.customers&&pc.customers.length)h+='<div class="wl"><span class="wl-label">Customers:</span> <span class="wl-value">'+esc(pc.customers.join(', '))+'</span></div>';
if(pc.advantages&&pc.advantages.length)h+='<div class="wl"><span class="wl-label">Advantages:</span> <span class="wl-value">'+esc(pc.advantages.join(' \u2022 '))+'</span></div>';
if(pc.hook)h+='<div class="pitch-text">'+esc(pc.hook)+'</div>';
h+='</div></div>';
}
// Spelling Results
var srQ=window.fbQuery(window.fbCollection(window.fbDb,'spellingResults'),window.fbWhere('studentId','==',sid));
var srSnap=await window.fbGetDocs(srQ);
if(!srSnap.empty){
var results=[];srSnap.forEach(function(d){results.push(d.data())});
results.sort(function(a,b){return(b.savedAt||'').localeCompare(a.savedAt||'')});
window.allSpellingResults=results;
window.spellingShown=window.spellingPageSize;
h+=renderSpellingSection(results,window.spellingShown);
}
if(!h)h='<div class="empty-state"><span class="emoji">&#x1F4AD;</span><p>No saved work yet.</p></div>';
el.innerHTML=h;
updateLastUpdated();
}catch(e){
console.error('Error loading student work:',e);
document.getElementById('offlineBanner').style.display='block';
el.innerHTML='<div class="empty-state"><span class="emoji">&#x26A0;&#xFE0F;</span><p>Error loading work. Please check your connection.</p></div>';
}
}
window.loadStudentWork=loadStudentWork;

function renderSpellingSection(results,limit){
var total=results.length;
var showing=Math.min(limit,total);
var visible=results.slice(0,showing);
var h='<div class="work-card" id="spellingCard"><div class="work-header"><span class="work-type wt-spelling">&#x1F41D; Spelling Bee</span><span class="work-date">'+total+' attempt'+(total!==1?'s':'')+'</span></div>';
h+='<div class="work-body"><div class="spelling-scores">';
visible.forEach(function(r){
var sc=r.score!==null&&r.score!==undefined?r.score:'?';
var cls=sc>=80?'spell-good':sc>=60?'spell-ok':'spell-low';
h+='<span class="spell-score '+cls+'">'+(r.grade||'?')+': '+sc+'%</span>';
});
h+='</div>';
if(total>1){
h+='<div class="page-info">Showing '+showing+' of '+total+' results</div>';
}
if(showing<total){
h+='<div class="show-more-wrap"><button class="btn btn-outline btn-sm" onclick="showMoreSpelling()">Show More</button></div>';
}
h+='</div></div>';
return h;
}

function showMoreSpelling(){
window.spellingShown=(window.spellingShown||10)+window.spellingPageSize;
var card=document.getElementById('spellingCard');
if(card){
var temp=document.createElement('div');
temp.innerHTML=renderSpellingSection(window.allSpellingResults,window.spellingShown);
card.replaceWith(temp.firstChild);
}
}
window.showMoreSpelling=showMoreSpelling;

// AI Progress Report
async function aiProgressReport(){
var btn=document.getElementById('aiReportBtn');
var result=document.getElementById('aiReportResult');
btn.classList.add('loading');btn.textContent='Generating report...';
var assigns=window.parentAssignments||[];
var total=assigns.length;
var completed=assigns.filter(function(a){return a.status==='completed'||a.status==='graded'}).length;
var scores=assigns.filter(function(a){return a.score!==null&&a.score!==undefined}).map(function(a){return a.score});
var avg=scores.length?Math.round(scores.reduce(function(s,v){return s+v},0)/scores.length):'N/A';
var pending=assigns.filter(function(a){return a.status==='pending'||a.status==='returned'}).length;
var types={};assigns.forEach(function(a){var t=a.toolType||a.type;types[t]=(types[t]||0)+1});
var typeSummary=Object.keys(types).map(function(k){return k+': '+types[k]}).join(', ')||'none yet';
var prompt='You are a friendly education assistant writing a progress report for a parent about their child named '+(window.parentStudentName||'the student')+'. Here is their data: Total assignments: '+total+', Completed: '+completed+', Pending: '+pending+', Average score: '+avg+', Assignment types: '+typeSummary+'. Write a warm, encouraging 3-4 paragraph progress report for the parent. Highlight strengths, mention areas for improvement gently, and give 2-3 specific suggestions for how the parent can support learning at home. Keep it positive and supportive.';
try{
var text=await odaAI(prompt);
result.textContent=text;result.style.display='block';
}catch(e){console.error(e);result.textContent='Error generating report. Please try again.';result.style.display='block'}
btn.classList.remove('loading');btn.textContent='Generate AI Progress Report';
}
window.aiProgressReport=aiProgressReport;

function updateLastUpdated(){
var now=new Date();
var h=now.getHours();var m=now.getMinutes();var ampm=h>=12?'PM':'AM';
h=h%12;if(!h)h=12;m=m<10?'0'+m:m;
var el=document.getElementById('lastUpdated');
if(el)el.textContent='Last updated: '+now.toLocaleDateString()+' at '+h+':'+m+' '+ampm;
}
window.updateLastUpdated=updateLastUpdated;

function parentLogout(){localStorage.removeItem('parentStudentId');localStorage.removeItem('parentStudentName');window.location.href='index.html'}
window.parentLogout=parentLogout;

</script>
