<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODA Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#2a3450;--accent:#06d6a0;--accent2:#118ab2;--accent3:#ef476f;--gold:#ffd166;--text:#f0f4ff;--text2:#a8b2c8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.toolbar-left{display:flex;align-items:center;gap:12px}
.toolbar h1{font-size:16px;font-weight:800;letter-spacing:-.5px;white-space:nowrap}
.toolbar h1 span{color:var(--accent)}
.tool-name-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;outline:none;width:160px}
.tool-name-input:focus{border-color:var(--accent)}
.toolbar-right{display:flex;gap:6px;align-items:center}
.tb{padding:6px 14px;border:none;border-radius:7px;font-family:'Outfit',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s}
.tb:active{transform:scale(.96)}
.tb-accent{background:var(--accent);color:var(--bg)}
.tb-gold{background:var(--gold);color:var(--bg)}
.tb-outline{background:none;border:1px solid var(--border);color:var(--text2)}
.tb-outline:hover{border-color:var(--text2);color:var(--text)}
.tb-red{background:var(--accent3);color:#fff}

/* Version dropdown */
.version-wrap{position:relative}
.version-dropdown{display:none;position:absolute;top:100%;left:0;margin-top:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;min-width:200px;max-height:240px;overflow-y:auto;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.version-dropdown.show{display:block}
.ver-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;font-size:13px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.ver-item:last-child{border:none}
.ver-item:hover{background:var(--surface2)}
.ver-item.active{color:var(--accent)}
.ver-label{font-weight:600}
.ver-time{color:var(--text2);font-size:12px}

/* Publish dropdown */
.publish-wrap{position:relative}
.publish-dropdown{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;min-width:180px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4);overflow:hidden}
.publish-dropdown.show{display:block}
.publish-dropdown button{display:block;width:100%;text-align:left;padding:10px 14px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .1s}
.publish-dropdown button:last-child{border:none}
.publish-dropdown button:hover{background:var(--surface2)}

/* Main layout */
.main{display:flex;flex:1;overflow:hidden}

/* Chat panel */
.chat-panel{width:360px;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);flex-shrink:0}
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:90%;animation:fadeIn .3s ease}
.chat-msg.user{align-self:flex-end}
.chat-msg.ai{align-self:flex-start}
.chat-msg.system{align-self:center;text-align:center}
.msg-role{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.chat-msg.user .msg-role{text-align:right}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word}
.chat-msg.user .msg-bubble{background:var(--accent2);color:#fff;border-bottom-right-radius:4px}
.chat-msg.ai .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-msg.system .msg-bubble{background:none;color:var(--text2);font-size:13px;font-style:italic}
.msg-bubble p{margin-bottom:6px}
.msg-bubble p:last-child{margin:0}

/* Typing indicator */
.typing{display:flex;gap:5px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;border-bottom-left-radius:4px;width:fit-content}
.typing .dot{width:8px;height:8px;background:var(--text2);border-radius:50%;animation:dotPulse 1.4s infinite ease-in-out}
.typing .dot:nth-child(2){animation-delay:.2s}
.typing .dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Chat input */
.chat-input-area{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.chat-input-area textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;resize:none;outline:none;min-height:42px;max-height:120px;line-height:1.4}
.chat-input-area textarea:focus{border-color:var(--accent)}
.chat-input-area textarea::placeholder{color:#3a4560}
.chat-send{width:42px;height:42px;border-radius:10px;border:none;background:var(--accent);color:var(--bg);font-size:18px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chat-send:hover{transform:scale(1.05)}
.chat-send:active{transform:scale(.95)}
.chat-send:disabled{background:var(--border);cursor:not-allowed;transform:none}

/* Right panel */
.right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.right-tabs{display:flex;gap:2px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.rt{padding:6px 16px;border:none;border-radius:6px;background:none;color:var(--text2);font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.rt:hover{color:var(--text);background:var(--surface2)}
.rt.active{background:var(--accent);color:var(--bg)}
.right-content{flex:1;overflow:hidden;position:relative}
.tab-pane{display:none;position:absolute;inset:0}
.tab-pane.active{display:flex;flex-direction:column}

/* Preview */
.preview-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);padding:40px}
#previewFrame{flex:1;border:none;background:#0a0e1a;width:100%}
.preview-bar{display:flex;justify-content:flex-end;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border)}

/* Code editor */
.code-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
#codeEditor{flex:1;background:var(--bg);color:var(--accent);font-family:'Space Mono',monospace;font-size:12px;line-height:1.6;padding:16px;border:none;resize:none;outline:none;overflow:auto}
.code-actions{display:flex;gap:8px;padding:10px 12px;background:var(--surface);border-top:1px solid var(--border)}

/* Templates */
.template-wrap{flex:1;overflow-y:auto;padding:20px}
.template-header{text-align:center;margin-bottom:20px}
.template-header h2{font-size:20px;font-weight:800;margin-bottom:4px}
.template-header p{font-size:15px;color:var(--text2)}
.template-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.template-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;text-align:center}
.template-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(6,214,160,.1)}
.template-emoji{font-size:36px;margin-bottom:8px;display:block}
.template-name{font-size:14px;font-weight:700;margin-bottom:4px}
.template-desc{font-size:13px;color:var(--text2);line-height:1.4}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--accent);color:var(--accent);padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:100;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Responsive */
@media(max-width:800px){
.chat-panel{width:280px}
.template-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
.main{flex-direction:column}
.chat-panel{width:100%;height:50%}
.toolbar-left{gap:6px}
.tool-name-input{width:100px}
}
</style>
</head>
<body>

<div class="toolbar">
<div class="toolbar-left">
<h1><span>ODA</span> Studio</h1>
<input type="text" class="tool-name-input" id="toolName" value="My Tool" placeholder="Tool name..." oninput="autoSave()">
<div class="version-wrap">
<button class="tb tb-outline" id="versionBtn" onclick="toggleVersions()">v1</button>
<div class="version-dropdown" id="versionDropdown"></div>
</div>
</div>
<div class="toolbar-right">
<div class="publish-wrap">
<button class="tb tb-accent" onclick="togglePublish()">Publish</button>
<div class="publish-dropdown" id="publishDropdown">
<button onclick="downloadTool()">Download HTML</button>
<button onclick="copyHTML()">Copy to Clipboard</button>
</div>
</div>
<button class="tb tb-outline" onclick="newProject()">+ New</button>
<a class="tb tb-outline" href="teacher.html" style="text-decoration:none">← Back</a>
</div>
</div>

<div class="main">
<div class="chat-panel">
<div class="chat-header">Chat</div>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input-area">
<textarea id="chatInput" placeholder="Describe what you want to build or change..." rows="1"></textarea>
<button class="chat-send" id="sendBtn" onclick="sendMessage()">→</button>
</div>
</div>

<div class="right-panel">
<div class="right-tabs">
<button class="rt active" onclick="switchRightTab('preview')" data-tab="preview">Preview</button>
<button class="rt" onclick="switchRightTab('code')" data-tab="code">&lt;/&gt; Code</button>
<button class="rt" onclick="switchRightTab('templates')" data-tab="templates">Templates</button>
</div>
<div class="right-content">
<div id="previewTab" class="tab-pane active">
<div class="preview-empty" id="previewEmpty">
<div style="font-size:48px;margin-bottom:12px">&#x1F3A8;</div>
<div style="font-size:16px;font-weight:700;margin-bottom:6px">No preview yet</div>
<div style="font-size:13px;color:var(--text2)">Pick a template or describe what you want to build</div>
</div>
<iframe id="previewFrame" style="display:none"></iframe>
</div>
<div id="codeTab" class="tab-pane">
<div class="code-wrap">
<textarea id="codeEditor" spellcheck="false" placeholder="Generated HTML will appear here..."></textarea>
<div class="code-actions">
<button class="tb tb-accent" onclick="applyCode()">Apply Changes</button>
<button class="tb tb-outline" onclick="copyHTML()">Copy</button>
</div>
</div>
</div>
<div id="templatesTab" class="tab-pane">
<div class="template-wrap">
<div class="template-header">
<h2>Start from a Template</h2>
<p>Pick one and customize it with AI, or start from scratch in the chat.</p>
</div>
<div class="template-grid" id="templateGrid"></div>
</div>
</div>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="js/oda-core.js"></script>
<script>
// ===== STATE =====
var messages=[];
var currentHTML='';
var versions=[];
var isGenerating=false;
var activeRightTab='preview';
var ENDPOINT=ODA_CONFIG.aiEndpoint;

var SYSTEM_PROMPT='You are ODA Studio, an AI that builds educational web tools for K-8 teachers and students.\n\nOUTPUT FORMAT — respond in EXACTLY this format:\n[MSG]Brief explanation of what you created or changed (2-3 sentences)[/MSG]\n[HTML]\n<!DOCTYPE html>\n<html lang="en">\n...complete self-contained HTML document...\n</html>\n[/HTML]\n\nDESIGN RULES:\n- Complete, self-contained HTML with inline <style> and <script>\n- Dark theme: body bg #0a0e1a, cards/surface #111827, borders #2a3450, accent #06d6a0, blue #118ab2, gold #ffd166, red #ef476f, text #f0f4ff, muted #8892a8\n- Font: Outfit from Google Fonts (import weights 400,600,700,800)\n- Responsive layout, max-width 600px centered\n- Include a back link at top: <a href="student.html" style="color:#8892a8;text-decoration:none;font-size:13px;font-weight:600">← Back to ODA Hub</a>\n- Educational, age-appropriate for K-8\n- Interactive with JavaScript (quizzes self-score, cards flip, etc.)\n- Modern UI: rounded corners (8-12px), subtle borders, smooth transitions\n- IMPORTANT: When modifying existing code, change ONLY what was requested. Preserve everything else.';

// ===== TEMPLATES =====
var TEMPLATES=[
{key:'quiz',name:'Multiple Choice Quiz',emoji:'&#x1F4DD;',desc:'Questions with scoring and results screen',html:'<!DOCTYPE html>\n<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Quiz</title>\n<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">\n<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0e1a;color:#f0f4ff;font-family:Outfit,sans-serif;min-height:100vh}.wrap{max-width:600px;margin:0 auto;padding:24px 16px}a.back{color:#8892a8;text-decoration:none;font-size:13px;font-weight:600}a.back:hover{color:#f0f4ff}h1{font-size:26px;font-weight:800;text-align:center;margin:20px 0 6px}.sub{text-align:center;color:#8892a8;font-size:14px;margin-bottom:20px}.sb{display:flex;justify-content:space-between;background:#111827;border:1px solid #2a3450;border-radius:10px;padding:12px 20px;margin-bottom:16px}.sb span:last-child{font-size:18px;font-weight:800;color:#06d6a0}.qc{background:#111827;border:1px solid #2a3450;border-radius:12px;padding:20px;margin-bottom:14px}.qn{font-size:11px;color:#118ab2;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}.qt{font-size:16px;font-weight:700;margin-bottom:12px}.opt{padding:11px 14px;background:#1a2235;border:2px solid #2a3450;border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s}.opt:hover{border-color:#118ab2}.opt.correct{border-color:#06d6a0;background:rgba(6,214,160,.12)}.opt.wrong{border-color:#ef476f;background:rgba(239,71,111,.12)}.opt.off{pointer-events:none;opacity:.7}.res{text-align:center;background:#111827;border:1px solid #2a3450;border-radius:12px;padding:32px;display:none}.res h2{font-size:22px;font-weight:800;margin-bottom:4px}.big{font-size:48px;font-weight:800;color:#06d6a0;margin:14px 0}.msg{color:#8892a8;margin-bottom:16px}.btn{padding:12px 28px;border-radius:10px;font-family:Outfit,sans-serif;font-weight:700;font-size:14px;border:none;cursor:pointer;background:#06d6a0;color:#0a0e1a}</style></head><body><div class="wrap"><a class="back" href="student.html">&larr; Back to ODA Hub</a><h1>Sample Quiz</h1><p class="sub">Pick the correct answer for each question.</p><div class="sb"><span style="color:#8892a8;font-size:13px">Score</span><span id="score">0 / 3</span></div><div id="qs"><div class="qc" data-c="1"><div class="qn">Question 1 of 3</div><div class="qt">What planet is known as the Red Planet?</div><div class="opt" onclick="pick(this,0)">Venus</div><div class="opt" onclick="pick(this,1)">Mars</div><div class="opt" onclick="pick(this,2)">Jupiter</div><div class="opt" onclick="pick(this,3)">Saturn</div></div><div class="qc" data-c="2"><div class="qn">Question 2 of 3</div><div class="qt">How many sides does a hexagon have?</div><div class="opt" onclick="pick(this,0)">5</div><div class="opt" onclick="pick(this,1)">7</div><div class="opt" onclick="pick(this,2)">6</div><div class="opt" onclick="pick(this,3)">8</div></div><div class="qc" data-c="0"><div class="qn">Question 3 of 3</div><div class="qt">What is the largest ocean on Earth?</div><div class="opt" onclick="pick(this,0)">Pacific Ocean</div><div class="opt" onclick="pick(this,1)">Atlantic Ocean</div><div class="opt" onclick="pick(this,2)">Indian Ocean</div><div class="opt" onclick="pick(this,3)">Arctic Ocean</div></div></div><div class="res" id="res"><h2>Quiz Complete!</h2><div class="big" id="fs">0%</div><div class="msg" id="rm">Nice try!</div><button class="btn" onclick="location.reload()">Try Again</button></div></div><script>var cor=0,tot=document.querySelectorAll(".qc").length,ans=0;function pick(el,i){var c=el.closest(".qc");if(c.classList.contains("done"))return;c.classList.add("done");var os=c.querySelectorAll(".opt"),ci=parseInt(c.dataset.c);os.forEach(function(o,j){o.classList.add("off");if(j===ci)o.classList.add("correct")});if(i!==ci)el.classList.add("wrong");else cor++;ans++;document.getElementById("score").textContent=cor+" / "+tot;if(ans===tot)setTimeout(function(){var p=Math.round(cor/tot*100);document.getElementById("fs").textContent=p+"%";document.getElementById("rm").textContent=p===100?"Perfect score!":p>=70?"Great job!":"Keep practicing!";document.getElementById("res").style.display="block"},500)}<\/script></body></html>'},
{key:'flashcards',name:'Flashcard Set',emoji:'&#x1F4C7;',desc:'Flip cards with navigation for studying',html:'<!DOCTYPE html>\n<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Flashcards</title>\n<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">\n<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0e1a;color:#f0f4ff;font-family:Outfit,sans-serif;min-height:100vh}.wrap{max-width:600px;margin:0 auto;padding:24px 16px;text-align:center}a.back{color:#8892a8;text-decoration:none;font-size:13px;font-weight:600;float:left}h1{font-size:26px;font-weight:800;margin:20px 0 6px;clear:both}.sub{color:#8892a8;font-size:14px;margin-bottom:24px}.counter{color:#8892a8;font-size:13px;margin-bottom:16px}.card-wrap{perspective:600px;margin-bottom:24px;cursor:pointer}.card{width:100%;min-height:260px;position:relative;transition:transform .5s;transform-style:preserve-3d}.card.flipped{transform:rotateY(180deg)}.face{position:absolute;inset:0;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;padding:32px;border-radius:16px;font-size:20px;font-weight:700;line-height:1.4}.front{background:#111827;border:2px solid #2a3450}.back{background:#1a2235;border:2px solid #118ab2;transform:rotateY(180deg)}.hint{color:#8892a8;font-size:12px;margin-bottom:16px}.navs{display:flex;gap:12px;justify-content:center}.navs button{padding:10px 24px;border-radius:10px;font-family:Outfit,sans-serif;font-weight:700;font-size:14px;border:none;cursor:pointer;background:#1a2235;color:#f0f4ff;border:1px solid #2a3450;transition:all .15s}.navs button:hover{border-color:#06d6a0;color:#06d6a0}</style></head><body><div class="wrap"><a class="back" href="student.html">&larr; Back to ODA Hub</a><h1>Study Flashcards</h1><p class="sub">Click a card to flip it. Use arrows to navigate.</p><div class="counter" id="counter">1 / 4</div><div class="card-wrap" onclick="flip()"><div class="card" id="card"><div class="face front" id="front">What is the capital of France?</div><div class="face back" id="back">Paris</div></div></div><p class="hint">Click card to flip</p><div class="navs"><button onclick="prev()">&#8592; Prev</button><button onclick="next()">Next &#8594;</button></div></div><script>var cards=[{q:"What is the capital of France?",a:"Paris"},{q:"What is 7 x 8?",a:"56"},{q:"What gas do plants breathe in?",a:"Carbon Dioxide (CO\\u2082)"},{q:"Who wrote Romeo and Juliet?",a:"William Shakespeare"}];var idx=0;function show(){document.getElementById("front").textContent=cards[idx].q;document.getElementById("back").textContent=cards[idx].a;document.getElementById("card").classList.remove("flipped");document.getElementById("counter").textContent=(idx+1)+" / "+cards.length}function flip(){document.getElementById("card").classList.toggle("flipped")}function next(){idx=(idx+1)%cards.length;show()}function prev(){idx=(idx-1+cards.length)%cards.length;show()}document.addEventListener("keydown",function(e){if(e.key==="ArrowRight")next();if(e.key==="ArrowLeft")prev();if(e.key===" ")flip()});show()<\/script></body></html>'},
{key:'matching',name:'Matching Game',emoji:'&#x1F517;',desc:'Match terms to definitions by clicking pairs',html:'<!DOCTYPE html>\n<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Matching Game</title>\n<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">\n<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0e1a;color:#f0f4ff;font-family:Outfit,sans-serif;min-height:100vh}.wrap{max-width:600px;margin:0 auto;padding:24px 16px}a.back{color:#8892a8;text-decoration:none;font-size:13px;font-weight:600}h1{font-size:26px;font-weight:800;text-align:center;margin:20px 0 6px}.sub{text-align:center;color:#8892a8;font-size:14px;margin-bottom:20px}.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}.col-title{font-size:11px;font-weight:700;color:#8892a8;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;text-align:center}.item{padding:14px;background:#111827;border:2px solid #2a3450;border-radius:10px;margin-bottom:8px;cursor:pointer;font-size:14px;font-weight:600;text-align:center;transition:all .15s;user-select:none}.item:hover{border-color:#118ab2}.item.selected{border-color:#ffd166;background:rgba(255,209,102,.06)}.item.matched{border-color:#06d6a0;background:rgba(6,214,160,.08);pointer-events:none;opacity:.7}.status{text-align:center;margin-top:16px;font-size:14px;font-weight:600;min-height:24px}.btn{display:block;margin:16px auto 0;padding:12px 28px;border-radius:10px;font-family:Outfit,sans-serif;font-weight:700;font-size:14px;border:none;cursor:pointer;background:#06d6a0;color:#0a0e1a}</style></head><body><div class="wrap"><a class="back" href="student.html">&larr; Back to ODA Hub</a><h1>Matching Game</h1><p class="sub">Click a term, then click its matching definition.</p><div class="cols"><div><div class="col-title">Terms</div><div id="terms"></div></div><div><div class="col-title">Definitions</div><div id="defs"></div></div></div><div class="status" id="status"></div></div><script>var pairs=[{t:"H\\u2082O",d:"Water"},{t:"Photosynthesis",d:"Plants making food from sunlight"},{t:"Habitat",d:"Where an organism lives"},{t:"Erosion",d:"Wearing away of land by wind or water"}];var sel=null,matched=0;function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp}return a}function init(){var tEl=document.getElementById("terms"),dEl=document.getElementById("defs");var ts=pairs.map(function(p,i){return{text:p.t,idx:i}});var ds=pairs.map(function(p,i){return{text:p.d,idx:i}});shuffle(ts);shuffle(ds);tEl.innerHTML="";dEl.innerHTML="";ts.forEach(function(t){var d=document.createElement("div");d.className="item";d.textContent=t.text;d.dataset.idx=t.idx;d.dataset.side="t";d.onclick=function(){pick(d)};tEl.appendChild(d)});ds.forEach(function(dd){var d=document.createElement("div");d.className="item";d.textContent=dd.text;d.dataset.idx=dd.idx;d.dataset.side="d";d.onclick=function(){pick(d)};dEl.appendChild(d)})}function pick(el){if(el.classList.contains("matched"))return;if(!sel){sel=el;el.classList.add("selected");return}if(sel.dataset.side===el.dataset.side){sel.classList.remove("selected");sel=el;el.classList.add("selected");return}if(sel.dataset.idx===el.dataset.idx){sel.classList.remove("selected");sel.classList.add("matched");el.classList.add("matched");matched++;document.getElementById("status").textContent="Matched! "+(pairs.length-matched)+" remaining";sel=null;if(matched===pairs.length){document.getElementById("status").innerHTML="All matched! Great job! <button class=\\"btn\\" onclick=\\"location.reload()\\">Play Again</button>"}}else{sel.classList.remove("selected");el.classList.add("selected");setTimeout(function(){el.classList.remove("selected")},300);document.getElementById("status").textContent="Not a match. Try again!";sel=null}}init()<\/script></body></html>'},
{key:'fillin',name:'Fill in the Blank',emoji:'&#x270D;&#xFE0F;',desc:'Type answers into blanks and check',html:'<!DOCTYPE html>\n<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Fill in the Blank</title>\n<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">\n<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0e1a;color:#f0f4ff;font-family:Outfit,sans-serif;min-height:100vh}.wrap{max-width:600px;margin:0 auto;padding:24px 16px}a.back{color:#8892a8;text-decoration:none;font-size:13px;font-weight:600}h1{font-size:26px;font-weight:800;text-align:center;margin:20px 0 6px}.sub{text-align:center;color:#8892a8;font-size:14px;margin-bottom:24px}.card{background:#111827;border:1px solid #2a3450;border-radius:12px;padding:20px;margin-bottom:14px;font-size:15px;line-height:2}.blank{display:inline-block;width:120px;padding:4px 8px;background:#1a2235;border:2px solid #2a3450;border-radius:6px;color:#f0f4ff;font-family:Outfit,sans-serif;font-size:14px;font-weight:600;text-align:center;outline:none;transition:border-color .2s}.blank:focus{border-color:#118ab2}.blank.correct{border-color:#06d6a0;background:rgba(6,214,160,.08)}.blank.wrong{border-color:#ef476f;background:rgba(239,71,111,.08)}.btn{display:block;margin:20px auto;padding:12px 32px;border-radius:10px;font-family:Outfit,sans-serif;font-weight:700;font-size:15px;border:none;cursor:pointer;background:#06d6a0;color:#0a0e1a}.result{text-align:center;font-size:16px;font-weight:700;margin-top:12px;min-height:24px}</style></head><body><div class="wrap"><a class="back" href="student.html">&larr; Back to ODA Hub</a><h1>Fill in the Blank</h1><p class="sub">Type the correct word in each blank.</p><div class="card">The largest planet in our solar system is <input class="blank" data-answer="Jupiter" placeholder="?">.</div><div class="card">Water freezes at <input class="blank" data-answer="32" placeholder="?"> degrees Fahrenheit.</div><div class="card">There are <input class="blank" data-answer="7" placeholder="?"> continents on Earth.</div><div class="card">The process by which plants make food using sunlight is called <input class="blank" data-answer="photosynthesis" placeholder="?">.</div><button class="btn" onclick="check()">Check Answers</button><div class="result" id="result"></div></div><script>function check(){var blanks=document.querySelectorAll(".blank");var correct=0;blanks.forEach(function(b){var ans=b.dataset.answer.toLowerCase().trim();var val=b.value.toLowerCase().trim();b.classList.remove("correct","wrong");if(val===ans){b.classList.add("correct");correct++}else{b.classList.add("wrong")}});document.getElementById("result").textContent=correct+" / "+blanks.length+" correct!"+(correct===blanks.length?" Perfect!":"")}<\/script></body></html>'},
{key:'truefalse',name:'True or False',emoji:'&#x2705;',desc:'Statements with true/false buttons and scoring',html:'<!DOCTYPE html>\n<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>True or False</title>\n<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">\n<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0e1a;color:#f0f4ff;font-family:Outfit,sans-serif;min-height:100vh}.wrap{max-width:600px;margin:0 auto;padding:24px 16px}a.back{color:#8892a8;text-decoration:none;font-size:13px;font-weight:600}h1{font-size:26px;font-weight:800;text-align:center;margin:20px 0 6px}.sub{text-align:center;color:#8892a8;font-size:14px;margin-bottom:20px}.sb{display:flex;justify-content:space-between;background:#111827;border:1px solid #2a3450;border-radius:10px;padding:12px 20px;margin-bottom:16px}.sb .sc{font-size:18px;font-weight:800;color:#06d6a0}.card{background:#111827;border:1px solid #2a3450;border-radius:12px;padding:20px;margin-bottom:12px}.stmt{font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.5}.btns{display:flex;gap:10px}.btns button{flex:1;padding:10px;border-radius:8px;font-family:Outfit,sans-serif;font-weight:700;font-size:14px;border:2px solid #2a3450;cursor:pointer;transition:all .15s;background:#1a2235;color:#f0f4ff}.btns button:hover{border-color:#118ab2}.btns button.right{border-color:#06d6a0;background:rgba(6,214,160,.1);color:#06d6a0}.btns button.nope{border-color:#ef476f;background:rgba(239,71,111,.1);color:#ef476f}.btns button.off{pointer-events:none;opacity:.6}.fb{font-size:12px;margin-top:8px;font-weight:600;min-height:18px}</style></head><body><div class="wrap"><a class="back" href="student.html">&larr; Back to ODA Hub</a><h1>True or False</h1><p class="sub">Decide if each statement is true or false.</p><div class="sb"><span style="color:#8892a8;font-size:13px">Score</span><span class="sc" id="score">0 / 4</span></div><div id="cards"></div></div><script>var items=[{s:"The Sun is a star.",a:true},{s:"Spiders are insects.",a:false},{s:"The Great Wall of China is visible from space with the naked eye.",a:false},{s:"Sound travels faster in water than in air.",a:true}];var cor=0,done=0;function init(){var el=document.getElementById("cards");items.forEach(function(item,i){var d=document.createElement("div");d.className="card";d.id="c"+i;d.innerHTML=\'<div class="stmt">\'+item.s+\'</div><div class="btns"><button onclick="ans(\'+i+\',true)">True</button><button onclick="ans(\'+i+\',false)">False</button></div><div class="fb" id="fb\'+i+\'"></div>\';el.appendChild(d)})}function ans(i,v){var card=document.getElementById("c"+i);if(card.classList.contains("done"))return;card.classList.add("done");var btns=card.querySelectorAll("button");var fb=document.getElementById("fb"+i);btns.forEach(function(b){b.classList.add("off")});if(v===items[i].a){cor++;btns.forEach(function(b){if((v&&b.textContent==="True")||(!v&&b.textContent==="False"))b.classList.add("right")});fb.style.color="#06d6a0";fb.textContent="Correct!"}else{btns.forEach(function(b){if((v&&b.textContent==="True")||(!v&&b.textContent==="False"))b.classList.add("nope");if((items[i].a&&b.textContent==="True")||(!items[i].a&&b.textContent==="False"))b.classList.add("right")});fb.style.color="#ef476f";fb.textContent="Incorrect. The answer is "+(items[i].a?"True":"False")+"."}done++;document.getElementById("score").textContent=cor+" / "+items.length}init()<\/script></body></html>'},
{key:'timer',name:'Timed Writing',emoji:'&#x23F1;&#xFE0F;',desc:'Writing prompt with a countdown timer',html:'<!DOCTYPE html>\n<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Timed Writing</title>\n<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">\n<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0e1a;color:#f0f4ff;font-family:Outfit,sans-serif;min-height:100vh}.wrap{max-width:600px;margin:0 auto;padding:24px 16px}a.back{color:#8892a8;text-decoration:none;font-size:13px;font-weight:600}h1{font-size:26px;font-weight:800;text-align:center;margin:20px 0 6px}.sub{text-align:center;color:#8892a8;font-size:14px;margin-bottom:20px}.prompt-card{background:#111827;border:1px solid #2a3450;border-radius:12px;padding:24px;margin-bottom:16px;text-align:center}.prompt-card .label{font-size:11px;color:#118ab2;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}.prompt-card .text{font-size:18px;font-weight:700;line-height:1.5}.timer-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}.timer-display{font-family:"Space Mono",monospace;font-size:32px;font-weight:700;color:#06d6a0}.timer-display.warn{color:#ffd166}.timer-display.danger{color:#ef476f}.timer-btns{display:flex;gap:8px}.timer-btns button{padding:8px 16px;border-radius:8px;font-family:Outfit,sans-serif;font-weight:700;font-size:13px;border:none;cursor:pointer;transition:all .15s}.btn-start{background:#06d6a0;color:#0a0e1a}.btn-reset{background:#1a2235;color:#f0f4ff;border:1px solid #2a3450}textarea{width:100%;min-height:200px;background:#111827;border:1px solid #2a3450;border-radius:12px;padding:16px;color:#f0f4ff;font-family:Outfit,sans-serif;font-size:15px;line-height:1.6;resize:vertical;outline:none}textarea:focus{border-color:#118ab2}.wc{text-align:right;color:#8892a8;font-size:12px;margin-top:6px}</style></head><body><div class="wrap"><a class="back" href="student.html">&larr; Back to ODA Hub</a><h1>Timed Writing</h1><p class="sub">Read the prompt, start the timer, and write!</p><div class="prompt-card"><div class="label">Writing Prompt</div><div class="text">If you could have any superpower for one day, what would it be and what would you do?</div></div><div class="timer-bar"><div class="timer-display" id="timer">5:00</div><div class="timer-btns"><button class="btn-start" id="startBtn" onclick="toggle()">Start</button><button class="btn-reset" onclick="reset()">Reset</button></div></div><textarea id="writing" placeholder="Start writing here..."></textarea><div class="wc" id="wc">0 words</div></div><script>var total=300,left=300,running=false,interval=null;function fmt(s){var m=Math.floor(s/60),ss=s%60;return m+":"+(ss<10?"0":"")+ss}function render(){var el=document.getElementById("timer");el.textContent=fmt(left);el.className="timer-display"+(left<=30?" danger":left<=60?" warn":"")}function toggle(){if(running){running=false;clearInterval(interval);document.getElementById("startBtn").textContent="Resume"}else{running=true;document.getElementById("startBtn").textContent="Pause";interval=setInterval(function(){left--;render();if(left<=0){clearInterval(interval);running=false;document.getElementById("startBtn").textContent="Done";document.getElementById("startBtn").disabled=true}},1000)}}function reset(){clearInterval(interval);running=false;left=total;render();document.getElementById("startBtn").textContent="Start";document.getElementById("startBtn").disabled=false}document.getElementById("writing").addEventListener("input",function(){var w=this.value.trim().split(/\\s+/).filter(function(x){return x}).length;document.getElementById("wc").textContent=w+" word"+(w!==1?"s":"")});render()<\/script></body></html>'}
];

// ===== CHAT RENDERING =====
function renderChat(){
var el=document.getElementById('chatMessages');
var h='';
messages.forEach(function(m){
h+='<div class="chat-msg '+m.role+'">';
h+='<div class="msg-role">'+(m.role==='user'?'You':m.role==='ai'?'ODA Studio':'')+'</div>';
h+='<div class="msg-bubble">'+formatMsg(m.content)+'</div>';
h+='</div>';
});
el.innerHTML=h;
el.scrollTop=el.scrollHeight;
}

function formatMsg(text){
return text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
}

function addMessage(role,content){
messages.push({role:role,content:content});
renderChat();
autoSave();
}

function showTyping(){
var el=document.getElementById('chatMessages');
el.innerHTML+='<div class="chat-msg ai" id="typingMsg"><div class="msg-role">ODA Studio</div><div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
el.scrollTop=el.scrollHeight;
}

function hideTyping(){
var t=document.getElementById('typingMsg');
if(t)t.remove();
}

// ===== AI INTEGRATION =====
function sendMessage(){
if(isGenerating)return;
var input=document.getElementById('chatInput');
var text=input.value.trim();
if(!text)return;
input.value='';
input.style.height='auto';
addMessage('user',text);
callAI(text);
}

async function callAI(userMsg){
isGenerating=true;
var btn=document.getElementById('sendBtn');
btn.disabled=true;
showTyping();

// Save version before AI changes
if(currentHTML)saveVersion('Before: '+userMsg.substring(0,30));

var prompt=SYSTEM_PROMPT+'\n\n';
if(currentHTML){
prompt+='CURRENT TOOL CODE:\n'+currentHTML+'\n\n';
}else{
prompt+='CURRENT TOOL: None — create a new tool from scratch.\n\n';
}
prompt+='USER REQUEST: '+userMsg;

try{
var resp=await fetch(ENDPOINT,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({prompt:prompt})
});
if(!resp.ok)throw new Error('Server error '+resp.status);
var data=await resp.json();
var text='';
if(data.content&&Array.isArray(data.content)){
text=data.content.map(function(c){return c.text||''}).join('');
}else if(typeof data==='string'){
text=data;
}else{
text=JSON.stringify(data);
}
hideTyping();
var parsed=parseAIResponse(text);
if(parsed.html){
currentHTML=parsed.html;
updatePreview(currentHTML);
syncCodeEditor();
saveVersion(userMsg.substring(0,40));
addMessage('ai',parsed.msg||'Here\'s your updated tool! Check the preview.');
switchRightTab('preview');
}else{
addMessage('ai',parsed.msg||text.substring(0,500));
}
}catch(e){
hideTyping();
console.error('AI error:',e);
addMessage('ai','Something went wrong connecting to AI. You can still use templates or edit code directly.');
}
isGenerating=false;
btn.disabled=false;
}

function parseAIResponse(text){
var msg='',html='';
// Try [MSG]...[/MSG] and [HTML]...[/HTML]
var msgMatch=text.match(/\[MSG\]([\s\S]*?)\[\/MSG\]/);
var htmlMatch=text.match(/\[HTML\]([\s\S]*?)\[\/HTML\]/);
if(msgMatch)msg=msgMatch[1].trim();
if(htmlMatch)html=htmlMatch[1].trim();
// Fallback: try to find HTML document in response
if(!html){
var docMatch=text.match(/(<!DOCTYPE html[\s\S]*<\/html>)/i);
if(docMatch)html=docMatch[1].trim();
}
// Fallback: check for markdown code blocks
if(!html){
var codeMatch=text.match(/```(?:html)?\s*(<!DOCTYPE[\s\S]*?<\/html>)\s*```/i);
if(codeMatch)html=codeMatch[1].trim();
}
// If we found HTML but no message, extract text before the HTML
if(html&&!msg){
var before=text.split(html)[0]||'';
before=before.replace(/```html|```|\[HTML\]|\[MSG\]/g,'').trim();
msg=before||'Here\'s your tool!';
}
return{msg:msg,html:html};
}

// ===== PREVIEW =====
function updatePreview(html){
var frame=document.getElementById('previewFrame');
var empty=document.getElementById('previewEmpty');
frame.style.display='block';
empty.style.display='none';
frame.srcdoc=html;
}

// ===== RIGHT TABS =====
function switchRightTab(tab){
activeRightTab=tab;
document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active')});
document.querySelectorAll('.rt').forEach(function(t){t.classList.remove('active')});
document.getElementById(tab+'Tab').classList.add('active');
document.querySelector('.rt[data-tab="'+tab+'"]').classList.add('active');
if(tab==='code')syncCodeEditor();
}

// ===== CODE EDITOR =====
function syncCodeEditor(){
document.getElementById('codeEditor').value=currentHTML;
}

function applyCode(){
var code=document.getElementById('codeEditor').value;
if(!code.trim())return;
if(currentHTML)saveVersion('Manual edit');
currentHTML=code;
updatePreview(currentHTML);
showToast('Changes applied!');
autoSave();
}

// ===== TEMPLATES =====
function renderTemplates(){
var grid=document.getElementById('templateGrid');
var h='';
TEMPLATES.forEach(function(t){
h+='<div class="template-card" onclick="loadTemplate(\''+t.key+'\')">';
h+='<span class="template-emoji">'+t.emoji+'</span>';
h+='<div class="template-name">'+t.name+'</div>';
h+='<div class="template-desc">'+t.desc+'</div>';
h+='</div>';
});
grid.innerHTML=h;
}

function loadTemplate(key){
var t=TEMPLATES.find(function(x){return x.key===key});
if(!t)return;
if(currentHTML)saveVersion('Before template');
currentHTML=t.html;
updatePreview(currentHTML);
syncCodeEditor();
saveVersion('Template: '+t.name);
document.getElementById('toolName').value=t.name;
addMessage('system','Started from the '+t.name+' template.');
addMessage('ai','I loaded the **'+t.name+'** template. You can see it in the preview! Tell me what you\'d like to change — subject, grade level, questions, colors, anything.');
switchRightTab('preview');
autoSave();
}

// ===== VERSION HISTORY =====
function saveVersion(label){
versions.push({html:currentHTML,label:label||'Version '+(versions.length+1),time:Date.now()});
if(versions.length>30)versions.shift();
updateVersionBtn();
autoSave();
}

function restoreVersion(idx){
if(idx<0||idx>=versions.length)return;
currentHTML=versions[idx].html;
updatePreview(currentHTML);
syncCodeEditor();
addMessage('system','Restored: '+versions[idx].label);
toggleVersions();
autoSave();
}

function updateVersionBtn(){
document.getElementById('versionBtn').textContent='v'+versions.length;
}

function toggleVersions(){
var dd=document.getElementById('versionDropdown');
dd.classList.toggle('show');
if(dd.classList.contains('show')){
var h='';
if(!versions.length){
h='<div style="padding:12px;color:var(--text2);font-size:12px;text-align:center">No versions yet</div>';
}else{
for(var i=versions.length-1;i>=0;i--){
var v=versions[i];
var ago=timeAgo(v.time);
h+='<div class="ver-item'+(i===versions.length-1?' active':'')+'" onclick="restoreVersion('+i+')">';
h+='<span class="ver-label">'+esc(v.label)+'</span>';
h+='<span class="ver-time">'+ago+'</span>';
h+='</div>';
}
}
dd.innerHTML=h;
}
}

function timeAgo(ts){
var d=Math.floor((Date.now()-ts)/1000);
if(d<60)return 'just now';
if(d<3600)return Math.floor(d/60)+'m ago';
if(d<86400)return Math.floor(d/3600)+'h ago';
return Math.floor(d/86400)+'d ago';
}

// ===== PUBLISH =====
function togglePublish(){
document.getElementById('publishDropdown').classList.toggle('show');
}

function downloadTool(){
var name=(document.getElementById('toolName').value||'tool').toLowerCase().replace(/[^a-z0-9]+/g,'-')+'.html';
var blob=new Blob([currentHTML],{type:'text/html'});
var a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download=name;
a.click();
URL.revokeObjectURL(a.href);
togglePublish();
showToast('Downloaded!');
}

function copyHTML(){
if(!currentHTML){showToast('Nothing to copy yet');return}
navigator.clipboard.writeText(currentHTML).then(function(){showToast('Copied to clipboard!')});
var dd=document.getElementById('publishDropdown');
if(dd.classList.contains('show'))togglePublish();
}

// ===== PERSISTENCE =====
function autoSave(){
try{
var state={toolName:document.getElementById('toolName').value,currentHTML:currentHTML,messages:messages,versions:versions};
localStorage.setItem('oda-studio-project',JSON.stringify(state));
}catch(e){}
}

function autoLoad(){
try{
var raw=localStorage.getItem('oda-studio-project');
if(!raw)return false;
var state=JSON.parse(raw);
if(state.toolName)document.getElementById('toolName').value=state.toolName;
if(state.messages)messages=state.messages;
if(state.versions)versions=state.versions;
if(state.currentHTML){
currentHTML=state.currentHTML;
updatePreview(currentHTML);
}
updateVersionBtn();
return !!(state.currentHTML || (state.messages && state.messages.length > 0));
}catch(e){return false}
}

function newProject(){
if(currentHTML&&!confirm('Start a new project? Current work is saved in version history.'))return;
messages=[];
currentHTML='';
versions=[];
document.getElementById('toolName').value='My Tool';
document.getElementById('previewFrame').style.display='none';
document.getElementById('previewEmpty').style.display='flex';
document.getElementById('codeEditor').value='';
updateVersionBtn();
localStorage.removeItem('oda-studio-project');
addMessage('ai','Fresh start! Pick a template or describe what you want to build.');
switchRightTab('templates');
}

// ===== UTILITY =====
function showToast(msg){
var t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
setTimeout(function(){t.classList.remove('show')},2000);
}

// Close dropdowns on outside click
document.addEventListener('click',function(e){
if(!e.target.closest('.version-wrap'))document.getElementById('versionDropdown').classList.remove('show');
if(!e.target.closest('.publish-wrap'))document.getElementById('publishDropdown').classList.remove('show');
});

// Enter to send, Shift+Enter for newline
document.getElementById('chatInput').addEventListener('keydown',function(e){
if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
});

// Auto-resize textarea
document.getElementById('chatInput').addEventListener('input',function(){
this.style.height='auto';
this.style.height=Math.min(this.scrollHeight,120)+'px';
});

// ===== INIT =====
renderTemplates();
var hadSaved=autoLoad();
if(hadSaved){
renderChat();
if(!currentHTML)switchRightTab('templates');
}else{
addMessage('ai','Welcome to ODA Studio! I can build educational tools, quizzes, games, and interactive lessons for your students.\n\nPick a **template** from the right panel to get started, or just describe what you want to build.');
switchRightTab('templates');
}
</script>
</body>
</html>
