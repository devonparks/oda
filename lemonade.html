<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODA Lemonade Day</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FFF8E1;font-family:'Quicksand',sans-serif;min-height:100vh}
.wrap{max-width:700px;margin:0 auto;padding:20px 16px}
.back-link{display:inline-block;margin-bottom:16px;font-family:'Fredoka',sans-serif;font-size:14px;color:#F59E0B;text-decoration:none;font-weight:600}
.back-link:hover{color:#D97706}
.hdr{text-align:center;margin-bottom:24px}
.hdr .emoji{font-size:64px;margin-bottom:8px}
.hdr h1{font-family:'Fredoka',sans-serif;font-size:36px;font-weight:700;background:linear-gradient(135deg,#F59E0B,#EF4444,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:15px;color:#92400E;font-weight:600;margin-top:4px}

/* Cards */
.card{background:#fff;border-radius:24px;padding:28px 24px;box-shadow:0 8px 32px rgba(245,158,11,.1),0 2px 8px rgba(0,0,0,.04);margin-bottom:20px}
.card-title{font-family:'Fredoka',sans-serif;font-size:24px;font-weight:700;color:#92400E;margin-bottom:12px;text-align:center}

/* Video */
.video-wrap{position:relative;width:100%;padding-bottom:56.25%;border-radius:16px;overflow:hidden;margin-bottom:16px;background:#000}
.video-wrap iframe,.video-wrap video{position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:16px}
.video-blocked{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;color:#fff;text-align:center;padding:20px}
.video-blocked .vb-emoji{font-size:48px;margin-bottom:8px}
.video-blocked .vb-text{font-size:14px;color:#aaa;margin-bottom:12px}
.video-blocked a{color:#F59E0B;font-weight:700;text-decoration:none}

/* Story */
.story-box{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-radius:16px;padding:20px;margin-bottom:16px;border:2px solid rgba(245,158,11,.15)}
.story-box p{font-size:16px;color:#78350F;line-height:1.7;font-weight:500}
.story-box strong{color:#92400E}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0}
.stat{text-align:center;background:linear-gradient(135deg,#FFF7ED,#FFEDD5);border-radius:14px;padding:14px 8px;border:2px solid rgba(245,158,11,.1)}
.stat .num{font-family:'Fredoka',sans-serif;font-size:24px;font-weight:700;color:#EA580C}
.stat .label{font-size:11px;color:#9A3412;font-weight:600;margin-top:2px}

/* Mission */
.mission{background:linear-gradient(135deg,#DC2626,#EF4444);border-radius:20px;padding:24px;text-align:center;margin-bottom:16px}
.mission h2{font-family:'Fredoka',sans-serif;font-size:22px;color:#fff;margin-bottom:8px}
.mission p{font-size:16px;color:#FEE2E2;font-weight:600;line-height:1.6}
.mission .big{font-family:'Fredoka',sans-serif;font-size:28px;color:#FDE68A;font-weight:700;display:block;margin-top:8px}

/* Rules */
.rules{background:#FFF7ED;border-radius:16px;padding:20px;margin-bottom:16px;border:2px solid rgba(245,158,11,.1)}
.rules h3{font-family:'Fredoka',sans-serif;font-size:18px;color:#92400E;margin-bottom:12px}
.rule{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.rule:last-child{margin-bottom:0}
.rule .ico{font-size:22px;flex-shrink:0}
.rule .txt{font-size:15px;color:#78350F;font-weight:500;line-height:1.5}
.roles-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.role-tag{background:#fff;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:600;color:#92400E;border:1px solid rgba(245,158,11,.2)}

/* Buttons */
.btn{font-family:'Fredoka',sans-serif;font-weight:600;border:none;cursor:pointer;letter-spacing:.5px;transition:all .15s;display:inline-block;text-align:center;border-radius:18px;color:#fff}
.btn:active{transform:translateY(4px)!important}
.btn:disabled{background:#ccc!important;cursor:not-allowed;box-shadow:none!important;color:#999!important}
.btn-large{padding:18px 40px;font-size:22px}
.btn-normal{padding:14px 28px;font-size:18px}
.btn-small{padding:10px 20px;font-size:15px}
.btn-orange{background:#F59E0B;box-shadow:0 6px 0 rgba(217,119,6,.6)}
.btn-red{background:#EF4444;box-shadow:0 6px 0 rgba(220,38,38,.5)}
.btn-green{background:#10B981;box-shadow:0 6px 0 rgba(16,185,129,.5)}
.btn-blue{background:#3B82F6;box-shadow:0 6px 0 rgba(59,130,246,.5)}
.btn-purple{background:#8B5CF6;box-shadow:0 6px 0 rgba(139,92,246,.5)}
.btn-gray{background:#9CA3AF;box-shadow:0 6px 0 rgba(107,114,128,.5)}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px}

/* Inputs */
.input{width:100%;padding:14px;border-radius:14px;border:3px solid #FDE68A;font-family:'Quicksand',sans-serif;font-size:18px;color:#92400E;outline:none;background:#FFFBEB;font-weight:600;transition:border-color .2s;margin-bottom:12px}
.input:focus{border-color:#F59E0B}
.input::placeholder{color:#D4A84A}
textarea.input{resize:vertical;min-height:100px;font-size:16px;line-height:1.6}
.input-label{font-family:'Fredoka',sans-serif;font-size:16px;color:#92400E;font-weight:600;margin-bottom:6px;display:block}

/* Workspace tabs */
.ws-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;-webkit-overflow-scrolling:touch}
.ws-tab{font-family:'Fredoka',sans-serif;font-size:14px;font-weight:600;padding:10px 16px;border-radius:12px;border:2px solid #FDE68A;background:#FFFBEB;color:#92400E;cursor:pointer;white-space:nowrap;transition:all .2s}
.ws-tab:hover{border-color:#F59E0B}
.ws-tab.active{background:#F59E0B;color:#fff;border-color:#F59E0B}
.ws-panel{display:none;animation:fadeUp .3s ease}
.ws-panel.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Supply table */
.supply-table{width:100%;border-collapse:separate;border-spacing:0 6px}
.supply-table th{font-family:'Fredoka',sans-serif;font-size:13px;color:#92400E;text-align:left;padding:4px 8px}
.supply-row{background:#FFFBEB;border-radius:10px}
.supply-row td{padding:6px 8px}
.supply-row input{width:100%;padding:8px;border:2px solid #FDE68A;border-radius:8px;font-family:'Quicksand',sans-serif;font-size:14px;color:#92400E;outline:none;background:#fff;font-weight:600}
.supply-row input:focus{border-color:#F59E0B}
.supply-row .del-btn{background:none;border:none;color:#EF4444;font-size:18px;cursor:pointer;padding:4px 8px}
.supply-total{font-family:'Fredoka',sans-serif;font-size:20px;color:#EA580C;font-weight:700;text-align:right;margin-top:8px}

/* Profit calc */
.profit-box{background:linear-gradient(135deg,#D1FAE5,#A7F3D0);border-radius:16px;padding:20px;margin-top:16px;border:2px solid rgba(16,185,129,.2);text-align:center}
.profit-box .profit-num{font-family:'Fredoka',sans-serif;font-size:36px;font-weight:700;color:#065F46}
.profit-box .profit-label{font-size:14px;color:#047857;font-weight:600}

/* Sales log */
.sale-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;background:#FFFBEB;padding:10px;border-radius:12px}
.sale-row input{flex:1;min-width:0}

/* File list */
.file-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#FFFBEB;border-radius:12px;margin-bottom:8px}
.file-item .fi-name{font-weight:700;font-size:14px;color:#92400E;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.file-item a{color:#F59E0B;font-weight:700;font-size:13px;text-decoration:none;margin-left:8px}
.file-item .fi-del{background:none;border:none;color:#EF4444;font-size:16px;cursor:pointer;padding:2px 6px;margin-left:4px}

/* Members list */
.member-card{display:flex;align-items:center;justify-content:space-between;padding:12px;background:#FFFBEB;border-radius:14px;margin-bottom:8px}
.member-card .mc-name{font-family:'Fredoka',sans-serif;font-size:16px;color:#78350F;font-weight:600}
.member-card .mc-role{font-size:13px;color:#B45309;font-weight:600}
.member-card select{padding:6px 10px;border:2px solid #FDE68A;border-radius:8px;font-family:'Quicksand',sans-serif;font-size:13px;color:#92400E;background:#fff;font-weight:600;outline:none}
.member-card .mc-leader{font-size:11px;background:#F59E0B;color:#fff;padding:2px 8px;border-radius:6px;font-weight:700}

/* Group code display */
.group-code{font-family:'Fredoka',sans-serif;font-size:48px;font-weight:700;color:#F59E0B;letter-spacing:8px;text-align:center;margin:12px 0}

/* Status badges */
.status-badge{display:inline-block;padding:4px 12px;border-radius:8px;font-family:'Fredoka',sans-serif;font-size:13px;font-weight:600}
.sb-pending{background:#FEF3C7;color:#92400E}
.sb-approved{background:#D1FAE5;color:#065F46}
.sb-submitted{background:#DBEAFE;color:#1E40AF}
.sb-graded{background:#EDE9FE;color:#5B21B6}

/* AI helper */
.ai-btn{display:flex;align-items:center;gap:8px;margin-top:8px;padding:10px 16px;background:linear-gradient(135deg,rgba(59,130,246,.1),rgba(59,130,246,.05));border:2px solid rgba(59,130,246,.25);border-radius:12px;cursor:pointer;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;color:#3B82F6;transition:all .2s}
.ai-btn:hover{border-color:#3B82F6;background:rgba(59,130,246,.12)}
.ai-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-bubble{margin-top:10px;padding:14px;background:linear-gradient(135deg,rgba(59,130,246,.06),rgba(59,130,246,.02));border:1px solid rgba(59,130,246,.15);border-radius:14px;font-size:15px;line-height:1.7;color:#78350F;white-space:pre-wrap;animation:fadeUp .3s ease}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;border:3px solid #10B981;color:#065F46;padding:14px 28px;border-radius:16px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.1);max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.error{border-color:#EF4444;color:#991B1B}
.toast.warning{border-color:#F59E0B;color:#92400E}

/* Pending screen */
.pending-screen{text-align:center;padding:40px 20px}
.pending-screen .ps-emoji{font-size:72px;margin-bottom:12px;display:block}
.pending-screen h2{font-family:'Fredoka',sans-serif;font-size:28px;color:#92400E;margin-bottom:8px}
.pending-screen p{font-size:16px;color:#B45309;font-weight:600;line-height:1.6;margin-bottom:20px}

/* Sync indicator */
.sync-indicator{position:fixed;top:12px;right:12px;font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;z-index:100;transition:all .3s}
.sync-saved{background:#D1FAE5;color:#065F46}
.sync-saving{background:#FEF3C7;color:#92400E}

/* Confetti */
.confetti-piece{position:fixed;top:-20px;z-index:9999;pointer-events:none;animation:confettiFall 3s ease-in forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

/* ===== STUDENT DASHBOARD ===== */
.my-groups-grid{display:grid;gap:16px;margin-top:16px}
.mg-card{background:#fff;border:2px solid #FDE68A;border-radius:20px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.mg-card:hover{border-color:#F59E0B;transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,158,11,.15)}
.mg-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.mg-name{font-family:'Fredoka',sans-serif;font-size:20px;font-weight:700;color:#92400E}
.mg-company{font-size:14px;font-weight:700;color:#F59E0B;margin-top:2px}
.mg-members{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}
.mg-member{font-size:12px;font-weight:600;padding:3px 10px;border-radius:8px;background:#FEF3C7;color:#92400E}
.mg-member.leader{background:#F59E0B;color:#fff}
.mg-role{font-size:12px;color:#B45309;font-weight:600;margin-top:6px}
.mg-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.mg-date{font-size:12px;color:#B45309}
.new-group-card{background:linear-gradient(135deg,#FFF7ED,#FFEDD5);border:3px dashed #F59E0B;border-radius:20px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s}
.new-group-card:hover{background:#FDE68A;transform:translateY(-2px)}
.new-group-card .ngc-emoji{font-size:48px;margin-bottom:8px}
.new-group-card .ngc-title{font-family:'Fredoka',sans-serif;font-size:20px;font-weight:700;color:#92400E}
.new-group-card .ngc-sub{font-size:14px;color:#B45309;font-weight:600;margin-top:4px}

/* ===== WALKTHROUGH STEPS ===== */
.wt-progress{display:flex;gap:4px;margin-bottom:20px}
.wt-dot{flex:1;height:6px;border-radius:3px;background:#FDE68A;transition:background .3s}
.wt-dot.done{background:#F59E0B}
.wt-dot.active{background:linear-gradient(90deg,#F59E0B,#EF4444)}
.wt-step{animation:fadeUp .3s ease}
.wt-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:12px}

@media(max-width:500px){
.ws-tabs{gap:4px}
.ws-tab{font-size:12px;padding:8px 12px}
.stat-row{grid-template-columns:1fr 1fr}
}

/* ===== TEACHER GRADE VIEW ===== */
.grade-wrap{max-width:700px;margin:0 auto;padding:20px 16px}
.grade-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;background:#FEF3C7;border:1.5px solid #F59E0B;color:#92400E;text-decoration:none;font-size:14px;font-weight:600;margin-bottom:12px;transition:all .15s}
.grade-back:hover{background:#FDE68A}
.grade-hdr{text-align:center;margin-bottom:20px}
.grade-hdr h1{font-family:'Fredoka',sans-serif;font-size:28px;font-weight:700;color:#92400E}
.grade-hdr .gh-sub{font-size:14px;color:#B45309;font-weight:600;margin-top:4px}
.grade-bar{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#fff;border:2px solid #F59E0B;border-radius:16px;margin-bottom:20px;flex-wrap:wrap;box-shadow:0 4px 16px rgba(245,158,11,.08)}
.grade-bar .gb-name{font-family:'Fredoka',sans-serif;font-size:18px;font-weight:700;color:#92400E}
.grade-bar .gb-company{font-size:14px;color:#F59E0B;font-weight:700}
.grade-bar .gb-info{font-size:13px;color:#78350F}
.grade-bar .gb-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;text-transform:uppercase;letter-spacing:1px}
.g-card{background:#fff;border-radius:20px;padding:22px;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,.04);border:1.5px solid #FDE68A}
.g-card .gc-title{font-family:'Fredoka',sans-serif;font-size:18px;font-weight:700;color:#92400E;margin-bottom:12px}
.g-card .gc-row{margin-bottom:8px;font-size:15px;line-height:1.6;color:#78350F}
.g-card .gc-row strong{color:#92400E;font-weight:700}
.g-card .gc-empty{font-size:14px;color:#B45309;font-style:italic}
.g-members{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.g-member{font-size:13px;font-weight:600;padding:4px 10px;border-radius:8px;background:#FEF3C7;color:#92400E}
.g-member.leader{background:#F59E0B;color:#fff}
.g-supply-tbl{width:100%;border-collapse:collapse;margin-top:8px}
.g-supply-tbl th{text-align:left;font-size:12px;font-weight:700;color:#B45309;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;border-bottom:1.5px solid #FDE68A}
.g-supply-tbl td{font-size:14px;color:#78350F;padding:6px 8px;border-bottom:1px solid #FEF3C7}
.g-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.g-stat{background:#FFF8E1;border:1.5px solid #FDE68A;border-radius:12px;padding:12px;text-align:center}
.g-stat .gs-num{font-family:'Fredoka',sans-serif;font-size:20px;font-weight:700;color:#92400E}
.g-stat .gs-label{font-size:11px;color:#B45309;font-weight:600;margin-top:2px}
.g-file-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.g-file{display:inline-flex;align-items:center;gap:4px;font-size:13px;padding:4px 10px;border-radius:8px;background:#FEF3C7;color:#92400E;text-decoration:none;font-weight:600}
.g-file:hover{background:#FDE68A}
.grade-controls{border-color:#F59E0B!important;background:#FFFBEB!important}
.grade-score-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.grade-score-row label{font-weight:700;font-size:15px;color:#92400E}
.grade-score-row input[type=range]{-webkit-appearance:none;flex:1;height:6px;border-radius:3px;background:#FDE68A;outline:none;margin:0 12px}
.grade-score-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#F59E0B;cursor:pointer;border:2px solid #fff}
.grade-score-val{font-family:'Fredoka',sans-serif;font-size:20px;font-weight:700;color:#F59E0B;min-width:50px;text-align:right}
.grade-feedback textarea{width:100%;min-height:80px;background:#fff;border:1.5px solid #FDE68A;border-radius:12px;padding:12px;font-size:14px;color:#78350F;font-family:inherit;resize:vertical;margin-top:8px}
.grade-feedback textarea:focus{border-color:#F59E0B;outline:none}
.grade-btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.grade-btn-row .btn{padding:12px 20px;font-weight:700;font-size:14px;border:none;border-radius:12px;cursor:pointer;transition:all .15s;font-family:'Fredoka',sans-serif}
.btn-grade{background:linear-gradient(135deg,#10B981,#059669);color:#fff}
.btn-return-rev{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff}
.btn-complete-lem{background:#FEF3C7;color:#92400E;border:1.5px solid #F59E0B!important}
.grade-empty{text-align:center;padding:40px 20px;color:#B45309}
.grade-empty .emoji{font-size:48px;margin-bottom:12px}

/* ===== TEACHER DASHBOARD ===== */
.dash-wrap{max-width:800px;margin:0 auto;padding:20px 16px}
.dash-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.dash-hdr h1{font-family:'Fredoka',sans-serif;font-size:28px;font-weight:700;color:#92400E}
.dash-hdr .dh-sub{font-size:14px;color:#B45309;font-weight:600}
.dash-actions{display:flex;gap:8px;flex-wrap:wrap}
.dash-tab-bar{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.dash-tab{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid #FDE68A;background:#fff;color:#92400E;white-space:nowrap;transition:all .15s;font-family:'Fredoka',sans-serif}
.dash-tab.active{background:#F59E0B;color:#fff;border-color:#F59E0B}
.dash-tab .dt-count{display:inline-block;min-width:18px;text-align:center;font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:4px;background:rgba(0,0,0,.1);color:inherit}
.dash-tab.active .dt-count{background:rgba(255,255,255,.3)}
.dash-section{display:none}
.dash-section.show{display:block}
.group-card{background:#fff;border:2px solid #FDE68A;border-radius:18px;padding:18px;margin-bottom:14px;transition:all .15s}
.group-card:hover{border-color:#F59E0B;transform:translateY(-1px);box-shadow:0 4px 16px rgba(245,158,11,.1)}
.group-card.needs-approval{border-color:#EF4444;border-style:dashed;background:#FEF2F2}
.gc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.gc-name{font-family:'Fredoka',sans-serif;font-size:18px;font-weight:700;color:#92400E}
.gc-company{font-size:14px;font-weight:700;color:#F59E0B;margin-top:2px}
.gc-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;text-transform:uppercase;letter-spacing:.5px}
.gc-badge.pending{background:#FEE2E2;color:#EF4444}
.gc-badge.approved{background:#D1FAE5;color:#059669}
.gc-badge.submitted{background:#FEF3C7;color:#D97706}
.gc-badge.graded{background:#EDE9FE;color:#7C3AED}
.gc-meta{font-size:13px;color:#78350F;margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.gc-members{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}

<script>
var ODA_FB_CFG={apiKey:"AIzaSyAAHwgxErk_M53tYXAMZmgA78m9AiRsEPk",authDomain:"oda-hub-d4bef.firebaseapp.com",projectId:"oda-hub-d4bef",storageBucket:"oda-hub-d4bef.firebasestorage.app",messagingSenderId:"632797371461",appId:"1:632797371461:web:5ec619138d64c0cbc3d72c"};

// ===== FIREBASE CACHING =====
var _fbApp=null,_fbDb=null,_fbStorage=null;
async function getFirebaseDB(){
if(_fbDb){var fsMod=await import('https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js');return{db:_fbDb,fsMod:fsMod,app:_fbApp}}
var appMod=await import('https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js');
var fsMod=await import('https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js');
try{_fbApp=appMod.getApp()}catch(e){_fbApp=appMod.initializeApp(ODA_FB_CFG)}
_fbDb=fsMod.getFirestore(_fbApp);
return{db:_fbDb,fsMod:fsMod,app:_fbApp};
}
async function getFirebaseStorage(){
if(_fbStorage){var storageMod=await import('https://www.gstatic.com/firebasejs/11.8.1/firebase-storage.js');return{storage:_fbStorage,storageMod:storageMod,app:_fbApp}}
var appMod=await import('https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js');
var storageMod=await import('https://www.gstatic.com/firebasejs/11.8.1/firebase-storage.js');
try{_fbApp=appMod.getApp()}catch(e){_fbApp=appMod.initializeApp(ODA_FB_CFG)}
_fbStorage=storageMod.getStorage(_fbApp);
return{storage:_fbStorage,storageMod:storageMod,app:_fbApp};
}

// ===== GLOBALS =====
var studentId=null,studentName=null,classCode=null;
var currentGroup=null,currentGroupId=null;
var _unsubGroup=null; // Firestore listener
var _saveTimer=null;
var _aiLoading=false;
var ROLES=['CEO - The Boss','CFO - Money Manager','Marketing Director','Sales Lead','Product Designer','Operations Manager'];

// ===== TOAST =====
var _toastTimer=null;
function showToast(msg,type){
var t=document.getElementById('toast');
t.textContent=msg;
t.className='toast'+(type?' '+type:'')+' show';
clearTimeout(_toastTimer);
_toastTimer=setTimeout(function(){t.classList.remove('show')},3000);
}

function showSync(saving){
var el=document.getElementById('syncIndicator');
el.classList.remove('hidden');
if(saving){el.className='sync-indicator sync-saving';el.textContent='Saving...'}
else{el.className='sync-indicator sync-saved';el.textContent='Saved!';setTimeout(function(){el.classList.add('hidden')},2000)}
}

function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function genCode(){return Math.random().toString(36).substr(2,6).toUpperCase()}

// ===== INIT =====
var _gradeData=null,_gradeGroup=null;
var _teacherUid=null;

async function init(){
// Teacher grade mode
var params=new URLSearchParams(window.location.search);
var gradeId=params.get('grade');
if(gradeId){initGradeMode(gradeId);return}

studentId=sessionStorage.getItem('studentId');
studentName=sessionStorage.getItem('studentName');
classCode=sessionStorage.getItem('classCode');

// Check if teacher via localStorage (persists across tabs) or sessionStorage
var isTeacher=localStorage.getItem('odaUserRole')==='teacher'||sessionStorage.getItem('userRole')==='teacher';
var backEl=document.getElementById('backLink');

if(studentId){
backEl.href='student.html';
showStudentDashboard();
return;
}

if(isTeacher){
backEl.href='teacher.html';
backEl.textContent='\u2190 Back to Teacher Hub';
// Get teacher UID from Firebase Auth
try{
var authMod=await import('https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js');
var fb=await getFirebaseDB();
var auth=authMod.getAuth(fb.app);
var user=auth.currentUser;
if(!user){
// Wait for auth state
user=await new Promise(function(resolve){
var unsub=authMod.onAuthStateChanged(auth,function(u){unsub();resolve(u)});
});
}
if(user){
_teacherUid=user.uid;
// Get teacher's classCode from Firestore
var tDoc=await fb.fsMod.getDoc(fb.fsMod.doc(fb.db,'teachers',user.uid));
if(tDoc.exists()&&tDoc.data().classCode){
classCode=tDoc.data().classCode;
}
initTeacherDash();
return;
}
}catch(e){console.error('Auth error:',e)}
}
showIntro();
}

// ===== TEACHER DASHBOARD =====
var _teacherGroups=[];
var _dashTab='all';

async function initTeacherDash(){
document.querySelector('.wrap').style.display='none';
document.getElementById('teacherDash').style.display='block';
await loadTeacherGroups();
}

async function loadTeacherGroups(){
try{
var fb=await getFirebaseDB();
var tid=_teacherUid;
var cc=classCode||'';
_teacherGroups=[];
// Query by classCode
if(cc){
var q1=fb.fsMod.query(fb.fsMod.collection(fb.db,'lemonadeGroups'),fb.fsMod.where('classCode','==',cc));
var s1=await fb.fsMod.getDocs(q1);
s1.forEach(function(d){_teacherGroups.push({id:d.id,...d.data()})});
}
// Query by teacherId
if(tid){
var q2=fb.fsMod.query(fb.fsMod.collection(fb.db,'lemonadeGroups'),fb.fsMod.where('teacherId','==',tid));
var s2=await fb.fsMod.getDocs(q2);
s2.forEach(function(d){
if(!_teacherGroups.find(function(g){return g.id===d.id})){
_teacherGroups.push({id:d.id,...d.data()});
}
});
}
renderDashboard();
}catch(e){console.error('Load groups error:',e)}
}

function renderDashboard(){
var pending=_teacherGroups.filter(function(g){return g.status==='pending_approval'});
var active=_teacherGroups.filter(function(g){return g.status==='approved'});
var submitted=_teacherGroups.filter(function(g){return g.status==='submitted'});
var graded=_teacherGroups.filter(function(g){return g.status==='graded'});

// Tabs
var tabs=[
{id:'all',label:'All Groups',count:_teacherGroups.length},
{id:'pending',label:'Needs Approval',count:pending.length},
{id:'active',label:'Active',count:active.length},
{id:'submitted',label:'Submitted',count:submitted.length},
{id:'graded',label:'Graded',count:graded.length}
];
var th='';
tabs.forEach(function(t){
th+='<div class="dash-tab'+(_dashTab===t.id?' active':'')+'" onclick="switchDashTab(\''+t.id+'\')">'+t.label+'<span class="dt-count">'+t.count+'</span></div>';
});
document.getElementById('dashTabs').innerHTML=th;

// Content
var groups=_dashTab==='all'?_teacherGroups:_dashTab==='pending'?pending:_dashTab==='active'?active:_dashTab==='submitted'?submitted:graded;

if(!groups.length){
document.getElementById('dashContent').innerHTML='<div class="dash-empty"><div class="emoji">&#x1F34B;</div><p>No groups here yet. Students create groups from the Lemonade Day tool.</p></div>';
return;
}

var h='';
groups.forEach(function(g){h+=renderGroupCard(g)});
document.getElementById('dashContent').innerHTML=h;
}

function switchDashTab(tab){
_dashTab=tab;
renderDashboard();
}

function renderGroupCard(g){
var statusMap={pending_approval:'pending',approved:'approved',submitted:'submitted',graded:'graded'};
var statusLabel={pending_approval:'Needs Approval',approved:'Active',submitted:'Submitted',graded:'Graded'};
var plan=g.plan||{};
var planFields=[plan.idea,plan.howToMake,plan.targetCustomers,plan.marketingPlan].filter(function(f){return f&&f.trim()});

var h='<div class="group-card'+(g.status==='pending_approval'?' needs-approval':'')+'">';
h+='<div class="gc-top"><div>';
h+='<div class="gc-name">&#x1F34B; '+esc(g.groupName)+'</div>';
h+='<div class="gc-company">'+esc(g.companyName||'No company name yet')+'</div>';
h+='</div>';
h+='<span class="gc-badge '+(statusMap[g.status]||'pending')+'">'+(statusLabel[g.status]||g.status)+'</span>';
h+='</div>';

// Meta
h+='<div class="gc-meta">';
h+='<span>'+((g.members||[]).length)+'/6 members</span>';
h+='<span>Code: <strong>'+esc(g.groupCode||'')+'</strong></span>';
if(g.createdAt)h+='<span>Created '+new Date(g.createdAt).toLocaleDateString()+'</span>';
h+='</div>';

// Members
h+='<div class="gc-members">';
(g.members||[]).forEach(function(m){
var isLdr=m.studentId===(g.leader||{}).studentId;
h+='<span class="gc-member'+(isLdr?' leader':'')+'">'+(isLdr?'&#x2B50; ':'')+esc(m.studentName)+(m.role?' \u2022 '+esc(m.role):'')+'</span>';
});
h+='</div>';

// Progress stats
if(g.status!=='pending_approval'){
h+='<div class="gc-progress">';
h+='<div class="gc-prog"><div class="gp-num">'+planFields.length+'/4</div><div class="gp-label">Plan Done</div></div>';
h+='<div class="gc-prog"><div class="gp-num">'+(g.supplies||[]).length+'</div><div class="gp-label">Supplies</div></div>';
h+='<div class="gc-prog"><div class="gp-num">'+(g.salesLog||[]).length+'</div><div class="gp-label">Sales</div></div>';
h+='</div>';
}

// Score
if(g.status==='graded'&&g.score!==undefined){
h+='<div class="gc-score">Score: '+g.score+'%</div>';
if(g.feedback)h+='<div style="font-size:13px;color:#78350F;margin-top:4px">'+esc(g.feedback)+'</div>';
}

// Action buttons
h+='<div class="gc-btns">';
if(g.status==='pending_approval'){
h+='<button class="btn btn-small btn-green" onclick="approveGroup(\''+g.id+'\')">&#x2705; Approve</button>';
h+='<button class="btn btn-small btn-red" onclick="deleteGroup(\''+g.id+'\')">&#x1F5D1; Delete</button>';
}
h+='<button class="btn btn-small btn-blue" onclick="viewGroupDetail(\''+g.id+'\')">&#x1F441; View Details</button>';
if(g.status==='submitted'||g.status==='graded'){
h+='<button class="btn btn-small btn-orange" onclick="openGroupGrade(\''+g.id+'\')">'+(g.status==='graded'?'&#x270F;&#xFE0F; Re-Grade':'&#x1F4DD; Grade')+'</button>';
}
h+='</div></div>';
return h;
}

async function approveGroup(groupId){
if(!confirm('Approve this group? They will be able to start working on their business plan.'))return;
try{
var fb=await getFirebaseDB();
await fb.fsMod.updateDoc(fb.fsMod.doc(fb.db,'lemonadeGroups',groupId),{status:'approved',approvedAt:new Date().toISOString()});
showToast('Group approved!','');
loadTeacherGroups();
}catch(e){console.error(e);showToast('Error approving','error')}
}

async function deleteGroup(groupId){
if(!confirm('Delete this group? This cannot be undone.'))return;
try{
var fb=await getFirebaseDB();
await fb.fsMod.deleteDoc(fb.fsMod.doc(fb.db,'lemonadeGroups',groupId));
showToast('Group deleted','');
loadTeacherGroups();
}catch(e){console.error(e);showToast('Error deleting','error')}
}

function viewGroupDetail(groupId){
var g=_teacherGroups.find(function(x){return x.id===groupId});
if(!g)return;
document.getElementById('teacherDash').style.display='none';
document.getElementById('groupDetailView').style.display='block';
renderGroupDetail(g);
}

function backToDash(){
document.getElementById('groupDetailView').style.display='none';
document.getElementById('teacherDash').style.display='block';
loadTeacherGroups();
}

function renderGroupDetail(g){
var el=document.getElementById('groupDetailContent');
var plan=g.plan||{};
var supplies=g.supplies||[];
var salesLog=g.salesLog||[];
var files=g.files||[];
var links=g.links||[];
var totalCost=0;
supplies.forEach(function(s){totalCost+=(parseFloat(s.qty)||0)*(parseFloat(s.unitCost)||0)});
var totalUnits=0,totalRev=0;
salesLog.forEach(function(s){totalUnits+=(parseInt(s.unitsSold)||0);totalRev+=(parseFloat(s.revenue)||0)});
var totalProfit=totalRev-totalCost;

var statusLabel={pending_approval:'Needs Approval',approved:'Active',submitted:'Submitted',graded:'Graded'};

var h='<div class="grade-hdr" style="text-align:left"><h1>&#x1F34B; '+esc(g.companyName||g.groupName)+'</h1>';
h+='<div class="gh-sub">'+esc(g.groupName)+' \u2022 '+(g.members||[]).length+' members \u2022 <span class="gc-badge '+({pending_approval:'pending',approved:'approved',submitted:'submitted',graded:'graded'}[g.status]||'pending')+'">'+(statusLabel[g.status]||g.status)+'</span></div></div>';

// Team Members
h+='<div class="g-card"><div class="gc-title">&#x1F465; Team Members</div>';
h+='<div class="g-members">';
(g.members||[]).forEach(function(m){
var isLdr=m.studentId===(g.leader||{}).studentId;
h+='<span class="g-member'+(isLdr?' leader':'')+'">'+(isLdr?'&#x2B50; ':'')+esc(m.studentName)+(m.role?' \u2014 '+esc(m.role):'')+'</span>';
});
h+='</div></div>';

// Business Plan
var hasPlan=plan.idea||plan.howToMake||plan.targetCustomers||plan.marketingPlan;
h+='<div class="g-card"><div class="gc-title">&#x1F4DD; Business Plan</div>';
if(hasPlan){
if(plan.idea)h+='<div class="gc-row"><strong>&#x1F4A1; Product:</strong> '+esc(plan.idea)+'</div>';
if(plan.howToMake)h+='<div class="gc-row"><strong>&#x1F6E0;&#xFE0F; How to Make:</strong> '+esc(plan.howToMake)+'</div>';
if(plan.targetCustomers)h+='<div class="gc-row"><strong>&#x1F3AF; Target Customers:</strong> '+esc(plan.targetCustomers)+'</div>';
if(plan.marketingPlan)h+='<div class="gc-row"><strong>&#x1F4E3; Marketing Plan:</strong> '+esc(plan.marketingPlan)+'</div>';
}else{h+='<div class="gc-empty">No business plan written yet.</div>'}
h+='</div>';

// Costs & Pricing
h+='<div class="g-card"><div class="gc-title">&#x1F4B0; Costs & Pricing</div>';
if(supplies.length){
h+='<table class="g-supply-tbl"><thead><tr><th>Item</th><th>Qty</th><th>Cost</th><th>Total</th></tr></thead><tbody>';
supplies.forEach(function(s){
var lc=(parseFloat(s.qty)||0)*(parseFloat(s.unitCost)||0);
h+='<tr><td>'+esc(s.item||'\u2014')+'</td><td>'+(s.qty||0)+'</td><td>$'+(parseFloat(s.unitCost)||0).toFixed(2)+'</td><td>$'+lc.toFixed(2)+'</td></tr>';
});
h+='</tbody></table>';
h+='<div class="gc-row" style="margin-top:8px"><strong>Total Cost:</strong> $'+totalCost.toFixed(2)+'</div>';
}else{h+='<div class="gc-empty">No supplies listed yet.</div>'}
var sellPrice=parseFloat(g.sellingPrice)||0;
if(sellPrice>0){
var costPer=supplies.length>0?totalCost/Math.max(1,supplies.reduce(function(a,s){return a+(parseFloat(s.qty)||0)},0)):0;
h+='<div class="gc-row"><strong>Selling Price:</strong> $'+sellPrice.toFixed(2)+' \u2022 <strong>Profit/Item:</strong> <span style="color:'+(sellPrice-costPer>=0?'#059669':'#EF4444')+'">$'+(sellPrice-costPer).toFixed(2)+'</span></div>';
}
h+='</div>';

// Sales Day
if(salesLog.length){
h+='<div class="g-card"><div class="gc-title">&#x1F6D2; Sales Day Results</div>';
h+='<div class="g-stats">';
h+='<div class="g-stat"><div class="gs-num">'+totalUnits+'</div><div class="gs-label">Items Sold</div></div>';
h+='<div class="g-stat"><div class="gs-num">$'+totalRev.toFixed(2)+'</div><div class="gs-label">Revenue</div></div>';
h+='<div class="g-stat" style="background:'+(totalProfit>=0?'#D1FAE5':'#FEE2E2')+'"><div class="gs-num" style="color:'+(totalProfit>=0?'#059669':'#EF4444')+'">$'+totalProfit.toFixed(2)+'</div><div class="gs-label">'+(totalProfit>=0?'Profit!':'Loss')+'</div></div>';
h+='</div></div>';
}

// Files & Links
if(files.length||links.length){
h+='<div class="g-card"><div class="gc-title">&#x1F4CE; Files & Links</div>';
if(files.length){
h+='<div class="g-file-list">';
files.forEach(function(f){h+='<a class="g-file" href="'+esc(f.url)+'" target="_blank">&#x1F4C4; '+esc(f.name)+'</a>'});
h+='</div>';
}
if(links.length){
h+='<div class="g-file-list" style="margin-top:8px">';
links.forEach(function(l){h+='<a class="g-file" href="'+esc(l.url)+'" target="_blank">&#x1F517; '+esc(l.title||l.url)+'</a>'});
h+='</div>';
}
h+='</div>';
}

// Notes
if(g.notes){
h+='<div class="g-card"><div class="gc-title">&#x1F4AC; Team Notes</div>';
h+='<div class="gc-row" style="white-space:pre-wrap">'+esc(g.notes)+'</div></div>';
}

// Action buttons at bottom
h+='<div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">';
if(g.status==='pending_approval'){
h+='<button class="btn btn-green" onclick="approveGroup(\''+g.id+'\');backToDash()">&#x2705; Approve Group</button>';
}
if(g.status==='submitted'||g.status==='graded'){
h+='<button class="btn btn-orange" onclick="openGroupGrade(\''+g.id+'\')">&#x1F4DD; '+(g.status==='graded'?'Re-Grade':'Grade')+' This Project</button>';
}
h+='</div>';

el.innerHTML=h;
}

function openGroupGrade(groupId){
var g=_teacherGroups.find(function(x){return x.id===groupId});
if(!g)return;
// Show grading in the grade view
document.getElementById('teacherDash').style.display='none';
document.getElementById('groupDetailView').style.display='none';
document.getElementById('gradeView').style.display='block';
_gradeGroup=g;
_gradeData={id:g.id,status:g.status,score:g.score,feedback:g.feedback,studentName:(g.members||[])[0]&&(g.members||[])[0].studentName||'Group'};
renderGradeViewFromDash();
}

function renderGradeViewFromDash(){
var g=_gradeGroup;
var el=document.getElementById('gradeContent');
// Update header
document.getElementById('gradeTitle').textContent='Grade: '+esc(g.companyName||g.groupName);
document.getElementById('gradeSubtitle').textContent=g.groupName+' \u2022 '+(g.members||[]).length+' members';
document.getElementById('gradeGroupName').textContent=g.groupName||'Group';
document.getElementById('gradeCompanyName').textContent=g.companyName||'';
var statusEl=document.getElementById('gradeStatusBadge');
var st=g.status||'pending';
statusEl.textContent=({pending_approval:'Needs Approval',approved:'Active',submitted:'Submitted',graded:'Graded'}[st]||st);
statusEl.style.background=st==='submitted'?'rgba(245,158,11,.15)':st==='graded'?'rgba(16,185,129,.15)':'rgba(17,138,178,.15)';
statusEl.style.color=st==='submitted'?'#D97706':st==='graded'?'#059669':'#0EA5E9';
if(g.createdAt)document.getElementById('gradeDate').textContent=new Date(g.createdAt).toLocaleDateString();
// Change back link to go to dashboard
document.querySelector('#gradeView .grade-back').onclick=function(e){
e.preventDefault();
document.getElementById('gradeView').style.display='none';
document.getElementById('teacherDash').style.display='block';
loadTeacherGroups();
};
document.querySelector('#gradeView .grade-back').href='#';
document.querySelector('#gradeView .grade-back').textContent='\u2190 Back to Dashboard';

// Reuse renderGradeView but with dashboard data
renderGradeView();
}

// Override grade submit to also handle dashboard mode
var _origSubmitGrade=submitLemonadeGrade;
async function submitLemonadeGradeFromDash(){
if(!_gradeGroup)return;
var score=parseInt(document.getElementById('gradeScoreRange').value);
var feedback=document.getElementById('gradeTeacherFeedback').value.trim();

async function joinGroup(){
var code=document.getElementById('joinCode').value.trim().toUpperCase();
if(code.length<4){showToast('Enter the group code!','error');return}
var btn=document.getElementById('joinBtn');
btn.disabled=true;btn.textContent='Joining...';
try{
var fb=await getFirebaseDB();
var q=fb.fsMod.query(fb.fsMod.collection(fb.db,'lemonadeGroups'),fb.fsMod.where('groupCode','==',code));
var snap=await fb.fsMod.getDocs(q);
if(snap.empty){showToast('Group not found. Check the code!','error');btn.disabled=false;btn.textContent='Join \u{1F44B}';return}
var doc=snap.docs[0];
var data=doc.data();
// Check if already a member
if(data.memberIds&&data.memberIds.indexOf(studentId)>=0){
showToast('You\'re already in this group!','warning');
currentGroupId=doc.id;currentGroup=data;
if(data.status==='pending_approval')showPendingApproval();
else showWorkspace();
return;
}
// Check group size limit
if(data.members&&data.members.length>=6){showToast('This group is full (6 max)!','error');btn.disabled=false;btn.textContent='Join \u{1F44B}';return}
// Add member
var newMembers=data.members||[];
newMembers.push({studentId:studentId,studentName:studentName,role:''});
var newMemberIds=data.memberIds||[];
newMemberIds.push(studentId);
await fb.fsMod.updateDoc(fb.fsMod.doc(fb.db,'lemonadeGroups',doc.id),{
members:newMembers,memberIds:newMemberIds,updatedAt:new Date().toISOString()
});
currentGroupId=doc.id;
currentGroup=data;
currentGroup.members=newMembers;
currentGroup.memberIds=newMemberIds;
showToast('Joined '+data.groupName+'!','');
if(data.status==='pending_approval')showPendingApproval();
else showWorkspace();
}catch(e){
console.error('Join error:',e);
showToast('Error joining: '+e.message,'error');
btn.disabled=false;btn.textContent='Join \u{1F44B}';
}
}

var _pendingRefreshInterval=null;
function startPendingRefresh(){
clearInterval(_pendingRefreshInterval);
_pendingRefreshInterval=setInterval(async function(){
try{
var fb=await getFirebaseDB();
var doc=await fb.fsMod.getDoc(fb.fsMod.doc(fb.db,'lemonadeGroups',currentGroupId));
if(doc.exists()){
currentGroup=doc.data();
if(currentGroup.status!=='pending_approval'){
clearInterval(_pendingRefreshInterval);
showToast('Group approved! Let\'s go!','');
showWorkspace();
}
}
}catch(e){}
},10000);
}

async function refreshGroup(){
try{
var fb=await getFirebaseDB();
var doc=await fb.fsMod.getDoc(fb.fsMod.doc(fb.db,'lemonadeGroups',currentGroupId));
if(doc.exists()){
currentGroup=doc.data();
if(currentGroup.status!=='pending_approval'){
clearInterval(_pendingRefreshInterval);
showToast('Group approved!','');
showWorkspace();
}else{
showPendingApproval();
showToast('Still waiting for approval...','warning');
}
}
}catch(e){showToast('Error refreshing','error')}
}

function copyGroupCode(){

navigator.clipboard.writeText(code).then(function(){showToast('Code copied: '+code,'')});
}else{
try{var ta=document.createElement('textarea');ta.value=code;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Code copied: '+code,'');}catch(e){showToast('Code: '+code,'warning')}
}

h+='</div>';
return h;
}

function renderNotesPanel(g){
var h='<div class="ws-panel card'+(_wsTab==='notes'?' show':'')+'" id="panel-notes">';
h+='<div class="card-title">&#x1F4AC; Team Notes</div>';
h+='<p style="font-size:14px;color:#78350F;font-weight:600;margin-bottom:12px;text-align:center">Shared notepad for your team. Everyone can see and edit this!</p>';
h+='<textarea class="input" id="wsNotes" placeholder="Write ideas, to-do lists, plans, meeting notes..." style="min-height:250px" onchange="saveField(\'notes\',this.value)">'+esc(g.notes||'')+'</textarea>';
h+='</div>';
return h;
}

// ===== SAVE FUNCTIONS =====
async function saveField(field,value){
if(!currentGroupId)return;
showSync(true);
try{
var fb=await getFirebaseDB();
var update={updatedAt:new Date().toISOString()};
update[field]=value;
await fb.fsMod.updateDoc(fb.fsMod.doc(fb.db,'lemonadeGroups',currentGroupId),update);
currentGroup[field]=value;
showSync(false);
}catch(e){console.error('Save error:',e);showToast('Error saving','error')}
}

async function savePlanField(field,value){
if(!currentGroupId)return;
showSync(true);
try{
var fb=await getFirebaseDB();
var plan=currentGroup.plan||{};
plan[field]=value;
await fb.fsMod.updateDoc(fb.fsMod.doc(fb.db,'lemonadeGroups',currentGroupId),{plan:plan,updatedAt:new Date().toISOString()});
currentGroup.plan=plan;
showSync(false);
}catch(e){console.error('Save plan error:',e);showToast('Error saving','error')}
}

async function updateRole(memberIdx,role){
if(!currentGroupId)return;
try{
var fb=await getFirebaseDB();
var members=currentGroup.members||[];
if(members[memberIdx])members[memberIdx].role=role;
await fb.fsMod.updateDoc(fb.fsMod.doc(fb.db,'lemonadeGroups',currentGroupId),{members:members,updatedAt:new Date().toISOString()});
currentGroup.members=members;
showToast('Role updated!','');
}catch(e){showToast('Error updating role','error')}
}

// ===== FILE UPLOAD =====
async function uploadFile(){
var fileInput=document.getElementById('fileUpload');
if(!fileInput.files||!fileInput.files[0])return;
var file=fileInput.files[0];
if(file.size>10*1024*1024){showToast('File too large (10MB max)','error');return}
showToast('Uploading...','warning');
try{
var stor=await getFirebaseStorage();
var path='lemonade/'+currentGroupId+'/'+Date.now()+'_'+file.name;
var sRef=stor.storageMod.ref(stor.storage,path);
await stor.storageMod.uploadBytes(sRef,file);
var url=await stor.storageMod.getDownloadURL(sRef);
var files=currentGroup.files||[];
files.push({name:file.name,url:url,type:file.type,uploadedAt:new Date().toISOString(),uploadedBy:studentName});
await saveField('files',files);
showToast('File uploaded!','');
renderWorkspace();
}catch(e){console.error('Upload error:',e);showToast('Upload failed: '+e.message,'error')}
fileInput.value='';
}

async function removeFile(idx){
var files=currentGroup.files||[];
files.splice(idx,1);
await saveField('files',files);
renderWorkspace();
}

// ===== LINK FUNCTIONS =====
async function addLink(){
var title=document.getElementById('linkTitle').value.trim();
var url=document.getElementById('linkUrl').value.trim();
if(!url){showToast('Enter a URL!','error');return}
if(!url.startsWith('http'))url='https://'+url;
var links=currentGroup.links||[];
links.push({title:title||url,url:url,addedBy:studentName});
await saveField('links',links);
renderWorkspace();
}
async function removeLink(idx){
var links=currentGroup.links||[];
links.splice(idx,1);
await saveField('links',links);
renderWorkspace();
}

// ===== AI HELPERS =====
async function aiHelpPlan(field){
if(_aiLoading)return;
_aiLoading=true;
var area=document.getElementById('aiArea-'+field);
if(area)area.innerHTML='<div style="text-align:center;padding:10px;color:#3B82F6;font-weight:700;font-size:13px">AI is thinking... <span style="display:inline-block;width:12px;height:12px;border:2px solid #3B82F6;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-left:4px"></span></div>';
var prompts={
idea:'A group of students (ages 8-14) need to come up with a product to sell at their school\'s Lemonade Day event. They need ideas for things they can actually MAKE and sell. No food allowed. Help them brainstorm by asking 3-4 fun questions about what they\'re good at and interested in, then suggest 3-4 creative product ideas based on real things kids have made (fidget toys, candles, art prints, STEM kits, jewelry, slime, etc). Keep it exciting and age-appropriate. Use plain text, no markdown.',
howToMake:'A group of students is making products to sell. Help them plan the step-by-step process by asking 3-4 organizing questions: What materials do you need? How long does each one take to make? How many can you make before sell day? Can you make an assembly line? Keep it practical and encouraging. Use plain text, no markdown.',
marketing:'A group of students needs to attract customers to their booth on Lemonade Day. Help them brainstorm marketing ideas by asking questions and suggesting tactics: signs, demos, free samples of non-food items, social media, flyers, booth decoration, a catchy slogan. Keep it fun and realistic for kids ages 8-14. Use plain text, no markdown.',
pricing:'A group of students needs help figuring out the right price for their product. Ask them about their costs, what similar products sell for, and help them understand profit margins. Explain in simple terms: if it costs $2 to make and you sell for $5, you make $3 profit. Help them find a price that is fair but also makes good money. Keep it simple and encouraging. Use plain text, no markdown.'
};
var prompt=prompts[field]||prompts.idea;
// Add context from their current plan
var plan=currentGroup.plan||{};
if(plan.idea&&field!=='idea')prompt+='\n\nTheir product idea is: '+plan.idea;
if(currentGroup.companyName)prompt+='\n\nTheir company name is: '+currentGroup.companyName;

try{
var resp=await fetch('https://us-central1-oda-hub-d4bef.cloudfunctions.net/ai',{
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({prompt:prompt,max_tokens:350,temperature:0.9})
});
var data=await resp.json();
var text=data.response||data.text||(Array.isArray(data.content)&&data.content[0]?data.content[0].text:'')||'';
if(text&&area){area.innerHTML='<div class="ai-bubble">'+esc(text)+'</div>'}
else if(area){area.innerHTML=''}
}catch(e){
console.error('AI error:',e);
if(area)area.innerHTML='<div class="ai-bubble">Think about what you and your friends are good at making. What do kids at your school always want? Start there!</div>';
}
_aiLoading=false;
}
