<!-- HEADER -->

    <h1 class="shop-title">&#x1F6CD;&#xFE0F; ODA Shop</h1>

    </div>
  </div>

  <button class="shop-tab active" role="tab" tabindex="0" aria-selected="true" aria-controls="panel-avatars" id="tab-avatars" onclick="switchShopTab('avatars')" onkeydown="shopTabKeyNav(event)">&#x1F438; Avatars</button>
  <button class="shop-tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="panel-nameColors" id="tab-nameColors" onclick="switchShopTab('nameColors')" onkeydown="shopTabKeyNav(event)">&#x1F308; Colors</button>

  <button class="shop-tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="panel-titles" id="tab-titles" onclick="switchShopTab('titles')" onkeydown="shopTabKeyNav(event)">&#x1F3F7;&#xFE0F; Titles</button>

  <button class="shop-tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="panel-achievements" id="tab-achievements" onclick="switchShopTab('achievements')" onkeydown="shopTabKeyNav(event)">&#x1F3C6; Achievements</button>
</nav>

<!-- PANELS -->

<div id="panel-nameColors" class="shop-panel" role="tabpanel" aria-labelledby="tab-nameColors"></div>

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="shop-modal-overlay" role="dialog" aria-modal="true" aria-label="Purchase confirmation" style="display:none">

/* ============================================
   Init: load student data
   ============================================ */
async function init() {
  if (isTeacher) {
    // Teachers get everything unlocked for free
    playerCoins = 999999;
    playerInventory = CATALOG.map(function(i) { return i.id; });
    playerAchievements = ACHIEVEMENTS.map(function(a) { return a.id; });
    // Load teacher's equipped cosmetics from their teacher doc
    try {
      const snap = await getDoc(doc(db, 'teachers', studentId));
      if (snap.exists() && snap.data().equipped) {
        const eq = snap.data().equipped;
        playerEquipped = {
          avatar: eq.avatar || playerEquipped.avatar,
          nameColor: eq.nameColor || playerEquipped.nameColor,
          border: eq.border || playerEquipped.border,
          title: eq.title || playerEquipped.title,
          boardTheme: eq.boardTheme || null,
          pieceSkin: eq.pieceSkin || null,
          winEffect: eq.winEffect || playerEquipped.winEffect
        };
      }
    } catch (e) { console.warn('[Shop] Teacher data load:', e); }
  } else {
    try {
      const snap = await getDoc(doc(db, 'students', studentId));
      if (snap.exists()) {
        const data = snap.data();
        playerCoins = data.coins || 0;
        playerInventory = data.inventory || [];
        playerAchievements = data.achievements || [];
        if (data.equipped) {
          playerEquipped = {
            avatar: data.equipped.avatar || playerEquipped.avatar,
            nameColor: data.equipped.nameColor || playerEquipped.nameColor,
            border: data.equipped.border || playerEquipped.border,
            title: data.equipped.title || playerEquipped.title,
            boardTheme: data.equipped.boardTheme || null,
            pieceSkin: data.equipped.pieceSkin || null,
            winEffect: data.equipped.winEffect || playerEquipped.winEffect
          };
        }
      }
    } catch (err) {
      console.error('[Shop] Failed to load student data:', err);
      odaToast('Failed to load data. Please refresh.', 'error');
    }
  }
  updateCoinDisplay();
  updateLoadoutPreview();
  renderActivePanel();
}

/* ============================================
   Coin display
   ============================================ */
function updateCoinDisplay() {
  document.getElementById('coinAmount').textContent = playerCoins.toLocaleString();
}

/* ============================================
   Loadout preview
   ============================================ */
function updateLoadoutPreview() {
  // Avatar
  const avatarEl = document.getElementById('loadoutAvatar');
  avatarEl.textContent = playerEquipped.avatar.emoji || '👤';

  // Border
  const borderWrap = document.getElementById('loadoutBorderWrap');
  if (playerEquipped.border && playerEquipped.border.value && playerEquipped.border.value !== 'none') {
    borderWrap.style.boxShadow = playerEquipped.border.value;
    // Add animation class
    borderWrap.className = 'loadout-avatar-wrap';
    const borderItem = CATALOG.find(i => i.id === playerEquipped.border.id);
    if (borderItem && borderItem.animation) {
      borderWrap.classList.add('border-anim-' + borderItem.animation);
    }
  } else {
    borderWrap.style.boxShadow = 'none';
    borderWrap.className = 'loadout-avatar-wrap';
  }

  // Name + color
  const nameEl = document.getElementById('loadoutName');
  nameEl.textContent = studentName;
  const nc = playerEquipped.nameColor;
  if (nc && nc.value) {
    const colorItem = CATALOG.find(i => i.id === nc.id);
    if (colorItem && (colorItem.type === 'gradient' || colorItem.type === 'animated-gradient')) {
      nameEl.style.background = nc.value;
      nameEl.style.webkitBackgroundClip = 'text';
      nameEl.style.webkitTextFillColor = 'transparent';
      nameEl.style.backgroundClip = 'text';
      nameEl.style.backgroundSize = '200% 100%';
      if (colorItem.type === 'animated-gradient') {
        nameEl.classList.add('animated-gradient');
      } else {
        nameEl.classList.remove('animated-gradient');
      }
    } else {
      nameEl.style.background = 'none';
      nameEl.style.webkitBackgroundClip = 'unset';
      nameEl.style.webkitTextFillColor = nc.value;
      nameEl.style.backgroundClip = 'unset';
      nameEl.classList.remove('animated-gradient');
    }
  }

  // Title
  const titleEl = document.getElementById('loadoutTitle');
  if (playerEquipped.title && playerEquipped.title.value) {
    titleEl.textContent = playerEquipped.title.value;
    titleEl.style.display = '';
  } else {
    titleEl.textContent = '';
    titleEl.style.display = 'none';
  }

  // Badge: board theme
  const boardBadge = document.getElementById('loadoutBoardBadge');
  if (playerEquipped.boardTheme) {
    const bt = CATALOG.find(i => i.id === playerEquipped.boardTheme.id);
    boardBadge.textContent = '🏁 ' + (bt ? bt.name : 'Board');
    boardBadge.style.display = '';
  } else {
    boardBadge.style.display = 'none';
  }

  // Badge: piece skin
  const pieceBadge = document.getElementById('loadoutPieceBadge');
  if (playerEquipped.pieceSkin) {
    const ps = CATALOG.find(i => i.id === playerEquipped.pieceSkin.id);
    pieceBadge.textContent = '⚫ ' + (ps ? ps.name : 'Pieces');
    pieceBadge.style.display = '';
  } else {
    pieceBadge.style.display = 'none';
  }

  // Badge: win effect
  const effectBadge = document.getElementById('loadoutEffectBadge');
  if (playerEquipped.winEffect) {
    const eff = CATALOG.find(i => i.id === playerEquipped.winEffect.id);
    const emoji = EFFECT_EMOJIS[playerEquipped.winEffect.type] || '✨';
    effectBadge.textContent = emoji + ' ' + (eff ? eff.name : 'Confetti');
    effectBadge.style.display = '';
  } else {
    effectBadge.style.display = 'none';
  }
}

/* ============================================
   Tab switching
   ============================================ */
window.switchShopTab = function(tab) {
  activeTab = tab;
  // Update tab buttons
  document.querySelectorAll('.shop-tab').forEach(function(t) {
    const isActive = t.id === 'tab-' + tab;
    t.classList.toggle('active', isActive);
    t.setAttribute('aria-selected', isActive ? 'true' : 'false');
    t.tabIndex = isActive ? 0 : -1;
  });
  // Update panels
  document.querySelectorAll('.shop-panel').forEach(function(p) {
    p.classList.toggle('show', p.id === 'panel-' + tab);
  });
  renderActivePanel();
  odaAnnounce(CATEGORY_NAMES[tab] || tab);
};

const CATEGORY_NAMES = {
  avatars:'Avatars', nameColors:'Name Colors', borders:'Borders', titles:'Titles',
  boardThemes:'Board Themes', pieceSkins:'Piece Skins', winEffects:'Win Effects', achievements:'Achievements'
};

window.shopTabKeyNav = function(e) {
  const tabs = Array.from(document.querySelectorAll('.shop-tab'));
  const idx = tabs.indexOf(e.target);
  let next = -1;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); next = (idx + 1) % tabs.length; }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); next = (idx - 1 + tabs.length) % tabs.length; }
  else if (e.key === 'Home') { e.preventDefault(); next = 0; }
  else if (e.key === 'End') { e.preventDefault(); next = tabs.length - 1; }
  if (next >= 0) {
    const tabId = tabs[next].id.replace('tab-', '');
    switchShopTab(tabId);
    tabs[next].focus();
  }
};

/* ============================================
   Render active panel
   ============================================ */
function renderActivePanel() {
  if (activeTab === 'achievements') {
    renderAchievements();
    return;
  }
  const panel = document.getElementById('panel-' + activeTab);
  if (!panel) return;

  const items = CATALOG.filter(function(i) { return i.category === activeTab; });
  let html = '';

  RARITY_ORDER.forEach(function(rarity) {
    const group = items.filter(function(i) { return i.rarity === rarity; });
    if (!group.length) return;

    html += '<div class="rarity-section">';
    html += '<div class="rarity-header rarity-' + rarity + '">';
    html += '<span class="rarity-dot"></span> ' + esc(RARITY_LABELS[rarity]);
    html += '</div>';
    html += '<div class="item-grid">';

    group.forEach(function(item) {
      html += buildItemCard(item);
    });

    html += '</div></div>';
  });

  if (!html) {
    html = '<div class="empty-state"><span class="emoji">🏪</span><p>No items in this category yet!</p></div>';
  }

  panel.innerHTML = html;
}

/* ============================================
   Build item card HTML
   ============================================ */
function buildItemCard(item) {
  const owned = playerInventory.includes(item.id);
  const equipped = isEquipped(item);
  const locked = item.achievement && !playerAchievements.includes(item.achievement);
  const canAfford = playerCoins >= item.cost;

  let preview = '';
  let extraClass = '';

  // Build preview based on category
  switch (item.category) {
    case 'avatars':
      preview = '<div class="item-preview-emoji">' + item.emoji + '</div>';
      break;
    case 'nameColors': {
      const colorItem = item;
      if (colorItem.type === 'gradient' || colorItem.type === 'animated-gradient') {
        preview = '<div class="item-preview-color-gradient" style="background:' + esc(colorItem.value) + '"></div>';
      } else {
        preview = '<div class="item-preview-color" style="background:' + esc(colorItem.value) + '"></div>';
      }
      break;
    }
    case 'borders':
      preview = '<div class="item-preview-border"><div class="border-circle" style="box-shadow:' + esc(item.value) + '"></div></div>';
      if (item.animation) extraClass += ' has-animation';
      break;
    case 'titles':
      preview = '<div class="item-preview-title">' + esc(item.value) + '</div>';
      break;
    case 'boardThemes':
      preview = buildBoardPreview(item);
      break;
    case 'pieceSkins':
      preview = buildPieceSkinPreview(item);
      break;
    case 'winEffects':
      preview = '<div class="item-preview-effect">' + (EFFECT_EMOJIS[item.type] || '✨') + '</div>';
      break;
  }

  // Status badge
  let statusHtml = '';
  if (locked) {
    const ach = ACHIEVEMENTS.find(function(a) { return a.id === item.achievement; });
    statusHtml = '<div class="item-status item-locked">🔒 ' + esc(ach ? ach.name : 'Locked') + '</div>';
  } else if (equipped) {
    statusHtml = '<div class="item-status item-equipped">EQUIPPED</div>';
  } else if (owned) {
    statusHtml = '<div class="item-status item-owned">OWNED</div>';
  } else {
    const affordClass = canAfford ? '' : ' cant-afford';
    statusHtml = '<div class="item-cost' + affordClass + '"><span class="coin-icon-sm">🪙</span> ' + item.cost.toLocaleString() + '</div>';
  }

  const cardClass = 'item-card rarity-border-' + item.rarity
    + (owned ? ' owned' : '') + (equipped ? ' equipped' : '')
    + (locked ? ' locked' : '') + extraClass;

  return '<button class="' + cardClass + '" onclick="handleItemClick(\'' + item.id + '\')" '
    + 'aria-label="' + esc(item.name) + ', ' + esc(item.rarity) + (owned ? ', owned' : ', ' + item.cost + ' coins') + '">'
    + (locked ? '<div class="lock-overlay">🔒</div>' : '')
    + '<div class="item-preview">' + preview + '</div>'
    + '<div class="item-name">' + esc(item.name) + '</div>'
    + '<span class="rarity-badge rarity-' + item.rarity + '">' + esc(RARITY_LABELS[item.rarity]) + '</span>'
    + statusHtml
    + '</button>';
}

/** Mini board preview for board themes */
function buildBoardPreview(item) {
  const dark = item.vars['--board-dark'];
  const light = item.vars['--board-light'];
  const accent = item.vars['--board-accent'];
  let cells = '';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const isDark = (r + c) % 2 === 1;
      cells += '<div class="board-cell" style="background:' + (isDark ? dark : light) + '"></div>';
    }
  }
  return '<div class="item-preview-board" style="border-color:' + accent + '">' + cells + '</div>';
}

/** Piece skin preview */
function buildPieceSkinPreview(item) {
  const glow1 = item.glow ? 'box-shadow:0 0 10px ' + item.p1 + '60;' : '';
  const glow2 = item.glow ? 'box-shadow:0 0 10px ' + item.p2 + '60;' : '';
  return '<div class="item-preview-pieces">'
    + '<div class="piece-dot" style="background:' + item.p1 + ';' + glow1 + '"></div>'
    + '<span class="piece-vs">vs</span>'
    + '<div class="piece-dot" style="background:' + item.p2 + ';' + glow2 + '"></div>'
    + '</div>';
}

/* ============================================
   Check if item is equipped
   ============================================ */
function isEquipped(item) {
  switch (item.category) {
    case 'avatars': return playerEquipped.avatar && playerEquipped.avatar.id === item.id;
    case 'nameColors': return playerEquipped.nameColor && playerEquipped.nameColor.id === item.id;
    case 'borders': return playerEquipped.border && playerEquipped.border.id === item.id;
    case 'titles': return playerEquipped.title && playerEquipped.title.id === item.id;
    case 'boardThemes': return playerEquipped.boardTheme && playerEquipped.boardTheme.id === item.id;
    case 'pieceSkins': return playerEquipped.pieceSkin && playerEquipped.pieceSkin.id === item.id;
    case 'winEffects': return playerEquipped.winEffect && playerEquipped.winEffect.id === item.id;
    default: return false;
  }
}

/* ============================================
   Handle item click
   ============================================ */
window.handleItemClick = function(itemId) {
  const item = CATALOG.find(function(i) { return i.id === itemId; });
  if (!item) return;

  const owned = playerInventory.includes(item.id);
  const equipped = isEquipped(item);
  const locked = item.achievement && !playerAchievements.includes(item.achievement);

  if (locked) {
    const ach = ACHIEVEMENTS.find(function(a) { return a.id === item.achievement; });
    odaToast('🔒 Unlock by: ' + (ach ? ach.description : 'earning the achievement'), 'warning');
    return;
  }

  if (equipped) {
    // Allow unequipping for optional slots
    if (['titles','boardThemes','pieceSkins'].includes(item.category)) {
      unequipItem(item);
    } else {
      odaToast('Already equipped!', 'info');
    }
    return;
  }

  if (owned) {
    equipItem(item);
    return;
  }

  // Not owned: try to buy
  if (playerCoins < item.cost) {
    const need = item.cost - playerCoins;
    odaToast('Not enough coins! Need ' + need.toLocaleString() + ' more.', 'error');
    return;
  }

  // Show confirm modal
  openConfirmModal(item);
};

/* ============================================
   Confirm Modal
   ============================================ */
function openConfirmModal(item) {
  pendingItem = item;
  const modal = document.getElementById('confirmModal');

  // Icon
  let iconHtml = '';
  if (item.emoji) iconHtml = item.emoji;
  else if (item.category === 'nameColors') iconHtml = '🎨';
  else if (item.category === 'borders') iconHtml = '💫';
  else if (item.category === 'titles') iconHtml = '🏷️';
  else if (item.category === 'boardThemes') iconHtml = '♟️';
  else if (item.category === 'pieceSkins') iconHtml = '⚫';
  else if (item.category === 'winEffects') iconHtml = EFFECT_EMOJIS[item.type] || '✨';
  document.getElementById('modalIcon').textContent = iconHtml;

  document.getElementById('modalTitle').textContent = 'Buy ' + item.name + '?';
  document.getElementById('modalDesc').textContent = RARITY_LABELS[item.rarity] + ' ' + CATEGORY_NAMES[item.category].replace(/s$/, '');
  document.getElementById('modalCost').textContent = item.cost.toLocaleString();
  document.getElementById('modalBuyBtn').disabled = false;

  modal.style.display = 'flex';
  modalCleanup = odaTrapFocus(modal);
}

window.closeConfirmModal = function() {
  document.getElementById('confirmModal').style.display = 'none';
  pendingItem = null;
  if (modalCleanup) { modalCleanup(); modalCleanup = null; }
};

// Close modal on overlay click
document.getElementById('confirmModal').addEventListener('click', function(e) {
  if (e.target === this) closeConfirmModal();
});

// Close modal on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('confirmModal').style.display === 'flex') {
    closeConfirmModal();
  }
});

/* ============================================
   Purchase flow
   ============================================ */
window.confirmPurchase = async function() {
  if (!pendingItem) return;
  const item = pendingItem;
  const buyBtn = document.getElementById('modalBuyBtn');
  buyBtn.disabled = true;
  buyBtn.textContent = 'Buying...';

  try {
    const studentRef = doc(db, 'students', studentId);

    // Deduct coins and add to inventory
    await updateDoc(studentRef, {
      coins: increment(-item.cost),
      inventory: arrayUnion(item.id)
    });

    // Update local state
    playerCoins -= item.cost;
    if (!playerInventory.includes(item.id)) {
      playerInventory.push(item.id);
    }

    // Auto-equip purchased item
    await equipItem(item, true);

    updateCoinDisplay();
    closeConfirmModal();
    renderActivePanel();

    odaToast('Purchased ' + item.name + '!', 'success');
    odaConfetti();

  } catch (err) {
    console.error('[Shop] Purchase failed:', err);
    odaToast('Purchase failed. Please try again.', 'error');
    buyBtn.disabled = false;
    buyBtn.textContent = 'Buy';
  }
};

/* ============================================
   Equip item
   ============================================ */
async function equipItem(item, skipToast) {
  const studentRef = doc(db, isTeacher ? 'teachers' : 'students', studentId);
  let equipData = {};

  switch (item.category) {
    case 'avatars':
      playerEquipped.avatar = { id: item.id, emoji: item.emoji };
      equipData = { 'equipped.avatar': playerEquipped.avatar };
      break;
    case 'nameColors':
      playerEquipped.nameColor = { id: item.id, value: item.value, type: item.type || null };
      equipData = { 'equipped.nameColor': playerEquipped.nameColor };
      break;
    case 'borders':
      playerEquipped.border = { id: item.id, value: item.value };
      equipData = { 'equipped.border': playerEquipped.border };
      break;
    case 'titles':
      playerEquipped.title = { id: item.id, value: item.value };
      equipData = { 'equipped.title': playerEquipped.title };
      break;
    case 'boardThemes':
      playerEquipped.boardTheme = { id: item.id, vars: item.vars };
      equipData = { 'equipped.boardTheme': playerEquipped.boardTheme };
      break;
    case 'pieceSkins':
      playerEquipped.pieceSkin = { id: item.id, p1: item.p1, p2: item.p2, glow: item.glow, sparkle: item.sparkle, trail: item.trail };
      equipData = { 'equipped.pieceSkin': playerEquipped.pieceSkin };
      break;
    case 'winEffects':
      playerEquipped.winEffect = { id: item.id, type: item.type };
      equipData = { 'equipped.winEffect': playerEquipped.winEffect };
      break;
  }

  try {
    await updateDoc(studentRef, equipData);
  } catch (err) {
    console.error('[Shop] Equip failed:', err);
    odaToast('Failed to equip. Try again.', 'error');
    return;
  }

  updateLoadoutPreview();
  renderActivePanel();
  if (!skipToast) odaToast('Equipped ' + item.name + '!', 'success');
}

/* ============================================
   Unequip item (optional slots)
   ============================================ */
async function unequipItem(item) {
  const studentRef = doc(db, isTeacher ? 'teachers' : 'students', studentId);
  let equipData = {};

  switch (item.category) {
    case 'titles':
      playerEquipped.title = { id: 'title_none', value: '' };
      equipData = { 'equipped.title': playerEquipped.title };
      break;
    case 'boardThemes':
      playerEquipped.boardTheme = null;
      equipData = { 'equipped.boardTheme': null };
      break;
    case 'pieceSkins':
      playerEquipped.pieceSkin = null;
      equipData = { 'equipped.pieceSkin': null };
      break;
  }

  try {
    await updateDoc(studentRef, equipData);
  } catch (err) {
    console.error('[Shop] Unequip failed:', err);
    odaToast('Failed to unequip. Try again.', 'error');
    return;
  }

  updateLoadoutPreview();
  renderActivePanel();
  odaToast('Unequipped ' + item.name, 'info');
}

/* ============================================
   Achievements panel
   ============================================ */
function renderAchievements() {
  const panel = document.getElementById('panel-achievements');
  let html = '<div class="achievements-grid">';

  ACHIEVEMENTS.forEach(function(ach) {
    const earned = playerAchievements.includes(ach.id);
    const rewardItem = ach.reward ? CATALOG.find(function(i) { return i.id === ach.reward; }) : null;

    html += '<div class="achievement-card' + (earned ? ' earned' : '') + '">';
    html += '<div class="ach-icon">' + ach.icon + '</div>';
    html += '<div class="ach-info">';
    html += '<div class="ach-name">' + esc(ach.name) + '</div>';
    html += '<div class="ach-desc">' + esc(ach.description) + '</div>';
    if (rewardItem) {
      html += '<div class="ach-reward">Unlocks: <strong>' + esc(rewardItem.name) + '</strong> ' + (rewardItem.emoji || '') + '</div>';
    }
    html += '</div>';
    html += '<div class="ach-status">' + (earned ? '✅' : '🔒') + '</div>';
    html += '</div>';
  });

  html += '</div>';
  panel.innerHTML = html;
}

/* ============================================
   Boot
   ============================================ */
init();
</script>
