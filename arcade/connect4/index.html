<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Connect 4 - ODA Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#f0f4ff;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;user-select:none}
.back-btn{position:fixed;top:16px;left:16px;background:rgba(17,24,39,.8);border:1px solid #2a3450;border-radius:10px;padding:8px 16px;color:#8892a8;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;z-index:10;text-decoration:none;transition:all .2s}
.back-btn:hover{border-color:#06d6a0;color:#f0f4ff}

/* Lobby */
.lobby{text-align:center;animation:fadeUp .3s ease}
.lobby h1{font-size:36px;font-weight:900;margin-bottom:8px;letter-spacing:-1px}
.lobby h1 span{color:#06d6a0}
.lobby p{color:#8892a8;font-size:14px;margin-bottom:24px}
.lobby-buttons{display:flex;flex-direction:column;gap:12px;align-items:center}
.btn{padding:14px 32px;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;cursor:pointer;transition:all .15s;min-width:220px}
.btn:active{transform:scale(.96)}
.btn-accent{background:#06d6a0;color:#0a0e1a}
.btn-blue{background:#118ab2;color:#fff}
.btn-outline{background:none;border:2px solid #2a3450;color:#8892a8}
.btn-outline:hover{border-color:#06d6a0;color:#f0f4ff}
.btn-small{padding:10px 20px;font-size:14px;min-width:auto}

.code-input{background:#111827;border:2px solid #2a3450;border-radius:12px;padding:14px 20px;color:#f0f4ff;font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;text-align:center;width:180px;letter-spacing:8px;outline:none;transition:border-color .2s}
.code-input:focus{border-color:#06d6a0}
.code-input::placeholder{color:#2a3450;letter-spacing:4px}

.room-code-display{font-size:48px;font-weight:900;color:#ffd166;letter-spacing:12px;margin:16px 0}
.waiting-text{color:#8892a8;font-size:14px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.join-row{display:flex;gap:12px;align-items:center;justify-content:center}

.error-text{color:#ef476f;font-size:13px;margin-top:8px;min-height:20px}

/* Game */
.game{text-align:center;animation:fadeUp .3s ease}
.turn-indicator{font-size:18px;font-weight:700;margin-bottom:12px;min-height:28px}

.board-wrapper{position:relative;display:inline-block}
.board{background:#111827;border:3px solid #2a3450;border-radius:16px;padding:8px;display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cell{width:52px;height:52px;background:#1a2235;border-radius:50%;cursor:pointer;transition:all .15s;position:relative;border:2px solid #2a3450}
.cell:hover{border-color:#06d6a0}
.cell.disabled{cursor:default}
.cell.disabled:hover{border-color:#2a3450}
.cell.p1{background:#ef476f;border-color:#ef476f;box-shadow:inset 0 -4px 8px rgba(0,0,0,.3),0 0 12px rgba(239,71,111,.3)}
.cell.p2{background:#ffd166;border-color:#ffd166;box-shadow:inset 0 -4px 8px rgba(0,0,0,.2),0 0 12px rgba(255,209,102,.3)}
.cell.win-cell{animation:winPulse 0.6s ease-in-out infinite alternate}
@keyframes winPulse{from{transform:scale(1);filter:brightness(1)}to{transform:scale(1.1);filter:brightness(1.3)}}

.col-hover{position:absolute;top:-40px;width:52px;height:36px;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .15s}
.col-hover.show{opacity:1}
.col-hover-piece{width:36px;height:36px;border-radius:50%;opacity:.5}

.drop-anim{animation:dropIn .35s cubic-bezier(.4,0,.2,1)}
@keyframes dropIn{from{transform:translateY(-300px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Result */
.result{text-align:center;animation:fadeUp .3s ease}
.result h2{font-size:32px;font-weight:900;margin-bottom:8px}
.result .coins-earned{color:#ffd166;font-size:20px;font-weight:700;margin-bottom:20px}
.result-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

.player-label{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:14px}
.player-dot{width:14px;height:14px;border-radius:50%;display:inline-block}
.player-dot.p1{background:#ef476f}
.player-dot.p2{background:#ffd166}

.players-bar{display:flex;justify-content:center;gap:24px;margin-bottom:16px}

.screen{display:none}
.screen.active{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:450px){
  .cell{width:42px;height:42px}
  .room-code-display{font-size:36px;letter-spacing:8px}
}
</style>
</head>
<body>
<a class="back-btn" href="../../student.html">&larr; Back to Hub</a>

<!-- LOBBY: Create or Join -->
<div class="screen active" id="lobbyScreen">
<div class="lobby">
  <h1>Connect <span>4</span></h1>
  <p>Challenge a friend in real-time!</p>
  <div class="lobby-buttons">
    <button class="btn btn-accent" onclick="createGame()">Create Game</button>
    <div class="join-row">
      <input class="code-input" id="codeInput" type="text" maxlength="4" placeholder="CODE" inputmode="numeric">
      <button class="btn btn-blue btn-small" onclick="joinGame()">Join</button>
    </div>
    <div class="error-text" id="lobbyError"></div>
  </div>
</div>
</div>

<!-- WAITING: Show room code -->
<div class="screen" id="waitingScreen">
<div class="lobby">
  <h1>Room Created!</h1>
  <p>Share this code with your opponent:</p>
  <div class="room-code-display" id="roomCodeDisplay"></div>
  <p class="waiting-text">Waiting for opponent to join...</p>
  <button class="btn btn-outline btn-small" onclick="cancelGame()" style="margin-top:16px">Cancel</button>
</div>
</div>

<!-- GAME: The board -->
<div class="screen" id="gameScreen">
<div class="game">
  <div class="players-bar">
    <div class="player-label"><span class="player-dot p1"></span> <span id="p1Label">Player 1</span></div>
    <div class="player-label"><span class="player-dot p2"></span> <span id="p2Label">Player 2</span></div>
  </div>
  <div class="turn-indicator" id="turnIndicator"></div>
  <div class="board-wrapper">
    <div class="board" id="board"></div>
  </div>
</div>
</div>

<!-- RESULT -->
<div class="screen" id="resultScreen">
<div class="result">
  <h2 id="resultTitle"></h2>
  <div class="coins-earned" id="coinsEarned"></div>
  <div class="result-buttons">
    <button class="btn btn-accent" onclick="playAgain()">Play Again</button>
    <a class="btn btn-outline" href="../../student.html">Back to Hub</a>
  </div>
</div>
</div>

<script type="module">
import{initializeApp,getApp}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,updateDoc,onSnapshot,deleteDoc,increment}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const cfg={apiKey:"AIzaSyAAHwgxErk_M53tYXAMZmgA78m9AiRsEPk",authDomain:"oda-hub-d4bef.firebaseapp.com",projectId:"oda-hub-d4bef",storageBucket:"oda-hub-d4bef.firebasestorage.app",messagingSenderId:"632797371461",appId:"1:632797371461:web:5ec619138d64c0cbc3d72c"};
let app;try{app=getApp()}catch(e){app=initializeApp(cfg)}
const db=getFirestore(app);

const ROWS=6,COLS=7;
let roomCode=null,myPlayer=0,unsub=null;
const studentId=sessionStorage.getItem('studentId')||'anon_'+Math.random().toString(36).slice(2,8);

function emptyBoard(){return Array.from({length:COLS},()=>Array(ROWS).fill(0))}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function genCode(){return String(Math.floor(1000+Math.random()*9000))}

// CREATE GAME
window.createGame=async function(){
  roomCode=genCode();
  const ref=doc(db,'connect4games',roomCode);
  const snap=await getDoc(ref);
  if(snap.exists()){roomCode=genCode()}
  await setDoc(doc(db,'connect4games',roomCode),{
    board:emptyBoard(),turn:1,player1:studentId,player2:null,status:'waiting',winner:null
  });
  document.getElementById('roomCodeDisplay').textContent=roomCode;
  myPlayer=1;
  showScreen('waitingScreen');
  listenToGame();
};

// JOIN GAME
window.joinGame=async function(){
  const code=document.getElementById('codeInput').value.trim();
  if(code.length!==4){showError('Enter a 4-digit code');return}
  const ref=doc(db,'connect4games',code);
  const snap=await getDoc(ref);
  if(!snap.exists()){showError('Room not found');return}
  const data=snap.data();
  if(data.status!=='waiting'){showError('Game already in progress');return}
  if(data.player1===studentId){showError('You can\'t join your own game');return}
  roomCode=code;
  myPlayer=2;
  await updateDoc(ref,{player2:studentId,status:'playing'});
  listenToGame();
};

// CANCEL
window.cancelGame=async function(){
  if(roomCode){
    try{await deleteDoc(doc(db,'connect4games',roomCode))}catch(e){}
  }
  if(unsub)unsub();
  roomCode=null;
  showScreen('lobbyScreen');
};

// PLAY AGAIN
window.playAgain=function(){
  if(unsub)unsub();
  roomCode=null;myPlayer=0;
  showScreen('lobbyScreen');
};

function showError(msg){
  const el=document.getElementById('lobbyError');
  el.textContent=msg;
  setTimeout(()=>{el.textContent=''},3000);
}

// LISTEN TO GAME STATE
function listenToGame(){
  const ref=doc(db,'connect4games',roomCode);
  unsub=onSnapshot(ref,snap=>{
    if(!snap.exists()){
      showScreen('lobbyScreen');
      if(unsub)unsub();
      return;
    }
    const data=snap.data();

    if(data.status==='waiting'){
      // Still waiting
      return;
    }

    if(data.status==='playing'){
      showScreen('gameScreen');
      renderBoard(data.board,data.turn,data.winner);
      updateTurnIndicator(data.turn);
    }

    if(data.status==='finished'){
      renderBoard(data.board,data.turn,data.winner);
      showResult(data);
    }
  });
}

// RENDER BOARD
let lastBoard=null;
function renderBoard(board,turn,winner){
  const el=document.getElementById('board');
  const winCells=winner?getWinCells(board,winner):[];
  const isMyTurn=turn===myPlayer&&!winner;
  const prevBoard=lastBoard;
  lastBoard=board.map(c=>[...c]);

  el.innerHTML='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      const val=board[c][r];
      if(val===1)cell.classList.add('p1');
      if(val===2)cell.classList.add('p2');
      if(!isMyTurn||val!==0)cell.classList.add('disabled');

      // Animate newly placed pieces
      if(val!==0&&prevBoard&&prevBoard[c][r]===0){
        cell.classList.add('drop-anim');
      }

      // Highlight winning cells
      if(winCells.some(w=>w[0]===c&&w[1]===r)){
        cell.classList.add('win-cell');
      }

      if(isMyTurn&&val===0){
        cell.addEventListener('click',()=>dropPiece(c));
      }
      el.appendChild(cell);
    }
  }
}

function updateTurnIndicator(turn){
  const el=document.getElementById('turnIndicator');
  if(turn===myPlayer){
    el.innerHTML='<span style="color:#06d6a0">Your turn!</span>';
  }else{
    el.innerHTML='<span style="color:#8892a8">Opponent\'s turn...</span>';
  }
}

// DROP PIECE
async function dropPiece(col){
  const ref=doc(db,'connect4games',roomCode);
  const snap=await getDoc(ref);
  if(!snap.exists())return;
  const data=snap.data();
  if(data.turn!==myPlayer||data.status!=='playing')return;

  const board=data.board;
  // Find lowest empty row in column
  let row=-1;
  for(let r=ROWS-1;r>=0;r--){
    if(board[col][r]===0){row=r;break}
  }
  if(row===-1)return; // Column full

  board[col][row]=myPlayer;

  // Check win
  const won=checkWin(board,myPlayer);
  // Check draw
  const draw=!won&&board.every(c=>c.every(v=>v!==0));

  const update={board:board,turn:myPlayer===1?2:1};
  if(won){
    update.status='finished';
    update.winner=myPlayer;
  }else if(draw){
    update.status='finished';
    update.winner=0; // draw
  }
  await updateDoc(ref,update);
}

// CHECK WIN
function checkWin(board,player){
  const dirs=[[1,0],[0,1],[1,1],[1,-1]];
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS;r++){
      if(board[c][r]!==player)continue;
      for(const[dc,dr]of dirs){
        let count=1;
        for(let i=1;i<4;i++){
          const nc=c+dc*i,nr=r+dr*i;
          if(nc<0||nc>=COLS||nr<0||nr>=ROWS||board[nc][nr]!==player)break;
          count++;
        }
        if(count>=4)return true;
      }
    }
  }
  return false;
}

// GET WINNING CELLS for highlight
function getWinCells(board,winner){
  if(!winner||winner===0)return[];
  const dirs=[[1,0],[0,1],[1,1],[1,-1]];
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS;r++){
      if(board[c][r]!==winner)continue;
      for(const[dc,dr]of dirs){
        const cells=[[c,r]];
        for(let i=1;i<4;i++){
          const nc=c+dc*i,nr=r+dr*i;
          if(nc<0||nc>=COLS||nr<0||nr>=ROWS||board[nc][nr]!==winner)break;
          cells.push([nc,nr]);
        }
        if(cells.length>=4)return cells;
      }
    }
  }
  return[];
}

// SHOW RESULT
let coinsAwarded=false;
function showResult(data){
  showScreen('resultScreen');
  const titleEl=document.getElementById('resultTitle');
  const coinsEl=document.getElementById('coinsEarned');

  let coins=0;
  if(data.winner===0){
    titleEl.textContent='It\'s a Draw!';
    titleEl.style.color='#8892a8';
    coins=5;
  }else if(data.winner===myPlayer){
    titleEl.textContent='You Win!';
    titleEl.style.color='#06d6a0';
    coins=20;
  }else{
    titleEl.textContent='You Lose!';
    titleEl.style.color='#ef476f';
    coins=5;
  }
  coinsEl.textContent='\u{1FA99} +'+coins+' Coins';

  if(!coinsAwarded){
    coinsAwarded=true;
    awardCoins(coins);
  }
}

async function awardCoins(coins){
  if(!studentId||studentId.startsWith('anon_'))return;
  try{
    await updateDoc(doc(db,'students',studentId),{coins:increment(coins)});
  }catch(e){console.warn('Coin award failed:',e)}
}

// Reset coinsAwarded when returning to lobby
const origPlayAgain=window.playAgain;
window.playAgain=function(){coinsAwarded=false;origPlayAgain()};

// Player labels
document.getElementById('p1Label').textContent='Player 1 (Red)';
document.getElementById('p2Label').textContent='Player 2 (Yellow)';
</script>
</body>
</html>
