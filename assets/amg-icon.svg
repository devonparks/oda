<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1220"/>
      <stop offset="1" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06d6a0"/>
      <stop offset="1" stop-color="#04b890"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="100" fill="none" stroke="#2a3450" stroke-width="8"/>
  <!-- game-controller dots (playful corner accents) -->
  <circle cx="118" cy="118" r="14" fill="#ef476f"/>
  <circle cx="394" cy="118" r="14" fill="#ffd166"/>
  <circle cx="118" cy="394" r="14" fill="#118ab2"/>
  <circle cx="394" cy="394" r="14" fill="#7c3aed"/>
  <!-- AMG wordmark -->
  <text x="256" y="300" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="150" fill="url(#accent)" letter-spacing="-6">AMG</text>
  <text x="256" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="58" fill="#f0f4ff" letter-spacing="20">HUB</text>
</svg>
