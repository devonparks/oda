<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODA Hub - Elevator Pitch</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#2a3450;--accent:#06d6a0;--accent2:#118ab2;--accent3:#ef476f;--gold:#ffd166;--text:#f0f4ff;--text2:#8892a8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(6,214,160,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(6,214,160,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.app{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:20px 16px}
.back{display:inline-block;margin-bottom:16px;color:var(--text2);text-decoration:none;font-size:14px;font-weight:600}
.back:hover{color:var(--text)}

.header{text-align:center;margin-bottom:28px}
.header .emoji{font-size:56px;margin-bottom:8px;display:block}
.header h1{font-size:32px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--gold),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:14px;color:var(--text2);margin-top:4px}

/* Progress */
.prog{margin-bottom:20px}
.prog-bar{height:8px;background:var(--surface);border-radius:8px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:8px;transition:width .4s cubic-bezier(.34,1.56,.64,1)}
.prog-text{font-family:'Space Mono',monospace;font-size:11px;color:var(--text2);margin-top:6px;text-align:center}

/* Question card */
.card{background:var(--surface);border:2px solid var(--border);border-radius:24px;padding:32px 28px;margin-bottom:16px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.q-emoji{font-size:44px;text-align:center;margin-bottom:12px;display:block}
.q-label{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px;letter-spacing:-.5px}
.q-hint{font-size:14px;color:var(--text2);text-align:center;margin-bottom:20px;line-height:1.5}

.q-input{width:100%;padding:16px;background:var(--bg);border:2px solid var(--border);border-radius:14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:20px;font-weight:600;outline:none;transition:border-color .2s}
.q-input:focus{border-color:var(--accent)}
.q-input::placeholder{color:#3a4560;font-weight:400}
textarea.q-input{resize:none;min-height:100px;font-size:17px;line-height:1.5}

/* Chips */
.chips{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.chip{padding:14px;background:var(--surface2);border:2px solid var(--border);border-radius:14px;cursor:pointer;text-align:center;transition:all .2s;font-size:15px;font-weight:600}
.chip:hover{border-color:var(--accent2)}
.chip.on{border-color:var(--accent);background:rgba(6,214,160,.08);color:var(--accent)}
.chip .chip-emoji{font-size:24px;display:block;margin-bottom:4px}

/* Buttons */
.btn-row{display:flex;justify-content:space-between;margin-top:20px}
.btn{padding:14px 28px;border:none;border-radius:14px;font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn:active{transform:scale(.97)}
.btn-next{background:linear-gradient(135deg,var(--accent),#04b890);color:var(--bg)}
.btn-next:disabled{opacity:.3;cursor:not-allowed}
.btn-back{background:none;border:1px solid var(--border);color:var(--text2)}
.btn-back:hover{border-color:var(--text2);color:var(--text)}

/* Pitch result */
.pitch-card{background:linear-gradient(135deg,#111827,#1a2235);border:2px solid var(--gold);border-radius:24px;padding:32px;margin-bottom:20px;box-shadow:0 0 40px rgba(255,209,102,.08)}
.pitch-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;text-align:center}
.pitch-text{font-size:20px;font-weight:500;line-height:1.8;color:var(--text)}
.pitch-text strong{color:var(--accent);font-weight:700}
.pitch-name{font-size:28px;font-weight:900;text-align:center;color:var(--gold);margin-bottom:16px;letter-spacing:-1px}

.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn-gold{background:linear-gradient(135deg,var(--gold),#f0b830);color:var(--bg);padding:14px 24px}
.btn-blue{background:linear-gradient(135deg,var(--accent2),#0d7ea0);color:#fff;padding:14px 24px}
.btn-green{background:linear-gradient(135deg,var(--accent),#04b890);color:var(--bg);padding:14px 24px}

.copy-msg{display:none;text-align:center;padding:10px;margin-top:12px;border-radius:12px;background:rgba(6,214,160,.1);color:var(--accent);font-weight:600;font-size:14px}
.copy-msg.show{display:block}

/* Timer */
.timer-area{text-align:center;margin-top:20px;padding:24px;background:var(--surface);border:2px solid var(--border);border-radius:20px}
.timer-display{font-family:'Space Mono',monospace;font-size:56px;font-weight:700;color:var(--accent);margin-bottom:8px;transition:color .3s}
.timer-display.warn{color:var(--gold)}
.timer-display.over{color:var(--accent3)}
.timer-msg{font-size:14px;color:var(--text2);font-weight:600;min-height:22px;margin-bottom:12px}
.timer-btns{display:flex;gap:10px;justify-content:center}

/* Saved list */
.saved-section{margin-top:24px}
.saved-toggle{background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;color:var(--accent2);font-weight:600;text-decoration:underline}
.saved-list{margin-top:12px}
.saved-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.saved-name{font-weight:700;font-size:16px}
.saved-btns{display:flex;gap:8px}
.saved-btns button{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Outfit',sans-serif}
.saved-continue{background:var(--accent);color:var(--bg)}
.saved-delete{background:rgba(239,71,111,.15);color:var(--accent3)}

.confetti-piece{position:fixed;top:-20px;z-index:9999;pointer-events:none;animation:confettiFall 3s ease-in forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* AI Summary */
.ai-summary{background:linear-gradient(135deg,var(--surface),var(--surface2));border:2px solid var(--accent2);border-radius:20px;padding:24px;margin:20px 0;animation:fadeUp .4s ease}
.ai-summary-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ai-summary-text{font-size:15px;line-height:1.8;color:var(--text);white-space:pre-wrap}
.ai-loading{text-align:center;padding:20px;color:var(--text2);font-size:14px;font-weight:600}
.ai-loading::after{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--accent2);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Webcam recording */
.record-section{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:24px;margin:20px 0;text-align:center}
.record-section h3{font-size:18px;font-weight:800;margin-bottom:6px}
.record-section p{font-size:13px;color:var(--text2);margin-bottom:16px}
.video-preview{width:100%;max-width:480px;border-radius:14px;background:#000;margin:0 auto 16px;overflow:hidden;position:relative;aspect-ratio:4/3}
.video-preview video{width:100%;height:100%;object-fit:cover;display:block}
.rec-indicator{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.6);padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700;color:#fff}
.rec-dot{width:10px;height:10px;border-radius:50%;background:var(--accent3);animation:recPulse 1s ease-in-out infinite}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:.3}}
.rec-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-record{background:var(--accent3);color:#fff;padding:14px 28px}
.btn-record.recording{animation:recPulse 1s ease-in-out infinite}
.video-playback{width:100%;max-width:480px;border-radius:14px;margin:0 auto 16px;overflow:hidden}
.video-playback video{width:100%;display:block;border-radius:14px}

/* Submit section */
.submit-section{margin:24px 0;text-align:center}
.btn-submit{background:linear-gradient(135deg,var(--accent),#04b890);color:var(--bg);padding:18px 40px;font-size:20px;width:100%;border-radius:18px}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="app">
<a class="back" href="index.html">&#x2190; Back to ODA Hub</a>
<div class="header">
<span class="emoji">&#x1F3A4;</span>
<h1>Elevator Pitch Builder</h1>
<p>Answer a few questions and we'll write your pitch!</p>
</div>

<div class="prog" id="progWrap" style="display:none">
<div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
<div class="prog-text" id="progText"></div>
</div>

<div id="content"></div>
</div>

<script>
var QUESTIONS=[
{id:'name',emoji:'\u{1F44B}',label:"What's your name?",hint:'First and last name!',type:'text',placeholder:'Type your full name...'},
{id:'age',emoji:'\u{1F382}',label:'How old are you?',hint:'',type:'text',placeholder:'Your age...'},
{id:'school',emoji:'\u{1F3EB}',label:'What school do you go to?',hint:'',type:'text',placeholder:'Your school name...'},
{id:'from',emoji:'\u{1F3E0}',label:'Where are you from?',hint:'Your city or neighborhood',type:'text',placeholder:'Cleveland, Ohio...'},
{id:'grade',emoji:'\u{1F4DA}',label:'What grade are you in?',hint:'',type:'text',placeholder:'3rd grade...'},
{id:'dream',emoji:'\u{1F31F}',label:'What do you want to be when you grow up?',hint:'Dream BIG! There\'s no wrong answer.',type:'text',placeholder:'I want to be a...'},
{id:'why',emoji:'\u{1F4AD}',label:'Why do you want to be that?',hint:'What makes you excited about it?',type:'textarea',placeholder:'Because I love...'},
{id:'hobby',emoji:'\u{1F3AE}',label:'What do you like to do for fun?',hint:'Sports, games, art, music, anything!',type:'text',placeholder:'I like to...'},
{id:'fact',emoji:'\u{1F929}',label:'Tell me something cool about you!',hint:'A fun fact, talent, or something that makes you unique.',type:'textarea',placeholder:'Something cool about me is...'},
{id:'remember',emoji:'\u{1F4AA}',label:'What should people remember about you?',hint:'One word or phrase that describes YOU.',type:'text',placeholder:'I am...'}
];

var answers={};
var step=-1;
var savedKey='oda-elevator-pitches';
var timerInterval=null;
var timerSeconds=0;
var timerRunning=false;
var assignmentId=null,studentId=null,isAssignmentMode=false;
var mediaRecorder=null,recordedChunks=[],recordedBlob=null,cameraStream=null;

function init(){
var params=new URLSearchParams(window.location.search);
assignmentId=params.get('assignmentId');
studentId=params.get('studentId')||sessionStorage.getItem('studentId');
isAssignmentMode=!!assignmentId;
if(!isAssignmentMode)loadSaved();
showStart();
}

function showStart(){
step=-1;
document.getElementById('progWrap').style.display='none';
var saved=getSaved();
// In assignment mode with a session name, skip start and jump right in
var sessionName=sessionStorage.getItem('studentName');
if(isAssignmentMode&&sessionName){
answers.name=sessionName;
step=1; // skip the name question
startInterview();
return;
}
var html='<div class="card" style="text-align:center">';
html+='<span class="q-emoji">\u{1F680}</span>';
html+='<div class="q-label">Ready to shine?</div>';
html+='<div class="q-hint">Answer 10 quick questions and we\'ll build your elevator pitch. It takes about 3 minutes!</div>';
html+='<div style="margin-top:20px"><button class="btn btn-next" onclick="startInterview()" style="padding:18px 40px;font-size:20px">Start My Pitch! \u{1F3A4}</button></div>';
html+='</div>';
if(!isAssignmentMode&&saved.length>0){
html+='<div class="saved-section">';
html+='<button class="saved-toggle" onclick="toggleSaved()">&#x1F4CB; Load a saved pitch ('+saved.length+' saved)</button>';
html+='<div class="saved-list" id="savedList" style="display:none">';
for(var i=0;i<saved.length;i++){
html+='<div class="saved-item"><span class="saved-name">'+esc(saved[i].answers.name||'Unknown')+'</span>';
html+='<div class="saved-btns"><button class="saved-continue" onclick="loadPitch('+i+')">View</button>';
html+='<button class="saved-delete" onclick="deletePitch('+i+')">&times;</button></div></div>';
}
html+='</div></div>';
}
document.getElementById('content').innerHTML=html;
}

function startInterview(){
if(step<=0){answers={};step=0}
showQuestion();
}

function showQuestion(){
if(step>=QUESTIONS.length){generatePitch();return}
var q=QUESTIONS[step];
document.getElementById('progWrap').style.display='';
document.getElementById('progFill').style.width=((step/QUESTIONS.length)*100)+'%';
document.getElementById('progText').textContent='Question '+(step+1)+' of '+QUESTIONS.length;

var val=answers[q.id]||'';
var html='<div class="card">';
html+='<span class="q-emoji">'+q.emoji+'</span>';
html+='<div class="q-label">'+q.label+'</div>';
if(q.hint)html+='<div class="q-hint">'+q.hint+'</div>';

if(q.type==='textarea'){
html+='<textarea class="q-input" id="qInput" placeholder="'+q.placeholder+'">'+esc(val)+'</textarea>';
}else{
html+='<input type="text" class="q-input" id="qInput" placeholder="'+q.placeholder+'" value="'+esc(val)+'" autocomplete="off">';
}

html+='<div class="btn-row">';
if(step>0)html+='<button class="btn btn-back" onclick="prevQ()">&#x2190; Back</button>';
else html+='<div></div>';
html+='<button class="btn btn-next" id="nextBtn" onclick="nextQ()">Next &#x2192;</button>';
html+='</div></div>';

document.getElementById('content').innerHTML=html;
var inp=document.getElementById('qInput');
inp.focus();
inp.addEventListener('input',function(){
document.getElementById('nextBtn').disabled=!this.value.trim();
});
document.getElementById('nextBtn').disabled=!val.trim();
}

function nextQ(){
var val=document.getElementById('qInput').value.trim();
if(!val)return;
answers[QUESTIONS[step].id]=val;
step++;
showQuestion();
}

function prevQ(){
var inp=document.getElementById('qInput');
if(inp)answers[QUESTIONS[step].id]=inp.value.trim();
step--;
showQuestion();
}

function generatePitch(){
document.getElementById('progWrap').style.display='none';
var a=answers;

// Build multiple pitch styles
var pitches=[];

// Style 1: Confident & Direct
var p1="Hi, my name is "+a.name+" and I'm "+a.age+" years old. ";
p1+="I'm from "+a.from+" and I go to "+a.school+" where I'm in "+a.grade+". ";
p1+="When I grow up, I want to be a "+a.dream+" because "+a.why+" ";
p1+="In my free time, I love to "+a.hobby+". ";
p1+="Something cool about me? "+a.fact+" ";
p1+="If you remember one thing about me, remember that I am "+a.remember+". ";
p1+="Thank you!";
pitches.push({label:'Confident & Direct',text:p1});

// Style 2: Story Style
var p2="Have you ever met someone who is "+a.remember+"? Well, now you have! ";
p2+="My name is "+a.name+", I'm "+a.age+", and I'm from "+a.from+". ";
p2+="Right now I'm in "+a.grade+" at "+a.school+", but I've got big plans. ";
p2+="I'm going to be a "+a.dream+" one day because "+a.why+" ";
p2+="When I'm not working on my dreams, you can find me doing what I love most \u2014 "+a.hobby+". ";
p2+="Here's something you should know about me: "+a.fact+" ";
p2+="Remember my name \u2014 "+(a.name.split(' ')[0]||a.name)+". Thank you!";
pitches.push({label:'Story Style',text:p2});

// Style 3: Bold & Fun
var p3="What's up everybody! I'm "+a.name+" and I am "+a.age+" years old! ";
p3+="I come from "+a.from+" and I go to "+a.school+". ";
p3+="My dream? I'm going to be a "+a.dream+"! Why? Because "+a.why+" ";
p3+="I'm also super into "+a.hobby+" \u2014 that's my thing. ";
p3+="And here's a fun fact: "+a.fact+" ";
p3+="One word that describes me? "+a.remember+". Don't forget it! Thank you!";
pitches.push({label:'Bold & Fun',text:p3});

// Save
savePitch(answers,pitches[0].text);

// Show result
var html='<div style="text-align:center;margin-bottom:20px;animation:fadeUp .4s ease">';
html+='<span style="font-size:64px;display:block">\u{1F389}</span>';
html+='<div style="font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px">Pitch Ready!</div>';
html+='<div style="font-size:14px;color:var(--text2)">Pick a style and practice it!</div>';
html+='</div>';

// Style selector
html+='<div style="display:flex;gap:8px;margin-bottom:16px;justify-content:center">';
for(var i=0;i<pitches.length;i++){
html+='<button class="btn '+(i===0?'btn-next':'btn-back')+'" style="padding:8px 16px;font-size:13px" id="styleBtn'+i+'" onclick="switchStyle('+i+')">'+pitches[i].label+'</button>';
}
html+='</div>';

html+='<div class="pitch-card">';
html+='<div class="pitch-label">&#x1F3A4; '+esc(a.name)+'\'s Elevator Pitch</div>';
html+='<div class="pitch-text" id="pitchText">'+formatPitch(pitches[0].text,a)+'</div>';
html+='</div>';

html+='<div id="copyMsg" class="copy-msg"></div>';

html+='<div class="result-btns">';
html+='<button class="btn btn-gold" onclick="copyPitch()">&#x1F4CB; Copy Pitch</button>';
html+='<button class="btn btn-blue" onclick="toggleTimer()">&#x23F1;&#xFE0F; Practice Timer</button>';
if(!isAssignmentMode)html+='<button class="btn btn-green" onclick="nextStudent()">&#x1F195; Next Student</button>';
html+='</div>';

// Timer
html+='<div class="timer-area" id="timerArea" style="display:none">';
html+='<div class="timer-display" id="timerDisplay">0:00</div>';
html+='<div class="timer-msg" id="timerMsg">Aim for 30\u201360 seconds!</div>';
html+='<div class="timer-btns">';
html+='<button class="btn btn-next" id="timerStartBtn" onclick="timerStart()">&#x25B6; Start</button>';
html+='</div></div>';

// AI Summary
html+='<div class="ai-summary" id="aiSummary"><div class="ai-loading" id="aiLoading">\u{1F916} AI is writing your personalized summary</div><div class="ai-summary-text" id="aiSummaryText" style="display:none"></div></div>';

// Webcam recording
html+='<div class="record-section" id="recordSection">';
html+='<h3>\u{1F3A5} Record Your Pitch</h3>';
html+='<p>Practice saying your pitch out loud, then record yourself! Your teacher will be able to watch it.</p>';
html+='<div class="video-preview" id="videoPreview" style="display:none"><video id="cameraFeed" autoplay muted playsinline></video><div class="rec-indicator" id="recIndicator" style="display:none"><span class="rec-dot"></span><span id="recTimer">0:00</span></div></div>';
html+='<div class="video-playback" id="videoPlayback" style="display:none"><video id="playbackVideo" controls playsinline></video></div>';
html+='<div class="rec-btns" id="recBtns"><button class="btn btn-record" onclick="startCamera()">\u{1F4F7} Open Camera</button></div>';
html+='</div>';

// Submit & Go Home (assignment mode)
if(isAssignmentMode){
html+='<div class="submit-section"><button class="btn btn-submit" onclick="submitAndGoHome()" id="btnSubmit">Submit & Go Home \u{1F3E0}</button></div>';
}

document.getElementById('content').innerHTML=html;
window.currentPitches=pitches;
window.currentAnswers=a;
fireConfetti();
// Trigger AI summary
fetchAiSummary(a);
}

function switchStyle(idx){
var pitches=window.currentPitches;
document.getElementById('pitchText').innerHTML=formatPitch(pitches[idx].text,window.currentAnswers);
for(var i=0;i<pitches.length;i++){
var btn=document.getElementById('styleBtn'+i);
btn.className='btn '+(i===idx?'btn-next':'btn-back');
btn.style.padding='8px 16px';
btn.style.fontSize='13px';
}
}

function formatPitch(text,a){
// Bold the name and dream job
text=text.replace(new RegExp(escRegex(a.name),'g'),'<strong>'+esc(a.name)+'</strong>');
text=text.replace(new RegExp(escRegex(a.dream),'gi'),'<strong>'+esc(a.dream)+'</strong>');
return text;
}

function escRegex(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}

function copyPitch(){
var pitchEl=document.getElementById('pitchText');
var text=pitchEl.innerText||pitchEl.textContent;
try{
var ta=document.createElement('textarea');
ta.value=text;document.body.appendChild(ta);ta.select();
document.execCommand('copy');document.body.removeChild(ta);
var m=document.getElementById('copyMsg');
m.textContent='\u2705 Copied! Paste it anywhere.';
m.classList.add('show');
setTimeout(function(){m.classList.remove('show')},3000);
}catch(e){alert('Couldn\'t copy')}
}

function toggleTimer(){
var el=document.getElementById('timerArea');
el.style.display=el.style.display==='none'?'block':'none';
}

function timerStart(){
if(!timerRunning){
timerRunning=true;
timerSeconds=0;
timerInterval=setInterval(function(){
timerSeconds++;
updateTimer();
},1000);
document.getElementById('timerStartBtn').outerHTML='<button class="btn btn-back" style="background:var(--accent3);color:#fff;border:none" onclick="timerStop()">&#x23F9; Stop</button>';
}
}

function timerStop(){
timerRunning=false;
clearInterval(timerInterval);
var good=timerSeconds>=30&&timerSeconds<=60;
document.getElementById('timerMsg').textContent=good?'\u{1F31F} Perfect length!':timerSeconds<30?'Try to say a little more!':'Try to keep it shorter!';
document.getElementById('timerMsg').style.color=good?'var(--accent)':'var(--gold)';
var btns='<button class="btn btn-next" onclick="timerStart()">&#x25B6; Again</button>';
btns+='<button class="btn btn-back" onclick="timerReset()">&#x21BA; Reset</button>';
document.querySelector('.timer-btns').innerHTML=btns;
}

function timerReset(){
timerRunning=false;
clearInterval(timerInterval);
timerSeconds=0;
updateTimer();
document.getElementById('timerMsg').textContent='Aim for 30\u201360 seconds!';
document.getElementById('timerMsg').style.color='var(--text2)';
document.querySelector('.timer-btns').innerHTML='<button class="btn btn-next" id="timerStartBtn" onclick="timerStart()">&#x25B6; Start</button>';
}

function updateTimer(){
var m=Math.floor(timerSeconds/60);
var s=timerSeconds%60;
var el=document.getElementById('timerDisplay');
el.textContent=m+':'+(s<10?'0':'')+s;
el.className='timer-display'+(timerSeconds>60?' over':timerSeconds>=30?' warn':'');
if(timerRunning){
var msg=document.getElementById('timerMsg');
if(timerSeconds<30){msg.textContent='Keep going... \u{1F3A4}';msg.style.color='var(--text2)'}
else if(timerSeconds<=60){msg.textContent='Great length! \u2728';msg.style.color='var(--accent)'}
else{msg.textContent='Wrapping up? \u23F0';msg.style.color='var(--accent3)'}
}
}

function nextStudent(){
answers={};
step=-1;
timerReset();
showStart();
}

async function fetchAiSummary(a){
try{
var prompt='You are a supportive teacher for an afterschool program. A student just completed their elevator pitch questionnaire. Write a short (3-4 sentences) personalized summary that:\n1. Highlights what makes this student unique and special\n2. Connects their interests to their dream career\n3. Gives one specific tip for delivering their pitch confidently\n\nKeep it warm, encouraging, and age-appropriate (K-12). Do NOT use bullet points. Write it as a paragraph directly to the student (use "you").\n\nStudent answers:\nName: '+a.name+'\nAge: '+a.age+'\nSchool: '+a.school+'\nFrom: '+a.from+'\nGrade: '+a.grade+'\nDream career: '+a.dream+'\nWhy: '+a.why+'\nHobby: '+a.hobby+'\nFun fact: '+a.fact+'\nRemember me as: '+a.remember;

var resp=await fetch('https://us-central1-oda-hub-d4bef.cloudfunctions.net/ai',{
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({prompt:prompt,max_tokens:300})
});
var data=await resp.json();
var text=data.response||data.text||(Array.isArray(data.content)&&data.content[0]?data.content[0].text:'')||'';
if(text){
document.getElementById('aiLoading').style.display='none';
var el=document.getElementById('aiSummaryText');
el.style.display='block';
el.innerHTML='<div class="ai-summary-label">\u{1F916} AI Summary</div>'+esc(text);
window.aiSummaryText=text;
}
}catch(e){
console.error('AI summary error:',e);
var el=document.getElementById('aiSummary');
if(el)el.style.display='none';
}
}

// ===== WEBCAM RECORDING =====
var recTimerInterval=null,recSeconds=0;

async function startCamera(){
try{
cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:true});
var video=document.getElementById('cameraFeed');
video.srcObject=cameraStream;
document.getElementById('videoPreview').style.display='block';
document.getElementById('videoPlayback').style.display='none';
document.getElementById('recBtns').innerHTML='<button class="btn btn-record" onclick="startRecording()">\u{1F534} Start Recording</button><button class="btn btn-back" onclick="stopCamera()">Cancel</button>';
}catch(e){
alert('Could not access camera. Make sure you allow camera and microphone access.');
console.error('Camera error:',e);
}
}

function stopCamera(){
if(cameraStream){cameraStream.getTracks().forEach(function(t){t.stop()});cameraStream=null}
document.getElementById('videoPreview').style.display='none';
document.getElementById('recBtns').innerHTML='<button class="btn btn-record" onclick="startCamera()">\u{1F4F7} Open Camera</button>';
}

function startRecording(){
if(!cameraStream)return;
recordedChunks=[];
recSeconds=0;
var options={mimeType:'video/webm;codecs=vp8,opus'};
try{mediaRecorder=new MediaRecorder(cameraStream,options)}catch(e){
try{mediaRecorder=new MediaRecorder(cameraStream)}catch(e2){alert('Recording not supported on this browser');return}
}
mediaRecorder.ondataavailable=function(e){if(e.data.size>0)recordedChunks.push(e.data)};
mediaRecorder.onstop=function(){
recordedBlob=new Blob(recordedChunks,{type:'video/webm'});
var url=URL.createObjectURL(recordedBlob);
document.getElementById('videoPreview').style.display='none';
var pb=document.getElementById('videoPlayback');
pb.style.display='block';
document.getElementById('playbackVideo').src=url;
document.getElementById('recBtns').innerHTML='<button class="btn btn-next" onclick="startCamera()">\u{1F504} Re-record</button><button class="btn btn-gold" onclick="keepRecording()">\u2705 Keep This!</button>';
if(cameraStream){cameraStream.getTracks().forEach(function(t){t.stop()});cameraStream=null}
clearInterval(recTimerInterval);
};
mediaRecorder.start();
document.getElementById('recIndicator').style.display='flex';
recTimerInterval=setInterval(function(){recSeconds++;document.getElementById('recTimer').textContent=Math.floor(recSeconds/60)+':'+(recSeconds%60<10?'0':'')+(recSeconds%60)},1000);
document.getElementById('recBtns').innerHTML='<button class="btn btn-record recording" onclick="stopRecording()">\u23F9 Stop Recording</button>';
}

function stopRecording(){
if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
document.getElementById('recIndicator').style.display='none';
clearInterval(recTimerInterval);
}

function keepRecording(){
document.getElementById('recBtns').innerHTML='<div style="color:var(--accent);font-weight:700;font-size:15px">\u2705 Video saved! It will be submitted with your pitch.</div>';
}
