<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODA World - Create Your Character</title>
<meta name="theme-color" content="#0a0e1a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/oda-theme.css">
<link rel="stylesheet" href="css/creator.css">
</head>
<body>
<div class="grid-bg"></div>

<div class="creator-app">
  <div class="creator-header">
    <a href="../student.html" class="back-link">&larr; Back</a>
    <h1>Create Your Character</h1>
    <div class="header-right">
      <button class="btn btn-outline btn-sm" onclick="randomize()">Randomize</button>
    </div>
  </div>

  <div class="creator-main">
    <!-- Preview Column -->
    <div class="preview-col">
      <div class="preview-card" onclick="expandPreview()" style="cursor:pointer" title="Click to enlarge">
        <canvas id="charPreview" width="256" height="256"></canvas>
        <div class="preview-name" id="previewName">Your Character</div>
      </div>
      <div class="preview-mini-row">
        <canvas id="miniPreview1" width="64" height="64" title="Small"></canvas>
        <canvas id="miniPreview2" width="48" height="48" title="Tiny"></canvas>
        <canvas id="miniPreview3" width="32" height="32" title="World size"></canvas>
        <span class="mini-label">How you look in-game</span>
      </div>
    </div>

    <!-- Options Column -->
    <div class="options-col">
      <!-- Gender Picker (compact) -->
      <div class="gender-picker">
        <button class="gender-btn active" id="genderBoy" onclick="pickGender('boy')">Boy</button>
        <button class="gender-btn" id="genderGirl" onclick="pickGender('girl')">Girl</button>
      </div>

      <!-- Category Tabs -->
      <div class="cat-tabs" id="catTabs">
        <button class="cat-tab active" data-cat="skin" onclick="switchCat('skin')">Skin</button>
        <button class="cat-tab" data-cat="face" onclick="switchCat('face')">Face</button>
        <button class="cat-tab" data-cat="hair" onclick="switchCat('hair')">Hair</button>
        <button class="cat-tab" data-cat="hairColor" onclick="switchCat('hairColor')">Hair Color</button>
        <button class="cat-tab" data-cat="outfit" onclick="switchCat('outfit')">Outfit</button>
        <button class="cat-tab" data-cat="shoes" onclick="switchCat('shoes')">Shoes</button>
      </div>

      <!-- Face Sub-Tabs (visible when face tab is active) -->
      <div class="sub-tabs" id="faceSubTabs" style="display:none">
        <button class="sub-tab active" data-sub="eyeShape" onclick="switchSubCat('eyeShape')">Eyes</button>
        <button class="sub-tab" data-sub="eyeColor" onclick="switchSubCat('eyeColor')">Eye Color</button>
        <button class="sub-tab" data-sub="eyebrowStyle" onclick="switchSubCat('eyebrowStyle')">Brows</button>
        <button class="sub-tab" data-sub="noseStyle" onclick="switchSubCat('noseStyle')">Nose</button>
        <button class="sub-tab" data-sub="mouthStyle" onclick="switchSubCat('mouthStyle')">Mouth</button>
        <button class="sub-tab" data-sub="eyelashStyle" onclick="switchSubCat('eyelashStyle')">Lashes</button>
        <button class="sub-tab" data-sub="earStyle" onclick="switchSubCat('earStyle')">Ears</button>
      </div>

      <!-- Outfit Sub-Flow (visible when outfit tab is active) -->
      <div class="sub-tabs" id="outfitSubTabs" style="display:none">
        <button class="sub-tab active" data-sub="garment" onclick="switchSubCat('garment')">Garment</button>
        <button class="sub-tab" data-sub="outfitColor" onclick="switchSubCat('outfitColor')">Color</button>
        <button class="sub-tab" data-sub="outfitPattern" onclick="switchSubCat('outfitPattern')">Pattern</button>
      </div>

      <!-- Shoe Sub-Flow -->
      <div class="sub-tabs" id="shoeSubTabs" style="display:none">
        <button class="sub-tab active" data-sub="shoeType" onclick="switchSubCat('shoeType')">Type</button>
        <button class="sub-tab" data-sub="shoeColor" onclick="switchSubCat('shoeColor')">Color</button>
      </div>

      <div class="options-grid" id="optionsGrid"></div>
    </div>
  </div>

  <div class="save-bar">
    <button class="btn btn-accent btn-lg save-btn" onclick="saveCharacter()" id="saveBtn">Save & Enter ODA World</button>
  </div>
</div>

<script src="../js/oda-core.js"></script>
<script src="js/character-parts.js"></script>
<script src="js/character-face.js"></script>
<script src="js/character-hair.js"></script>
<script src="js/character-outfit.js"></script>
<script src="js/character-shoes.js"></script>
<script src="js/character-renderer.js"></script>
<script src="js/color-picker.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────
var currentConfig = ODA_PARTS.defaultConfig('boy');
var currentCat = 'skin';
var currentSubCat = 'eyeShape';

// ── Render ────────────────────────────────────────────────────
function render() {
  ODA_RENDER.drawPreview(document.getElementById('charPreview'), currentConfig, { size: 256 });
  ODA_RENDER.drawPreview(document.getElementById('miniPreview1'), currentConfig, { size: 64 });
  ODA_RENDER.drawPreview(document.getElementById('miniPreview2'), currentConfig, { size: 48 });
  ODA_RENDER.drawPreview(document.getElementById('miniPreview3'), currentConfig, { size: 32 });
}

// ── Gender ────────────────────────────────────────────────────
function pickGender(g) {
  currentConfig.gender = g;
  var def = ODA_PARTS.defaultConfig(g);
  currentConfig.bodyType = def.bodyType;
  // Reset outfit garment if not valid for new gender
  var curGarment = ODA_PARTS.find(ODA_PARTS.GARMENTS, currentConfig.outfit.garment);
  if (curGarment && curGarment.gender !== 'both' && curGarment.gender !== g) {
    currentConfig.outfit.garment = def.outfit.garment;
  }
  // Reset hair if not valid
  var curHair = ODA_PARTS.find(ODA_PARTS.HAIR_STYLES, currentConfig.hairStyle);
  if (curHair && curHair.gender !== 'both' && curHair.gender !== g) {
    currentConfig.hairStyle = def.hairStyle;
  }
  document.getElementById('genderBoy').classList.toggle('active', g === 'boy');
  document.getElementById('genderGirl').classList.toggle('active', g === 'girl');
  render();
  renderOptions();
}

// ── Category Switching ────────────────────────────────────────
function switchCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  document.getElementById('faceSubTabs').style.display = cat === 'face' ? 'flex' : 'none';
  document.getElementById('outfitSubTabs').style.display = cat === 'outfit' ? 'flex' : 'none';
  document.getElementById('shoeSubTabs').style.display = cat === 'shoes' ? 'flex' : 'none';
  // Reset sub-tab to first
  if (cat === 'face') { currentSubCat = 'eyeShape'; highlightSubTab('faceSubTabs', 'eyeShape'); }
  if (cat === 'outfit') { currentSubCat = 'garment'; highlightSubTab('outfitSubTabs', 'garment'); }
  if (cat === 'shoes') { currentSubCat = 'shoeType'; highlightSubTab('shoeSubTabs', 'shoeType'); }
  renderOptions();
}

function switchSubCat(sub) {
  currentSubCat = sub;
  var parentId = currentCat === 'face' ? 'faceSubTabs' : currentCat === 'outfit' ? 'outfitSubTabs' : 'shoeSubTabs';
  highlightSubTab(parentId, sub);
  renderOptions();
}

function highlightSubTab(containerId, sub) {
  document.querySelectorAll('#' + containerId + ' .sub-tab').forEach(t => t.classList.toggle('active', t.dataset.sub === sub));
}

// ── Render Options Grid ───────────────────────────────────────
function renderOptions() {
  var grid = document.getElementById('optionsGrid');
  var h = '';
  var g = currentConfig.gender;

  switch (currentCat) {
    case 'skin':
      ODA_PARTS.SKIN_TONES.forEach(s => {
        var sel = currentConfig.skinTone === s.id ? ' selected' : '';
        h += '<button class="opt-btn skin-opt' + sel + '" onclick="pickSkin(\'' + s.id + '\')" title="' + s.label + '">';
        h += '<div class="skin-swatch" style="background:' + s.hex + '"></div>';
        h += '<span>' + s.label + '</span></button>';
      });
      break;

    case 'face':
      h = renderFaceOptions();
      break;

    case 'hair':
      // Flat grid — just group headers, no category separators
      var allHairs = ODA_PARTS.filterByGender(ODA_PARTS.HAIR_STYLES, g);
      var hairGroups = ODA_PARTS.getGroups(allHairs);
      for (var grp in hairGroups) {
        h += '<div class="group-header"><span>' + grp + '</span></div>';
        hairGroups[grp].forEach(hs => {
          var sel = currentConfig.hairStyle === hs.id ? ' selected' : '';
          h += '<button class="opt-btn hair-opt' + sel + '" onclick="pickHair(\'' + hs.id + '\')">';
          h += '<canvas class="hair-preview" data-hair="' + hs.id + '" width="64" height="64"></canvas>';
          h += '<span>' + hs.label + '</span></button>';
        });
      }
      break;

    case 'hairColor':
      ODA_PARTS.HAIR_COLORS.forEach(hc => {
        var sel = currentConfig.hairColor === hc.hex ? ' selected' : '';
        h += '<button class="opt-btn color-opt' + sel + '" onclick="pickHairColor(\'' + hc.hex + '\')">';
        h += '<div class="color-swatch" style="background:' + hc.hex + '"></div>';
        h += '<span>' + hc.label + '</span></button>';
      });
      break;

    case 'outfit':
      h = renderOutfitOptions();
      break;

    case 'shoes':
      h = renderShoeOptions();
      break;
  }

  grid.innerHTML = h;
  renderCanvasPreviews();
}

function renderFaceOptions() {
  var h = '';
  var face = currentConfig.face;

  switch (currentSubCat) {
    case 'eyeShape':
      ODA_PARTS.EYE_SHAPES.forEach(es => {
        var sel = face.eyeShape === es.id ? ' selected' : '';
        h += '<button class="opt-btn' + sel + '" onclick="pickFace(\'eyeShape\',\'' + es.id + '\')">';
        h += '<canvas class="face-preview" data-face="eyeShape" data-val="' + es.id + '" width="64" height="64"></canvas>';
        h += '<span>' + es.label + '</span></button>';
      });
      break;

    case 'eyeColor':
      ODA_PARTS.EYE_COLORS.forEach(ec => {
        var sel = face.eyeColor === ec.hex ? ' selected' : '';
        h += '<button class="opt-btn color-opt' + sel + '" onclick="pickFace(\'eyeColor\',\'' + ec.hex + '\')">';
        h += '<div class="color-swatch" style="background:' + ec.hex + '"></div>';
        h += '<span>' + ec.label + '</span></button>';
      });
      break;

    case 'eyebrowStyle':
      ODA_PARTS.EYEBROW_STYLES.forEach(eb => {
        var sel = face.eyebrowStyle === eb.id ? ' selected' : '';
        h += '<button class="opt-btn' + sel + '" onclick="pickFace(\'eyebrowStyle\',\'' + eb.id + '\')">';
        h += '<canvas class="face-preview" data-face="eyebrowStyle" data-val="' + eb.id + '" width="64" height="64"></canvas>';
        h += '<span>' + eb.label + '</span></button>';
      });
      break;

    case 'noseStyle':
      ODA_PARTS.NOSE_STYLES.forEach(ns => {
        var sel = face.noseStyle === ns.id ? ' selected' : '';
        h += '<button class="opt-btn' + sel + '" onclick="pickFace(\'noseStyle\',\'' + ns.id + '\')">';
        h += '<canvas class="face-preview" data-face="noseStyle" data-val="' + ns.id + '" width="64" height="64"></canvas>';
        h += '<span>' + ns.label + '</span></button>';
      });
      break;

    case 'mouthStyle':
      ODA_PARTS.MOUTH_STYLES.forEach(ms => {
        var sel = face.mouthStyle === ms.id ? ' selected' : '';
        h += '<button class="opt-btn' + sel + '" onclick="pickFace(\'mouthStyle\',\'' + ms.id + '\')">';
        h += '<canvas class="face-preview" data-face="mouthStyle" data-val="' + ms.id + '" width="64" height="64"></canvas>';
        h += '<span>' + ms.label + '</span></button>';
      });
      break;

    case 'eyelashStyle':
      ODA_PARTS.EYELASH_STYLES.forEach(el => {
        var sel = face.eyelashStyle === el.id ? ' selected' : '';
        h += '<button class="opt-btn' + sel + '" onclick="pickFace(\'eyelashStyle\',\'' + el.id + '\')">';
        h += '<span class="opt-label-only">' + el.label + '</span></button>';
      });
      break;

    case 'earStyle':
      ODA_PARTS.EAR_STYLES.forEach(ea => {
        var sel = face.earStyle === ea.id ? ' selected' : '';
        h += '<button class="opt-btn' + sel + '" onclick="pickFace(\'earStyle\',\'' + ea.id + '\')">';
        h += '<span class="opt-label-only">' + ea.label + '</span></button>';
      });
      break;
  }
  return h;
}

function renderOutfitOptions() {
  var h = '';
  var outfit = currentConfig.outfit;

  switch (currentSubCat) {
    case 'garment':
      var garments = ODA_PARTS.filterByGender(ODA_PARTS.GARMENTS, currentConfig.gender);
      garments.forEach(gar => {
        var sel = outfit.garment === gar.id ? ' selected' : '';
        h += '<button class="opt-btn' + sel + '" onclick="pickOutfit(\'garment\',\'' + gar.id + '\')">';
        h += '<canvas class="outfit-preview" data-garment="' + gar.id + '" width="64" height="64"></canvas>';
        h += '<span>' + gar.label + '</span></button>';
      });
      break;

    case 'outfitColor':
      h += '<div class="color-section"><span class="color-section-label">Primary Color</span>';
      h += '<div class="color-row">';
      ODA_PARTS.COLOR_PRESETS.forEach(c => {
        var sel = outfit.primaryColor === c ? ' active' : '';
        h += '<button class="cp-inline-swatch' + sel + '" style="background:' + c + '" onclick="pickOutfit(\'primaryColor\',\'' + c + '\')"></button>';
      });
      h += '<button class="cp-custom-inline" onclick="openOutfitPicker(\'primaryColor\', this)">+</button>';
      h += '</div></div>';

      h += '<div class="color-section"><span class="color-section-label">Secondary Color</span>';
      h += '<div class="color-row">';
      ODA_PARTS.COLOR_PRESETS.forEach(c => {
        var sel = outfit.secondaryColor === c ? ' active' : '';
        h += '<button class="cp-inline-swatch' + sel + '" style="background:' + c + '" onclick="pickOutfit(\'secondaryColor\',\'' + c + '\')"></button>';
      });
      h += '<button class="cp-custom-inline" onclick="openOutfitPicker(\'secondaryColor\', this)">+</button>';
      h += '</div></div>';
      break;

    case 'outfitPattern':
      ODA_PARTS.PATTERNS.forEach(p => {
        var sel = outfit.pattern === p.id ? ' selected' : '';
        h += '<button class="opt-btn' + sel + '" onclick="pickOutfit(\'pattern\',\'' + p.id + '\')">';
        h += '<span class="opt-label-only">' + p.label + '</span></button>';
      });
      break;
  }
  return h;
}

function renderShoeOptions() {
  var h = '';
  var shoes = currentConfig.shoes;

  switch (currentSubCat) {
    case 'shoeType':
      ODA_PARTS.SHOE_TYPES.forEach(st => {
        var sel = shoes.type === st.id ? ' selected' : '';
        h += '<button class="opt-btn' + sel + '" onclick="pickShoe(\'type\',\'' + st.id + '\')">';
        h += '<canvas class="shoe-preview" data-shoe="' + st.id + '" width="64" height="64"></canvas>';
        h += '<span>' + st.label + '</span></button>';
      });
      break;

    case 'shoeColor':
      h += '<div class="color-section"><span class="color-section-label">Main Color</span>';
      h += '<div class="color-row">';
      ODA_PARTS.COLOR_PRESETS.forEach(c => {
        var sel = shoes.color === c ? ' active' : '';
        h += '<button class="cp-inline-swatch' + sel + '" style="background:' + c + '" onclick="pickShoe(\'color\',\'' + c + '\')"></button>';
      });
      h += '<button class="cp-custom-inline" onclick="openShoePicker(\'color\', this)">+</button>';
      h += '</div></div>';

      h += '<div class="color-section"><span class="color-section-label">Accent Color</span>';
      h += '<div class="color-row">';
      ODA_PARTS.COLOR_PRESETS.forEach(c => {
        var sel = shoes.accentColor === c ? ' active' : '';
        h += '<button class="cp-inline-swatch' + sel + '" style="background:' + c + '" onclick="pickShoe(\'accentColor\',\'' + c + '\')"></button>';
      });
      h += '<button class="cp-custom-inline" onclick="openShoePicker(\'accentColor\', this)">+</button>';
      h += '</div></div>';
      break;
  }
  return h;
}

// ── Canvas Previews ───────────────────────────────────────────
function renderCanvasPreviews() {
  // Hair previews
  document.querySelectorAll('.hair-preview').forEach(c => {
    var tmp = JSON.parse(JSON.stringify(currentConfig));
    tmp.hairStyle = c.dataset.hair;
    ODA_RENDER.drawHeadPreview(c, tmp, { size: 64 });
  });
  // Face feature previews (head-only so you can see the face)
  document.querySelectorAll('.face-preview').forEach(c => {
    var tmp = JSON.parse(JSON.stringify(currentConfig));
    tmp.face[c.dataset.face] = c.dataset.val;
    ODA_RENDER.drawHeadPreview(c, tmp, { size: 64 });
  });
  // Outfit previews
  document.querySelectorAll('.outfit-preview').forEach(c => {
    var tmp = JSON.parse(JSON.stringify(currentConfig));
    tmp.outfit.garment = c.dataset.garment;
    ODA_RENDER.drawPreview(c, tmp, { size: 64 });
  });
  // Shoe previews
  document.querySelectorAll('.shoe-preview').forEach(c => {
    var tmp = JSON.parse(JSON.stringify(currentConfig));
    tmp.shoes.type = c.dataset.shoe;
    ODA_RENDER.drawPreview(c, tmp, { size: 64 });
  });
}

// ── Pick Functions ────────────────────────────────────────────
function pickSkin(id) {
  currentConfig.skinTone = id;
  render(); renderOptions();
}
function pickHair(id) {
  currentConfig.hairStyle = id;
  render(); renderOptions();
}
function pickHairColor(hex) {
  currentConfig.hairColor = hex;
  render(); renderOptions();
}
function pickFace(field, value) {
  currentConfig.face[field] = value;
  render(); renderOptions();
}
function pickOutfit(field, value) {
  currentConfig.outfit[field] = value;
  render(); renderOptions();
}
function pickShoe(field, value) {
  currentConfig.shoes[field] = value;
  render(); renderOptions();
}

// ── Color Picker Openers ──────────────────────────────────────
function openOutfitPicker(field, btn) {
  ODA_COLOR.open(btn, currentConfig.outfit[field], ODA_PARTS.COLOR_PRESETS, function(hex) {
    currentConfig.outfit[field] = hex;
    render(); renderOptions();
  });
}
function openShoePicker(field, btn) {
  ODA_COLOR.open(btn, currentConfig.shoes[field], ODA_PARTS.COLOR_PRESETS, function(hex) {
    currentConfig.shoes[field] = hex;
    render(); renderOptions();
  });
}

// ── Randomize ─────────────────────────────────────────────────
function randomize() {
  var g = currentConfig.gender;
  currentConfig = ODA_PARTS.randomConfig();
  currentConfig.gender = g;
  // Ensure gender-valid picks
  var curGarment = ODA_PARTS.find(ODA_PARTS.GARMENTS, currentConfig.outfit.garment);
  if (curGarment && curGarment.gender !== 'both' && curGarment.gender !== g) {
    currentConfig.outfit.garment = ODA_PARTS.defaultConfig(g).outfit.garment;
  }
  var curHair = ODA_PARTS.find(ODA_PARTS.HAIR_STYLES, currentConfig.hairStyle);
  if (curHair && curHair.gender !== 'both' && curHair.gender !== g) {
    currentConfig.hairStyle = ODA_PARTS.defaultConfig(g).hairStyle;
  }
  currentConfig.bodyType = ODA_PARTS.filterByGender(ODA_PARTS.BODY_TYPES, g)[Math.floor(Math.random() * 4)].id;
  render(); renderOptions();
}

// ── Expand Preview ───────────────────────────────────────────
function expandPreview() {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;cursor:pointer';
  var bigCanvas = document.createElement('canvas');
  bigCanvas.width = 512;
  bigCanvas.height = 512;
  bigCanvas.style.cssText = 'border-radius:20px;background:#2a2d3a;image-rendering:auto';
  ODA_RENDER.drawPreview(bigCanvas, currentConfig, { size: 512 });
  overlay.appendChild(bigCanvas);
  overlay.addEventListener('click', function() { overlay.remove(); });
  document.body.appendChild(overlay);
}

// ── Save ──────────────────────────────────────────────────────
function saveCharacter() {
  localStorage.setItem('odaWorldCharacter', JSON.stringify(currentConfig));
  if (window.odaToast) odaToast('Character saved!', 'success');
  var btn = document.getElementById('saveBtn');
  btn.textContent = 'Saved!';
  setTimeout(function() { btn.textContent = 'Save & Enter ODA World'; }, 2000);
}

// ── Init ──────────────────────────────────────────────────────
(function init() {
  var saved = localStorage.getItem('odaWorldCharacter');
  if (saved) {
    try {
      currentConfig = ODA_PARTS.migrateConfig(JSON.parse(saved));
    } catch(e) {}
  }
  var name = localStorage.getItem('studentName') || 'Your Character';
  document.getElementById('previewName').textContent = name;
  document.getElementById('genderBoy').classList.toggle('active', currentConfig.gender === 'boy');
  document.getElementById('genderGirl').classList.toggle('active', currentConfig.gender === 'girl');
  render();
  renderOptions();
})();
</script>
</body>
</html>
