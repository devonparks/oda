<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ODA Hub - Student</title>
<meta name="description" content="ODA Hub Student Dashboard - Learning tools, assignments, and arcade games for Open Doors Academy students.">
<meta name="classification" content="Education">
<meta name="theme-color" content="#0a0e1a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/oda-theme.css">
<link rel="stylesheet" href="css/student.css">
</head>
<body>
<div class="grid-bg"></div>
<div class="app">
<div class="topbar">
<div class="greeting">Hey, <span id="studentNameEl">Student</span>! &#x1F44B; <span style="font-size:10px;font-weight:700;color:var(--accent3);background:rgba(239,71,111,.15);border:1px solid rgba(239,71,111,.3);padding:2px 8px;border-radius:5px;letter-spacing:1px;font-family:'Space Mono',monospace;vertical-align:middle">BETA</span></div>
<div style="display:flex;gap:8px">
<button class="btn btn-outline" onclick="location.reload(true)" title="Hard refresh" style="padding:8px 12px">&#x1F504;</button>
<button class="btn btn-outline" onclick="studentLogout()">&#x2190; Exit</button>
</div>
</div>

<div class="unlock" id="unlockBanner">
<h2>&#x1F3AE; ARCADE UNLOCKED!</h2>
<p>All work done — go play!</p>
</div>

<div class="tabs" role="tablist" aria-label="Student dashboard sections">
<div class="tab active" role="tab" tabindex="0" aria-selected="true" aria-controls="sec-work" id="tab-work" onclick="switchTab('work')" onkeydown="stuTabKeyNav(event,'work')">&#x1F4DD; <span>My Work</span><span class="tab-badge zero" id="workBadge">0</span></div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="sec-tools" id="tab-tools" onclick="switchTab('tools')" onkeydown="stuTabKeyNav(event,'tools')">&#x1F6E0;&#xFE0F; <span>My Tools</span></div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="sec-arcade" id="tab-arcade" onclick="switchTab('arcade')" onkeydown="stuTabKeyNav(event,'arcade')">&#x1F3AE; <span>Arcade</span></div>
</div>

<!-- MY WORK -->
<div class="section show" id="sec-work" role="tabpanel" aria-labelledby="tab-work">
<div class="encourage-banner" id="encourageBanner">
<div class="encourage-label">&#x1F916; AI Study Buddy says...</div>
<div class="encourage-text" id="encourageText"></div>
</div>
<div id="assignmentList"><div class="empty-state"><span class="emoji">&#x23F3;</span><p>Loading your assignments...</p></div></div>
</div>

<!-- MY TOOLS -->
<div class="section" id="sec-tools" role="tabpanel" aria-labelledby="tab-tools">
<div class="tools-section-title">&#x1F680; ODA Tools <span class="ts-sub">&#x2014; Use these anytime to create, learn, and have fun!</span></div>
<div class="tools-grid" id="toolsGrid"></div>
<div class="tools-section-title" style="margin-top:20px">&#x1F3AE; Coming Soon</div>
<div class="tools-grid" id="toolsComingSoon"></div>

<div class="tools-section-title" style="margin-top:20px">&#x1F4AC; Feedback</div>
<div style="display:flex;gap:10px;flex-wrap:wrap">
<button class="btn btn-outline" onclick="openFeedbackModal('bug')" style="flex:1;min-width:140px;padding:12px 16px;font-size:14px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:6px">&#x1F41B; Report a Bug</button>
<button class="btn btn-outline" onclick="openFeedbackModal('feature')" style="flex:1;min-width:140px;padding:12px 16px;font-size:14px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:6px">&#x1F4A1; Request a Feature</button>
</div>
</div>

<!-- ARCADE -->
<div class="section" id="sec-arcade" role="tabpanel" aria-labelledby="tab-arcade">
<div class="game-grid" id="gameGrid"></div>
</div>
</div>

<!-- SHARED CORE -->
<script src="js/oda-core.js"></script>

<!-- FIREBASE -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import{getFirestore,doc,getDoc,getDocs,updateDoc,collection,query,where,onSnapshot}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const cfg=ODA_CONFIG.firebase;
const app=initializeApp(cfg);const db=getFirestore(app);

window.fbDb=db;window.fbDoc=doc;window.fbGetDoc=getDoc;window.fbGetDocs=getDocs;window.fbUpdateDoc=updateDoc;
window.fbCollection=collection;window.fbQuery=query;window.fbWhere=where;

var studentId=localStorage.getItem('studentId');
var studentName=localStorage.getItem('studentName');
if(!studentId){window.location.href='index.html'}
else{
document.getElementById('studentNameEl').textContent=studentName||'Student';
window.studentId=studentId;
// Listen for student record (teacher arcade toggle)
onSnapshot(doc(db,'students',studentId),function(snap){
if(snap.exists()){window.studentRecord=snap.data()}
renderDashboard();
});
// Real-time listener for assignments
var q=query(collection(db,'assignments'),where('studentId','==',studentId));
onSnapshot(q,function(snap){
window.myAssignments=[];
snap.forEach(function(d){window.myAssignments.push({id:d.id,...d.data()})});
renderDashboard();
});
}
</script>

<script src="js/student.js"></script>

<!-- FEEDBACK MODAL -->
<div id="feedbackModal" role="dialog" aria-modal="true" aria-label="Submit Feedback" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px">
<div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:480px;width:100%;position:relative;animation:fadeUp .2s ease">
<button onclick="closeFeedbackModal()" aria-label="Close" style="position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;line-height:1">&times;</button>
<h2 id="feedbackTitle" style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;margin-bottom:16px;color:var(--text)"></h2>
<div style="margin-bottom:14px">
<label style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Description</label>
<textarea id="feedbackDesc" rows="4" style="width:100%;padding:12px;background:var(--bg);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;resize:vertical;outline:none" placeholder="Describe the bug..."></textarea>
</div>
<div style="margin-bottom:18px">
<label style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Page / Tool (optional)</label>
<input id="feedbackPage" type="text" style="width:100%;padding:12px;background:var(--bg);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none" placeholder="e.g. Spelling Bee, Arcade, My Work...">
</div>
<button id="feedbackSubmitBtn" onclick="submitFeedback()" style="width:100%;padding:14px;background:var(--accent);color:var(--bg);border:none;border-radius:14px;font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;cursor:pointer">Submit</button>
</div>
</div>
</body>
</html>
