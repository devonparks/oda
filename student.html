<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ODA Hub - Student</title>
<meta name="description" content="ODA Hub Student Dashboard - Learning tools, assignments, and arcade games for Open Doors Academy students.">
<meta name="classification" content="Education">
<meta name="theme-color" content="#0a0e1a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/oda-theme.css">
<link rel="stylesheet" href="css/student.css">
</head>
<body>
<div class="grid-bg"></div>
<div class="app">
<div class="topbar">
<div class="greeting">
  <span class="stu-avatar" id="stuAvatar" title="View profile" onclick="openProfileCard()" role="button" tabindex="0" style="cursor:pointer">👤</span>
  Hey, <span id="studentNameEl">Student</span>! &#x1F44B;
  <span class="beta-badge">BETA</span>
</div>
<div class="topbar-actions">
<button class="btn btn-outline topbar-btn" onclick="location.href='shop.html'" title="Shop"><span class="topbar-icon">🛒</span> <span id="coinDisplay" class="coin-label">0</span></button>
<button class="btn btn-outline topbar-btn" onclick="location.reload(true)" title="Refresh">&#x1F504;</button>
<button class="btn btn-outline" onclick="studentLogout()">&#x2190; Exit</button>
</div>
</div>

<div class="unlock" id="unlockBanner">
<h2>&#x1F3AE; ARCADE UNLOCKED!</h2>
<p>All work done — go play!</p>
</div>

<div class="tabs" role="tablist" aria-label="Student dashboard sections">
<div class="tab active" role="tab" tabindex="0" aria-selected="true" aria-controls="sec-work" id="tab-work" onclick="switchTab('work')" onkeydown="stuTabKeyNav(event,'work')">&#x1F4DD; <span>My Work</span><span class="tab-badge zero" id="workBadge">0</span></div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="sec-tools" id="tab-tools" onclick="switchTab('tools')" onkeydown="stuTabKeyNav(event,'tools')">&#x1F6E0;&#xFE0F; <span>My Tools</span></div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="sec-arcade" id="tab-arcade" onclick="switchTab('arcade')" onkeydown="stuTabKeyNav(event,'arcade')">&#x1F3AE; <span>Arcade</span></div>
</div>

<!-- MY WORK -->
<div class="section show" id="sec-work" role="tabpanel" aria-labelledby="tab-work">
<div class="encourage-banner" id="encourageBanner">
<div class="encourage-label">&#x1F916; AI Study Buddy says...</div>
<div class="encourage-text" id="encourageText"></div>
</div>
<div id="assignmentList"><div class="empty-state"><span class="emoji">&#x23F3;</span><p>Loading your assignments...</p></div></div>
</div>

<!-- MY TOOLS -->
<div class="section" id="sec-tools" role="tabpanel" aria-labelledby="tab-tools">
<div class="tools-section-title">&#x1F680; ODA Tools <span class="ts-sub">&#x2014; Use these anytime to create, learn, and have fun!</span></div>
<div class="tools-grid" id="toolsGrid"></div>
<div class="tools-section-title tools-mt">&#x1F3AE; Coming Soon</div>
<div class="tools-grid" id="toolsComingSoon"></div>

<div class="tools-section-title tools-mt">&#x1F4AC; Feedback</div>
<div class="fb-row">
<button class="btn btn-outline fb-btn" onclick="openFeedbackModal('bug')">&#x1F41B; Report a Bug</button>
<button class="btn btn-outline fb-btn" onclick="openFeedbackModal('feature')">&#x1F4A1; Request a Feature</button>
</div>
</div>

<!-- ARCADE -->
<div class="section" id="sec-arcade" role="tabpanel" aria-labelledby="tab-arcade">
<div class="game-grid" id="gameGrid"></div>
</div>
</div>

<!-- SHARED CORE -->
<script src="js/oda-core.js"></script>

<!-- FIREBASE -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import{getFirestore,doc,getDoc,getDocs,updateDoc,collection,query,where,onSnapshot}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";
import{initializeAppCheck,ReCaptchaV3Provider}from"https://www.gstatic.com/firebasejs/11.8.1/firebase-app-check.js";

const cfg=ODA_CONFIG.firebase;
const app=initializeApp(cfg);
try{initializeAppCheck(app,{provider:new ReCaptchaV3Provider('6LcZII0sAAAAAEhbfDWiwP4-l9DTJIQOwFa2CzD_'),isTokenAutoRefreshEnabled:true})}catch(e){}
const db=getFirestore(app);

window.fbDb=db;window.fbDoc=doc;window.fbGetDoc=getDoc;window.fbGetDocs=getDocs;window.fbUpdateDoc=updateDoc;
window.fbCollection=collection;window.fbQuery=query;window.fbWhere=where;

var studentId=localStorage.getItem('studentId');
var studentName=localStorage.getItem('studentName');
if(!studentId){window.location.href='index.html'}
else{
document.getElementById('studentNameEl').textContent=studentName||'Student';
window.studentId=studentId;
// Listen for student record (teacher arcade toggle)
onSnapshot(doc(db,'students',studentId),function(snap){
if(snap.exists()){window.studentRecord=snap.data();if(window.applyStudentCosmetics)window.applyStudentCosmetics(snap.data())}
renderDashboard();
});
// Real-time listener for assignments
var q=query(collection(db,'assignments'),where('studentId','==',studentId));
onSnapshot(q,function(snap){
window.myAssignments=[];
snap.forEach(function(d){window.myAssignments.push({id:d.id,...d.data()})});
renderDashboard();
});
}
</script>

<script src="js/oda-covers.js"></script>
<script src="js/oda-games.js"></script>
<script src="js/student.js"></script>

<!-- FEEDBACK MODAL -->
<div id="feedbackModal" class="fb-modal" style="display:none" role="dialog" aria-modal="true" aria-label="Submit Feedback">
<div class="fb-card">
<button onclick="closeFeedbackModal()" aria-label="Close" class="fb-close">&times;</button>
<h2 id="feedbackTitle" class="fb-title"></h2>
<div class="fb-group">
<label class="fb-label">Description</label>
<textarea id="feedbackDesc" class="fb-textarea" rows="4" placeholder="Describe the bug..."></textarea>
</div>
<div class="fb-group-lg">
<label class="fb-label">Page / Tool (optional)</label>
<input id="feedbackPage" type="text" class="fb-input" placeholder="e.g. Spelling Bee, Arcade, My Work...">
</div>
<button id="feedbackSubmitBtn" onclick="submitFeedback()" class="fb-submit">Submit</button>
</div>
</div>

<!-- PROFILE CARD MODAL -->
<div id="profileModal" class="profile-modal" style="display:none" role="dialog" aria-modal="true" aria-label="Player Profile">
<div class="profile-card" id="profileCard">
  <button class="profile-close" onclick="closeProfileCard()" aria-label="Close">&times;</button>
  <div class="profile-bg-layer" id="profileBgLayer"></div>
  <div class="profile-content">
    <div class="profile-avatar-wrap" id="profileAvatarWrap">
      <span class="profile-avatar" id="profileAvatar">👤</span>
    </div>
    <div class="profile-name" id="profileName">Student</div>
    <div class="profile-title" id="profileTitle"></div>
    <div class="profile-stats">
      <div class="profile-stat">
        <span class="profile-stat-value" id="profileCoins">0</span>
        <span class="profile-stat-label">🪙 Coins</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-value" id="profileGamesPlayed">0</span>
        <span class="profile-stat-label">🎮 Games</span>
      </div>
      <div class="profile-stat">
        <span class="profile-stat-value" id="profileAchievements">0</span>
        <span class="profile-stat-label">🏆 Achievements</span>
      </div>
    </div>
    <div class="profile-showcase" id="profileShowcase"></div>
    <button class="profile-edit-btn" onclick="location.href='shop.html'">🛒 Edit Profile</button>
  </div>
</div>
</div>
</body>
</html>
