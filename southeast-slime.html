<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0A0118">
<title>Southeast Slime Stretch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nosifer&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0A0118;
    font-family: 'Fredoka', system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    position: fixed;
    overscroll-behavior: none;
  }
  canvas {
    display: block;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(function () {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0;

  // ======== State ========
  const TITLE = 0, STRETCHING = 1, SNAPPED = 2, SCORED = 3;
  let state = TITLE;

  let stretchAmount = 0;
  let snapThreshold = 0;
  let score = 0;
  let isNewBest = false;
  let leaderboard = [];
  let isHolding = false;

  let stateTime = 0;
  let shake = 0;
  let flash = 0;
  let blobWobble = 0;
  let blobPulse = 0;
  let scoredBounce = 0;

  let particles = [];
  let bubbles = [];
  let drips = [];

  // ======== Helpers ========
  const rand = (a, b) => a + Math.random() * (b - a);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  function initBubbles() {
    bubbles = [];
    const n = Math.max(12, Math.floor(W * H / 28000));
    for (let i = 0; i < n; i++) {
      bubbles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 6 + Math.random() * 22,
        vy: -(0.12 + Math.random() * 0.5),
        vx: (Math.random() - 0.5) * 0.2,
        color: Math.random() > 0.5 ? '#39FF14' : '#B400FF',
        alpha: 0.06 + Math.random() * 0.12,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    initBubbles();
  }

  function roundRect(x, y, w, h, r) {
    if (w < r * 2) r = w / 2;
    if (h < r * 2) r = h / 2;
    if (r < 0) r = 0;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ======== Round control ========
  function resetRound() {
    stretchAmount = 0;
    // Snap threshold scaled to screen — 30%..55% of viewport height
    snapThreshold = rand(H * 0.30, H * 0.55);
    particles = [];
    drips = [];
    shake = 0;
  }

  function startStretch() {
    state = STRETCHING;
    resetRound();
    isHolding = true;
    stateTime = 0;
  }

  function handlePress() {
    if (state === TITLE) {
      startStretch();
    } else if (state === SNAPPED && stateTime > 0.9) {
      startStretch();
    } else if (state === SCORED && stateTime > 1.1) {
      startStretch();
    }
  }

  function handleRelease() {
    if (state === STRETCHING && isHolding) {
      score = Math.round(stretchAmount);
      const prevBest = leaderboard.length ? leaderboard[0] : 0;
      const minScore = H * 0.02;
      if (score >= minScore) {
        leaderboard.push(score);
        leaderboard.sort((a, b) => b - a);
        if (leaderboard.length > 10) leaderboard.length = 10;
        isNewBest = score > prevBest;
      } else {
        isNewBest = false;
      }

      state = SCORED;
      stateTime = 0;
      scoredBounce = 0;

      // Confetti burst upward
      const cx = W / 2;
      const cy = H * 0.35;
      for (let i = 0; i < 42; i++) {
        const angle = rand(-Math.PI * 0.9, -Math.PI * 0.1);
        const spd = rand(5, 14);
        particles.push({
          x: cx + rand(-20, 20),
          y: cy,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          r: rand(3, 7),
          color: Math.random() > 0.3 ? '#39FF14' : '#B400FF',
          alpha: 1,
          life: 1.2,
          gravity: 0.35
        });
      }
    }
    isHolding = false;
  }

  function triggerSnap() {
    state = SNAPPED;
    stateTime = 0;
    flash = 1;
    shake = 28;

    const cx = W / 2;
    const cy = H * 0.18;

    for (let i = 0; i < 65; i++) {
      const t = Math.random();
      const x = cx + rand(-10, 10);
      const y = cy + t * stretchAmount;
      const angle = rand(0, Math.PI * 2);
      const spd = rand(3, 13);
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd - rand(0, 5),
        r: rand(3, 9),
        color: Math.random() > 0.35 ? '#39FF14' : '#B400FF',
        alpha: 1,
        life: 1.3,
        gravity: 0.4
      });
    }
  }

  // ======== Input ========
  function prevDef(e) { if (e.cancelable) e.preventDefault(); }

  canvas.addEventListener('mousedown', e => { prevDef(e); handlePress(); });
  window.addEventListener('mouseup', () => { handleRelease(); });
  canvas.addEventListener('mouseleave', () => { handleRelease(); });

  canvas.addEventListener('touchstart', e => { prevDef(e); handlePress(); }, { passive: false });
  canvas.addEventListener('touchend', e => { prevDef(e); handleRelease(); }, { passive: false });
  canvas.addEventListener('touchcancel', e => { prevDef(e); handleRelease(); }, { passive: false });

  window.addEventListener('keydown', e => {
    if (e.code === 'Space' && !e.repeat) { e.preventDefault(); handlePress(); }
  });
  window.addEventListener('keyup', e => {
    if (e.code === 'Space') { e.preventDefault(); handleRelease(); }
  });

  // ======== Update ========
  function update(dt) {
    stateTime += dt;
    blobWobble += dt * 2.5;
    blobPulse += dt;

    for (const b of bubbles) {
      b.y += b.vy;
      b.x += b.vx + Math.sin(blobWobble + b.phase) * 0.12;
      if (b.y + b.r < 0) {
        b.y = H + b.r;
        b.x = Math.random() * W;
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += (p.gravity || 0.35);
      p.life -= dt;
      p.alpha = clamp(p.life, 0, 1);
      if (p.life <= 0) particles.splice(i, 1);
    }

    for (let i = drips.length - 1; i >= 0; i--) {
      const d = drips[i];
      d.y += d.vy;
      d.vy += 0.25;
      d.life -= dt;
      if (d.life <= 0 || d.y > H + 20) drips.splice(i, 1);
    }

    if (state === STRETCHING) {
      // Accelerating stretch — slower start, ramps up
      const speed = H * 0.0020 + stretchAmount * 0.0022;
      stretchAmount += speed * dt * 60;

      const danger = clamp(stretchAmount / snapThreshold, 0, 1);
      shake = danger > 0.72 ? (danger - 0.72) * 50 : 0;

      // Side drips
      if (stretchAmount > H * 0.08 && Math.random() < 0.07) {
        const side = Math.random() > 0.5 ? 1 : -1;
        const t = rand(0.2, 0.85);
        const dripX = W / 2 + side * rand(6, 22) * (1 - t * 0.5);
        const dripY = H * 0.18 + stretchAmount * t;
        drips.push({
          x: dripX,
          y: dripY,
          vy: rand(0.3, 1.2),
          r: rand(2.5, 5),
          life: rand(0.6, 1.3)
        });
      }

      if (stretchAmount >= snapThreshold) {
        triggerSnap();
      }
    } else if (state === SNAPPED) {
      flash = Math.max(0, flash - dt * 2.5);
      shake = Math.max(0, shake - dt * 40);
    } else if (state === SCORED) {
      scoredBounce += dt;
      shake = Math.max(0, shake - dt * 15);
    } else {
      shake = 0;
      flash = 0;
    }
  }

  // ======== Render helpers ========
  function renderBackground() {
    ctx.fillStyle = '#0A0118';
    ctx.fillRect(-80, -80, W + 160, H + 160);

    const grad = ctx.createRadialGradient(W / 2, H * 0.4, 0, W / 2, H * 0.4, Math.max(W, H) * 0.7);
    grad.addColorStop(0, 'rgba(80, 20, 130, 0.28)');
    grad.addColorStop(1, 'rgba(10, 1, 24, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(-80, -80, W + 160, H + 160);

    for (const b of bubbles) {
      ctx.globalAlpha = b.alpha;
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = b.alpha * 0.8;
      ctx.strokeStyle = b.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawBlob(cx, cy, radius, squash) {
    squash = squash || 0;

    // Glow halo
    const glowR = radius * 2.4;
    const glowGrad = ctx.createRadialGradient(cx, cy, radius * 0.6, cx, cy, glowR);
    glowGrad.addColorStop(0, 'rgba(57, 255, 20, 0.4)');
    glowGrad.addColorStop(0.5, 'rgba(57, 255, 20, 0.12)');
    glowGrad.addColorStop(1, 'rgba(57, 255, 20, 0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Blob shape with organic wobble
    const segs = 42;
    ctx.beginPath();
    for (let i = 0; i <= segs; i++) {
      const a = (i / segs) * Math.PI * 2;
      const wob =
        Math.sin(a * 3 + blobWobble) * radius * 0.04 +
        Math.cos(a * 5 + blobWobble * 1.4) * radius * 0.025 +
        Math.sin(a * 2 + blobWobble * 0.6) * radius * 0.015;
      const r = radius + wob;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r * (1 - squash);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();

    const bodyGrad = ctx.createRadialGradient(
      cx - radius * 0.35, cy - radius * 0.4, 0,
      cx, cy, radius * 1.1
    );
    bodyGrad.addColorStop(0, '#C4FFA5');
    bodyGrad.addColorStop(0.35, '#7FFF50');
    bodyGrad.addColorStop(0.7, '#39FF14');
    bodyGrad.addColorStop(1, '#1FA80A');
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Rim
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = '#A5FF80';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Specular highlight
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.ellipse(
      cx - radius * 0.33, cy - radius * 0.38 * (1 - squash),
      radius * 0.22, radius * 0.14,
      -0.5, 0, Math.PI * 2
    );
    ctx.fill();

    // Secondary shine
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.arc(cx - radius * 0.12, cy - radius * 0.18 * (1 - squash), radius * 0.08, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawDrips() {
    for (const d of drips) {
      ctx.save();
      const a = clamp(d.life * 1.5, 0, 1);
      ctx.globalAlpha = a;
      ctx.shadowColor = '#39FF14';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#39FF14';
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r, d.r * 1.4, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = a * 0.6;
      ctx.fillStyle = '#C4FFA5';
      ctx.beginPath();
      ctx.ellipse(d.x - d.r * 0.3, d.y - d.r * 0.3, d.r * 0.35, d.r * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.r * p.alpha), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ======== State scenes ========
  function drawTitleScene() {
    const cx = W / 2;
    const cy = H * 0.52;
    const pulse = Math.sin(blobPulse * 2) * 0.04 + 1;
    const radius = Math.min(W, H) * 0.11 * pulse;
    drawBlob(cx, cy, radius);
  }

  function drawStretchScene() {
    const cx = W / 2;
    const cy = H * 0.18;
    const baseR = Math.min(W, H) * 0.095;
    const stretch = stretchAmount;

    const squash = clamp(stretch / (H * 0.6) * 0.35, 0, 0.3);
    const blobR = baseR * (1 - squash * 0.3);

    const danger = clamp(stretch / snapThreshold, 0, 1);

    const wobbleAmp = 2 + danger * danger * 14;
    const wobbleOffset = Math.sin(blobPulse * 9) * wobbleAmp;
    const wobbleOffset2 = Math.sin(blobPulse * 13 + 1) * wobbleAmp * 0.6;

    const tipY = cy + stretch;
    const neckTop = blobR * 0.75;
    const tipWidth = Math.max(3.5, 8 - stretch / 80);

    // Neck
    ctx.save();
    ctx.shadowColor = '#39FF14';
    ctx.shadowBlur = 18;

    ctx.beginPath();
    ctx.moveTo(cx - neckTop, cy + blobR * 0.2);
    const midY = cy + stretch * 0.5;
    ctx.bezierCurveTo(
      cx - neckTop * 0.6 + wobbleOffset * 0.3, cy + stretch * 0.25,
      cx - tipWidth * 3 + wobbleOffset2, midY + stretch * 0.1,
      cx - tipWidth + wobbleOffset, tipY
    );
    ctx.quadraticCurveTo(cx + wobbleOffset, tipY + tipWidth * 2.2, cx + tipWidth + wobbleOffset, tipY);
    ctx.bezierCurveTo(
      cx + tipWidth * 3 + wobbleOffset2, midY + stretch * 0.1,
      cx + neckTop * 0.6 + wobbleOffset * 0.3, cy + stretch * 0.25,
      cx + neckTop, cy + blobR * 0.2
    );
    ctx.closePath();

    const neckGrad = ctx.createLinearGradient(cx - neckTop, cy, cx + neckTop, cy);
    neckGrad.addColorStop(0, '#1FA80A');
    neckGrad.addColorStop(0.3, '#39FF14');
    neckGrad.addColorStop(0.5, '#7FFF50');
    neckGrad.addColorStop(0.7, '#39FF14');
    neckGrad.addColorStop(1, '#1FA80A');
    ctx.fillStyle = neckGrad;
    ctx.fill();
    ctx.restore();

    // Highlight streak down center
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = '#C4FFA5';
    ctx.lineWidth = Math.max(1.5, neckTop * 0.25);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - neckTop * 0.25, cy + blobR * 0.3);
    ctx.quadraticCurveTo(cx + wobbleOffset * 0.4, midY, cx + wobbleOffset - tipWidth * 0.2, tipY - tipWidth);
    ctx.stroke();
    ctx.restore();

    // Tip droplet
    ctx.save();
    ctx.shadowColor = '#39FF14';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#39FF14';
    ctx.beginPath();
    ctx.ellipse(cx + wobbleOffset, tipY + tipWidth * 0.7, tipWidth * 1.3, tipWidth * 1.6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#C4FFA5';
    ctx.beginPath();
    ctx.ellipse(cx + wobbleOffset - tipWidth * 0.35, tipY + tipWidth * 0.3, tipWidth * 0.35, tipWidth * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Blob on top
    drawBlob(cx, cy, blobR, squash);
  }

  function drawScoredScene() {
    const cx = W / 2;
    const cy = H * 0.35;
    const baseR = Math.min(W, H) * 0.105;

    const t = scoredBounce;
    let scale = 1;
    if (t < 1.2) {
      scale = 1 + Math.sin(t * Math.PI * 3) * Math.exp(-t * 2.8) * 0.38;
    }
    drawBlob(cx, cy, baseR * scale);
  }

  // ======== UI overlays ========
  function drawDangerMeter() {
    const mw = Math.min(W * 0.04, 24);
    const mh = H * 0.5;
    const mx = W - mw - 18;
    const my = H * 0.25;

    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 2;
    roundRect(mx, my, mw, mh, 8);
    ctx.fill();
    ctx.stroke();

    const ratio = clamp(stretchAmount / (H * 0.55), 0, 1);
    const fillH = mh * ratio;

    let color = '#39FF14';
    if (ratio > 0.75) color = '#FF2244';
    else if (ratio > 0.5) color = '#FFDD22';

    ctx.save();
    if (ratio > 0.75) {
      ctx.shadowColor = color;
      ctx.shadowBlur = 18;
    }
    ctx.fillStyle = color;
    roundRect(mx + 2, my + mh - fillH + 2, mw - 4, Math.max(0, fillH - 4), 6);
    ctx.fill();
    ctx.restore();

    // Inner highlight
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = '#FFFFFF';
    roundRect(mx + 4, my + mh - fillH + 3, (mw - 8) * 0.35, Math.max(0, fillH - 6), 4);
    ctx.fill();
    ctx.restore();

    // Skull
    const skullFs = Math.min(W * 0.04, 28);
    ctx.font = `${skullFs}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    if (ratio > 0.75) {
      ctx.save();
      ctx.shadowColor = '#FF2244';
      ctx.shadowBlur = 18;
      ctx.fillText('💀', mx + mw / 2, my - 8);
      ctx.restore();
    } else {
      ctx.fillText('💀', mx + mw / 2, my - 8);
    }
  }

  function drawLeaderboard() {
    const pad = Math.min(W * 0.035, 18);
    const titleFs = Math.min(W * 0.035, 22);
    const rowFs = Math.min(W * 0.032, 19);
    const x = pad;
    let y = pad + titleFs;

    ctx.textAlign = 'left';
    ctx.font = `700 ${titleFs}px Fredoka, sans-serif`;
    ctx.fillStyle = '#B400FF';
    ctx.shadowColor = '#B400FF';
    ctx.shadowBlur = 12;
    ctx.fillText('TOP STRETCHES', x, y);
    ctx.shadowBlur = 0;

    const medals = ['👑', '🥈', '🥉', '✨', '✨'];
    const topFive = leaderboard.slice(0, 5);

    ctx.font = `500 ${rowFs}px Fredoka, sans-serif`;
    if (topFive.length === 0) {
      y += rowFs * 1.5;
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = `400 ${rowFs * 0.85}px Fredoka, sans-serif`;
      ctx.fillText('no scores yet...', x, y);
    } else {
      for (let i = 0; i < topFive.length; i++) {
        y += rowFs * 1.5;
        const inches = (topFive[i] / H * 20).toFixed(1);
        ctx.fillStyle =
          i === 0 ? '#39FF14'
          : i === 1 ? '#E0E0E0'
          : i === 2 ? '#CD9848'
          : 'rgba(255,255,255,0.65)';
        ctx.fillText(`${medals[i]}  ${inches}″`, x, y);
      }
    }
  }

  function drawStretchUI() {
    const cx = W / 2;
    const stretch = stretchAmount;
    const danger = clamp(stretch / snapThreshold, 0, 1);

    // Inches counter
    const inches = (stretch / H * 20).toFixed(1);
    const fs = Math.min(W * 0.055, 38);
    ctx.font = `600 ${fs}px Fredoka, sans-serif`;
    ctx.fillStyle = danger > 0.72 ? '#FF4466' : '#39FF14';
    ctx.textAlign = 'center';
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 15;
    ctx.fillText(`${inches}″`, cx, H - H * 0.07);
    ctx.shadowBlur = 0;

    if (danger > 0.72) {
      const pulse = Math.abs(Math.sin(blobPulse * 11)) * 0.75 + 0.25;
      ctx.globalAlpha = pulse;
      const warnFs = Math.min(W * 0.055, 32);
      ctx.font = `700 ${warnFs}px Fredoka, sans-serif`;
      ctx.fillStyle = '#FF2244';
      ctx.shadowColor = '#FF2244';
      ctx.shadowBlur = 22;
      ctx.textAlign = 'center';
      ctx.fillText('⚠ ABOUT TO SNAP ⚠', cx, H * 0.93);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }
  }

  function drawTitleUI() {
    const cx = W / 2;
    const titleFs = Math.min(W * 0.14, 82);

    ctx.textAlign = 'center';

    // SOUTHEAST — purple neon
    ctx.font = `400 ${titleFs * 0.58}px Nosifer, serif`;
    ctx.fillStyle = '#B400FF';
    ctx.shadowColor = '#B400FF';
    ctx.shadowBlur = 26;
    ctx.fillText('SOUTHEAST', cx, H * 0.22);

    // SLIME — green neon, bigger
    ctx.font = `400 ${titleFs}px Nosifer, serif`;
    ctx.fillStyle = '#39FF14';
    ctx.shadowColor = '#39FF14';
    ctx.shadowBlur = 30;
    ctx.fillText('SLIME', cx, H * 0.33);
    ctx.shadowBlur = 0;

    // Instruction
    const instrFs = Math.min(W * 0.055, 28);
    ctx.font = `500 ${instrFs}px Fredoka, sans-serif`;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    const pulseText = Math.sin(blobPulse * 3) * 0.25 + 0.75;
    ctx.globalAlpha = pulseText;
    ctx.fillText('TAP & HOLD TO STRETCH', cx, H * 0.78);
    ctx.globalAlpha = 1;

    const hintFs = Math.min(W * 0.035, 18);
    ctx.font = `400 ${hintFs}px Fredoka, sans-serif`;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.fillText('release before it snaps!', cx, H * 0.83);
  }

  function drawSnapUI() {
    const cx = W / 2;
    const cy = H * 0.45;
    const snapFs = Math.min(W * 0.22, 140);

    const t = stateTime;
    let scale;
    if (t < 0.18) scale = t / 0.18 * 1.18;
    else if (t < 0.32) scale = 1.18 - (t - 0.18) / 0.14 * 0.18;
    else scale = 1 + Math.sin(t * 4) * 0.025;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.font = `400 ${snapFs}px Nosifer, serif`;
    ctx.fillStyle = '#FF2244';
    ctx.shadowColor = '#FF2244';
    ctx.shadowBlur = 34;
    ctx.textAlign = 'center';
    ctx.fillText('SNAP!', 0, 0);
    ctx.restore();

    if (stateTime > 0.9) {
      const tryFs = Math.min(W * 0.05, 26);
      ctx.font = `500 ${tryFs}px Fredoka, sans-serif`;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      ctx.textAlign = 'center';
      const pulse = Math.sin((stateTime - 0.9) * 4) * 0.25 + 0.75;
      ctx.globalAlpha = pulse;
      ctx.fillText('tap to try again', W / 2, H * 0.7);
      ctx.globalAlpha = 1;
    }
  }

  function drawScoreUI() {
    const cx = W / 2;

    // Score pop with bounce
    let scoreScale;
    if (stateTime < 0.28) {
      scoreScale = 0.2 + (stateTime / 0.28) * 1.1;
    } else if (stateTime < 0.45) {
      scoreScale = 1.3 - ((stateTime - 0.28) / 0.17) * 0.35;
    } else {
      scoreScale = 0.95 + Math.sin((stateTime - 0.45) * 5) * Math.exp(-(stateTime - 0.45) * 3) * 0.06;
    }

    const inches = (score / H * 20).toFixed(1);
    const scoreFs = Math.min(W * 0.18, 120);

    ctx.save();
    ctx.translate(cx, H * 0.6);
    ctx.scale(scoreScale, scoreScale);
    ctx.font = `700 ${scoreFs}px Fredoka, sans-serif`;
    ctx.fillStyle = '#39FF14';
    ctx.shadowColor = '#39FF14';
    ctx.shadowBlur = 32;
    ctx.textAlign = 'center';
    ctx.fillText(`${inches}″`, 0, 0);
    ctx.restore();

    if (isNewBest && stateTime > 0.35) {
      const nbFs = Math.min(W * 0.07, 40);
      ctx.font = `700 ${nbFs}px Fredoka, sans-serif`;
      ctx.fillStyle = '#B400FF';
      ctx.shadowColor = '#B400FF';
      ctx.shadowBlur = 24;
      ctx.textAlign = 'center';
      const bounce = Math.abs(Math.sin(stateTime * 5)) * 6;
      ctx.fillText('⭐ NEW BEST! ⭐', cx, H * 0.76 - bounce);
      ctx.shadowBlur = 0;
    }

    if (stateTime > 1.1) {
      const tryFs = Math.min(W * 0.04, 22);
      ctx.font = `400 ${tryFs}px Fredoka, sans-serif`;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
      ctx.textAlign = 'center';
      const pulse = Math.sin((stateTime - 1.1) * 4) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.fillText('tap to play again', cx, H * 0.87);
      ctx.globalAlpha = 1;
    }
  }

  function drawBranding() {
    const fs = Math.min(W * 0.022, 11);
    ctx.font = `400 ${fs}px Fredoka, sans-serif`;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.22)';
    ctx.textAlign = 'center';
    ctx.fillText('SOUTHEAST SLIME · HANDMADE WITH LOVE', W / 2, H - 10);
  }

  // ======== Main render ========
  function render() {
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }

    renderBackground();
    drawDrips();

    if (state === TITLE) drawTitleScene();
    else if (state === STRETCHING) drawStretchScene();
    else if (state === SCORED) drawScoredScene();
    // SNAPPED: no blob (exploded)

    drawParticles();

    if (state === STRETCHING) drawStretchUI();
    drawLeaderboard();

    if (state === TITLE) drawTitleUI();
    else if (state === SNAPPED) drawSnapUI();
    else if (state === SCORED) drawScoreUI();

    ctx.restore();

    if (flash > 0) {
      ctx.fillStyle = `rgba(255, 34, 68, ${flash * 0.45})`;
      ctx.fillRect(0, 0, W, H);
    }

    drawBranding();
  }

  // ======== Loop ========
  let prevTime = performance.now();
  function loop(time) {
    const dt = Math.min(0.05, (time - prevTime) / 1000);
    prevTime = time;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(t => { prevTime = t; loop(t); });
})();
</script>
</body>
</html>
